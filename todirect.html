<style>
*, *::before, *::after {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  background:#080808;
  color:white;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  height:100vh;
  overflow:hidden;
  cursor:none;
}

/* ── CURSOR ── */
#cur {
  position:fixed;
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  mix-blend-mode:difference;
}
#cur.big { width:50px; height:50px; }

@media (hover:none) {
  #cur { display:none; }
}

/* ── NAV ── */
.nav {
  position:fixed;
  top:36px;
  left:80px;
  right:80px;
  display:flex;
  justify-content:space-between;
  z-index:100;
  font-size:11px;
  font-weight:700;
  letter-spacing:.2em;
  text-transform:uppercase;
}
.nav a {
  color:white;
  text-decoration:none;
  opacity:.38;
  transition:opacity .25s;
}
.nav a:hover { opacity:1; }
.nav-label { opacity:.18; }

/* ── SPLIT ── */
.split {
  display:flex;
  width:100vw;
  height:100vh;
}

.half {
  flex:1;
  position:relative;
  overflow:hidden;
  text-decoration:none;
  color:white;
}

/* ── BACKGROUND ── */
.half::before {
  content:'';
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:.35;
  transition:transform .8s ease, opacity .6s;
}

.half-archive::before {
  background-image:url('https://res.cloudinary.com/disa2fbgc/image/upload/v1775592594/Physical_Wayfinding_System_ehmkt3.jpg');
}
.half-migrant::before {
  background-image:url('https://res.cloudinary.com/disa2fbgc/image/upload/v1775582635/PHOTO_2_-_Asian_Male_Portrait_1_ykzgpy.png');
}

.half:hover::before {
  transform:scale(1.05);
  opacity:.55;
}

.half::after {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.5), rgba(0,0,0,.1));
  z-index:1;
}

/* divider */
.divider {
  position:absolute;
  left:50%;
  top:10%;
  bottom:10%;
  width:1px;
  background:rgba(255,255,255,.08);
  z-index:5;
}

/* ── CONTENT ── */
.half-content {
  position:absolute;
  bottom:80px;
  left:80px;
  z-index:2;
  display:flex;
  flex-direction:column;
}

/* spacing */
.c-tag { margin-bottom:20px; }
.c-num { margin-bottom:10px; }

/* 🔥 TOP ALIGN */
.c-title {
  font-size:clamp(38px,4.8vw,68px);
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  line-height:1;

  height:150px;
  display:flex;
  align-items:flex-start; /* ← ВЕРХ */

  margin-bottom:18px;
  transition:color .3s;
}

.half-archive:hover .c-title { color:#aafb00; }
.half-migrant:hover .c-title { color:#ff6b7a; }

.c-desc {
  font-size:10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  opacity:.45;
  line-height:1.7;
  max-width:280px;
  margin-bottom:24px;
}

.c-open {
  font-size:10px;
  letter-spacing:.28em;
  text-transform:uppercase;
  opacity:.6;
  border-bottom:1px solid transparent;
  transition:.3s;
}

.c-open:hover {
  opacity:1;
  border-bottom-color:currentColor;
}

/* hover */
.half-content {
  transition:transform .4s cubic-bezier(.77,0,.18,1);
}
.half:hover .half-content {
  transform:translateY(-10px);
}

/* ── MOBILE ── */
@media (max-width:900px) {

  body {
    overflow:hidden; /* ← убрали скролл */
    height:100dvh;
  }

  .split {
    flex-direction:column;
    height:100dvh;
  }

  .half {
    height:50dvh; /* ← ключ */
  }

  .half-content {
    left:20px;
    bottom:30px;
  }

  .c-title {
    height:auto;
  }

  .divider {
    display:none;
  }

  .nav {
    left:20px;
    right:20px;
    top:20px;
  }
  .half-archive .c-title {
  color:#aafb00;
}

.half-migrant .c-title {
  color:#ff6b7a;
}
}

</style>
</head>

<body>

<div id="cur"></div>

<nav class="nav">
  <a href="index.html">← Back</a>
</nav>

<div class="split">

  <a class="half half-archive" href="archive.html">
    <div class="half-content">
      <div class="c-tag">Visual Identity · 2026</div>
      <div class="c-num">01</div>
      <div class="c-title">Archive<br>/ Space</div>
      <div class="c-desc">
        Architectural archive & cultural institution.<br>
        Identity as classification infrastructure.
      </div>
      <div class="c-open">Open →</div>
    </div>
  </a>

  <div class="divider"></div>

  <a class="half half-migrant" href="migrant.html">
    <div class="half-content">
      <div class="c-tag">Brand Identity · 2026</div>
      <div class="c-num">02</div>
      <div class="c-title">Migrant</div>
      <div class="c-desc">
        Platform for creatives living between countries.<br>
        Identity without citizenship. System only.
      </div>
      <div class="c-open">Open →</div>
    </div>
  </a>

</div>

<script>
const cur = document.getElementById('cur');

let x = 0, y = 0;

document.addEventListener('mousemove', e => {
  x = e.clientX;
  y = e.clientY;
});

function loop(){
  cur.style.transform = `translate(${x}px, ${y}px)`;
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
