<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Timeline Portfolio</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;font-family:'Barlow',sans-serif;color:#f5f5f5;overflow:hidden}

/* BACKGROUND IMAGE - ВСТАВИТЬ ПУТЬ СЮДА */
body{
  display:flex;
  flex-direction:column;
  background-image:url('images/assets/background.jpg');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(10,10,10,.7);
  z-index:-1;
}

/* MAIN SCROLL CONTAINER */
.scroll-container{
  flex:1;
  display:flex;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-behavior:smooth;
  padding-bottom:80px;
  align-items:flex-start;
}

.scroll-container::-webkit-scrollbar{height:4px}
.scroll-container::-webkit-scrollbar-track{background:#1a1a1a}
.scroll-container::-webkit-scrollbar-thumb{background:#666;border-radius:2px}

/* PROJECT GROUP */
.project-group{
  display:flex;
  gap:8px;
  flex-shrink:0;
  margin:0 20px;
  align-items:flex-start;
}

/* COLUMN - VERTICAL STACK */
.column{
  flex-shrink:0;
  width:180px;
  height:calc(100vh - 80px);
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:30px 15px;
  gap:8px;
}

/* PROJECT HEADER */
.column-header{
  position:relative;
  text-align:center;
  margin-bottom:15px;
  z-index:10;
}

.column-year{
  font-size:9px;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:#999;
}

.column-title{
  font-size:11px;
  font-weight:900;
  letter-spacing:-.01em;
  text-transform:uppercase;
  margin-top:3px;
  color:#f5f5f5;
}

.column-subtitle{
  font-size:8px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-top:2px;
  color:#666;
}

/* IMAGE ITEM */
.image-item{
  position:relative;
  cursor:pointer;
  transition:all .3s cubic-bezier(.23,1,.32,1);
  border:1px solid rgba(255,255,255,.08);
  background:#1a1a1a;
  overflow:hidden;
  border-radius:1px;
  flex-shrink:0;
}

.image-item img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
}

.image-item:hover{
  filter:brightness(1.05);
}

/* CLICKED STATE */
.image-item.active{
  transform:scale(1.3);
  z-index:999;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
}

/* HEADER */
.hdr{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:52px;
  display:flex;
  align-items:center;
  padding:0 36px;
  background:rgba(10,10,10,.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.05);
  z-index:150;
}

.back{
  font-size:12px;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  text-decoration:none;
  color:#666;
  transition:color .2s;
}

.back:hover{color:#f5f5f5}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  z-index:500;
  background:rgba(0,0,0,.98);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  visibility:hidden;
  transition:opacity .3s,visibility .3s;
  padding:40px;
}

.modal.active{
  opacity:1;
  visibility:visible;
}

.modal-content{
  position:relative;
  background:#1a1a1a;
  border:1px solid rgba(255,255,255,.1);
  max-width:95vw;
  max-height:90vh;
  display:flex;
  border-radius:2px;
  overflow:hidden;
}

.modal-image-section{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#0a0a0a;
  position:relative;
}

.modal-image{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-image img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

.modal-nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  color:#f5f5f5;
  width:40px;
  height:40px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
  transition:all .2s;
  z-index:10;
}

.modal-nav-btn:hover{
  background:rgba(255,255,255,.2);
}

.modal-nav-btn.prev{left:15px}
.modal-nav-btn.next{right:15px}

.modal-counter{
  position:absolute;
  bottom:15px;
  left:15px;
  font-size:10px;
  color:#999;
  background:rgba(0,0,0,.5);
  padding:6px 10px;
  border-radius:2px;
}

.modal-info{
  width:320px;
  padding:35px;
  display:flex;
  flex-direction:column;
  gap:18px;
  overflow-y:auto;
  border-left:1px solid rgba(255,255,255,.1);
}

.modal-info::-webkit-scrollbar{width:4px}
.modal-info::-webkit-scrollbar-thumb{background:#444;border-radius:2px}

.modal-title{
  font-size:20px;
  font-weight:900;
  letter-spacing:-.01em;
  color:#f5f5f5;
}

.modal-subtitle{
  font-size:10px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#999;
}

.modal-desc{
  font-size:12px;
  line-height:1.6;
  color:#aaa;
  white-space:pre-line;
  flex:1;
}

.modal-close{
  position:absolute;
  top:20px;
  right:20px;
  background:none;
  border:none;
  color:#999;
  font-size:24px;
  cursor:pointer;
  transition:color .2s;
  z-index:10;
}

.modal-close:hover{color:#f5f5f5}

/* TIMELINE - BOTTOM FIXED */
.timeline-bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:linear-gradient(to top,rgba(10,10,10,.98),rgba(10,10,10,.9));
  border-top:1px solid rgba(255,255,255,.05);
  display:flex;
  align-items:center;
  z-index:200;
  overflow-x:auto;
  overflow-y:hidden;
}

.timeline-bottom::-webkit-scrollbar{height:3px}
.timeline-bottom::-webkit-scrollbar-track{background:transparent}
.timeline-bottom::-webkit-scrollbar-thumb{background:#444;border-radius:2px}

.timeline-line{
  position:absolute;
  bottom:50%;
  left:0;
  right:0;
  height:1px;
  background:rgba(255,255,255,.1);
  transform:translateY(50%);
  z-index:1;
}

.timeline-content{
  position:relative;
  height:100%;
  display:flex;
  align-items:center;
  padding:0 40px;
  gap:80px;
  z-index:2;
  min-width:min-content;
}

.year-marker{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
  white-space:nowrap;
}

.year-dot{
  width:4px;
  height:4px;
  background:#666;
  border-radius:50%;
}

.year-marker.major .year-dot{
  width:6px;
  height:6px;
  background:#999;
}

.year-label{
  font-size:8px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#999;
}

/* FOOTER */
.ftl{
  position:fixed;
  bottom:68px;
  left:36px;
  z-index:100;
  font-size:9px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.ftl a{
  color:#f5f5f5;
  text-decoration:none;
  opacity:.25;
  transition:opacity .2s;
}

.ftl a:hover{opacity:1}

.ftr{
  position:fixed;
  bottom:68px;
  right:36px;
  z-index:100;
  display:flex;
  gap:8px;
  align-items:center;
  font-size:9px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.ftr a{
  color:#f5f5f5;
  text-decoration:none;
  opacity:.25;
  transition:opacity .2s;
}

.ftr a:hover{opacity:1}

.ftr span{opacity:.08;color:#f5f5f5}
</style>
</head>
<body>

<div class="hdr">
  <a href="index.html" class="back">← Back</a>
</div>

<div class="scroll-container" id="scrollContainer"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <button class="modal-close" id="modalClose">✕</button>
  <div class="modal-content">
    <div class="modal-image-section">
      <div class="modal-image">
        <img id="modalImg" src="" alt="">
      </div>
      <button class="modal-nav-btn prev" id="modalPrev">‹</button>
      <button class="modal-nav-btn next" id="modalNext">›</button>
      <div class="modal-counter" id="modalCounter"></div>
    </div>
    <div class="modal-info">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-subtitle" id="modalSubtitle"></div>
      <p class="modal-desc" id="modalDesc"></p>
    </div>
  </div>
</div>

<!-- TIMELINE BOTTOM -->
<div class="timeline-bottom" id="timelineBottom">
  <div class="timeline-line"></div>
  <div class="timeline-content" id="timelineContent"></div>
</div>

<div class="ftl"><a href="about.html">About</a></div>
<div class="ftr">
  <a href="mailto:navilen@bk.ru">navilen@bk.ru</a><span>—</span>
  <a href="https://instagram.com/molodostibolshenebudet/" target="_blank">Instagram</a><span>—</span>
  <a href="https://behance.net/avasileuskaya" target="_blank">Behance</a><span>—</span>
  <a href="https://linkedin.com/in/worldwidemoment/" target="_blank">LinkedIn</a>
</div>

<script>
// PROJECT DATA STRUCTURE
const projects = [
  {
    id: 'pilots',
    year: 2019,
    month: 6,
    name: 'PILOTS',
    subtitle: 'HAND DRAWINGS · 2015–2019',
    desc: 'When I was younger, they shaped everything.\nAll my pain redirected through their image.\nEvery piece a different style, a different state.',
    files: Array.from({length:15}, (_,i)=> ({
      path: `images/assets/create/pilots/pilots${i+1}.jpg`,
      width: 130-Math.random()*15,
      height: 100-Math.random()*10
    }))
  },
  {
    id: 'Self-Portrait',
    year: 2024,
    month: 3,
    name: 'NONE OF THEM IS ME',
    subtitle: 'SELF-PORTRAIT SERIES',
    desc: 'A series about the gap between how you see yourself and how you appear.\n\nNone of the versions is definitive.',
    files: Array.from({length:6}, (_,i)=> ({
      path: `images/assets/create/portrait/Portrait${i+1}.jpg`,
      width: 95-Math.random()*10,
      height: 130-Math.random()*15
    }))
  },
  {
    id: 'scan',
    year: 2025-2026,
    month: 9,
    name: 'SCAN',
    subtitle: 'GRAINS OF THE CITIES',
    desc: 'Cities leave marks.\nScanned surfaces, found materials.\nConcrete, rust, fabric, stone.',
    files: Array.from({length:10}, (_,i)=> ({
      path: `images/assets/create/scan/Scan${i+1}.jpg`,
      width: 125-Math.random()*12,
      height: 98-Math.random()*8
    }))
  },
  {
    id: 'clo',
    year: 2023,
    month: 4,
    name: 'CLO',
    subtitle: 'CUSTOM CLOTHING',
    subprojects: [
      {
        name: 'TEKKONKINKREET',
        desc: 'Hand-painted garments inspired by the aesthetic.\nNo sketch, no transfer.\nThe painting grew from the fabric up.',
        files: [1,2,3]
      },
      {
        name: 'UNTITLED SERIES',
        desc: 'Experimental clothing pieces.\nExploring boundaries of wearable art.',
        files: [4,5]
      },
      {
        name: 'MIXED MEDIA',
        desc: 'Collaborative works combining textile and digital.',
        files: Array.from({length:15}, (_,i)=>i+6)
      }
    ],
    files: Array.from({length:20}, (_,i)=> ({
      path: `images/assets/create/clo/cloth${i+1}.jpg`,
      width: 125-Math.random()*12,
      height: 98-Math.random()*8,
      subproject: i < 3 ? 0 : i < 5 ? 1 : 2
    }))
  },
  {
    id: 'bti',
    year: 2022,
    month: 11,
    name: 'BEFORE THE IMPACT',
    subtitle: 'SILENT HORIZON',
    desc: 'Silent Horizon explores the moment when an ordinary landscape becomes the stage for an unexpected event.\n\nThe four-frame sequence captures a gradual shift in perception. What begins as a quiet, open field occupied by distant human figures transforms into a scene of tension and observation as a sudden trajectory appears in the sky.\n\nThe work investigates the relationship between landscape, technology, and the human witness. The scale of the environment contrasts with the fragility of human presence, emphasizing how rapidly familiar spaces can be redefined by unforeseen events.\n\nRather than depicting a specific narrative, the sequence reflects on perception, distance, and the transformation of landscape into a site of memory.',
    files: Array.from({length:4}, (_,i)=> ({
      path: `images/assets/create/bti/bti${i+1}.jpg`,
      width: 130-Math.random()*12,
      height: 100-Math.random()*8
    }))
  }
];

let currentProject = null;
let currentImageIdx = 0;

const scrollContainer = document.getElementById('scrollContainer');
const timelineBottom = document.getElementById('timelineBottom');
const timelineContent = document.getElementById('timelineContent');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const modalTitle = document.getElementById('modalTitle');
const modalSubtitle = document.getElementById('modalSubtitle');
const modalDesc = document.getElementById('modalDesc');
const modalCounter = document.getElementById('modalCounter');
const modalClose = document.getElementById('modalClose');
const modalPrev = document.getElementById('modalPrev');
const modalNext = document.getElementById('modalNext');

// BUILD SCROLL CONTAINER WITH AUTO-COLUMNS
function buildScrollContainer() {
  scrollContainer.innerHTML = '';
  
  projects.forEach(proj => {
    const group = document.createElement('div');
    group.className = 'project-group';
    
    // Split files into columns (max 10 per column)
    const filesPerColumn = 10;
    const columnCount = Math.ceil(proj.files.length / filesPerColumn);
    
    for(let col = 0; col < columnCount; col++) {
      const column = document.createElement('div');
      column.className = 'column';
      
      // Header only on first column
      if(col === 0) {
        const header = document.createElement('div');
        header.className = 'column-header';
        header.innerHTML = `
          <div class="column-year">${proj.year}</div>
          <div class="column-title">${proj.name}</div>
          ${proj.subtitle ? `<div class="column-subtitle">${proj.subtitle}</div>` : ''}
        `;
        column.appendChild(header);
      }
      
      // Add files for this column
      const startIdx = col * filesPerColumn;
      const endIdx = Math.min(startIdx + filesPerColumn, proj.files.length);
      
      for(let i = startIdx; i < endIdx; i++) {
        const file = proj.files[i];
        const item = document.createElement('div');
        item.className = 'image-item';
        item.style.width = Math.round(file.width) + 'px';
        item.style.height = Math.round(file.height) + 'px';
        
        const img = document.createElement('img');
        img.src = file.path;
        img.alt = `${proj.name} ${i+1}`;
        img.onerror = function() { this.style.opacity = '0.3'; };
        
        item.appendChild(img);
        item.onclick = () => openModal(proj, i);
        
        column.appendChild(item);
      }
      
      group.appendChild(column);
    }
    
    scrollContainer.appendChild(group);
  });
}

// TIMELINE WITH REAL DATES
function buildTimeline() {
  timelineContent.innerHTML = '';
  
  projects.forEach((proj, idx) => {
    const marker = document.createElement('div');
    marker.className = 'year-marker' + (idx % 2 === 0 ? ' major' : '');
    
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    marker.innerHTML = `
      <div class="year-dot"></div>
      <div class="year-label">${proj.year}</div>
      <div class="year-label">${monthNames[proj.month-1]}</div>
    `;
    
    timelineContent.appendChild(marker);
  });
}

// MODAL FUNCTIONS
function openModal(proj, fileIdx) {
  currentProject = proj;
  currentImageIdx = fileIdx;
  showModalImage();
  modal.classList.add('active');
}

function showModalImage() {
  const file = currentProject.files[currentImageIdx];
  modalImg.src = file.path;
  modalTitle.textContent = currentProject.name;
  modalSubtitle.textContent = currentProject.subtitle || '';
  modalDesc.textContent = currentProject.desc || '';
  modalCounter.textContent = `${currentImageIdx + 1} / ${currentProject.files.length}`;
}

modalClose.onclick = () => modal.classList.remove('active');
modal.onclick = (e) => {
  if(e.target === modal) modal.classList.remove('active');
};

modalPrev.onclick = () => {
  currentImageIdx = (currentImageIdx - 1 + currentProject.files.length) % currentProject.files.length;
  showModalImage();
};

modalNext.onclick = () => {
  currentImageIdx = (currentImageIdx + 1) % currentProject.files.length;
  showModalImage();
};

document.addEventListener('keydown', (e) => {
  if(!modal.classList.contains('active')) return;
  if(e.key === 'Escape') modal.classList.remove('active');
  if(e.key === 'ArrowLeft') modalPrev.click();
  if(e.key === 'ArrowRight') modalNext.click();
});

// SYNC SCROLLS
scrollContainer.addEventListener('scroll', () => {
  timelineBottom.scrollLeft = scrollContainer.scrollLeft;
});

timelineBottom.addEventListener('scroll', () => {
  scrollContainer.scrollLeft = timelineBottom.scrollLeft;
});

// INIT
buildScrollContainer();
buildTimeline();
</script>

</body>
</html>
