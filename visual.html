<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual — AV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
* { cursor: none !important; }
html,body{width:100%;height:100%;background:#0a0a0a;font-family:'Barlow',sans-serif;color:#f5f5f5;overflow:hidden}

body{
  display:flex;
  flex-direction:column;
  background-image:url('images/assets/create/visualmain.jpg');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(10,10,10,.72);
  z-index:-1;
}

/* ── CURSOR: circle + cross ── */
#cur-ring {
  position:fixed;
  width:30px;
  height:30px;
  border:1px solid rgba(245,245,245,.45);
  border-radius:50%;
  pointer-events:none;
  z-index:9998;
  transform:translate(-50%,-50%);
  transition:left .1s ease,top .1s ease,width .2s,height .2s,border-color .2s;
}
#cur-ring.hover { width:46px; height:46px; border-color:rgba(245,245,245,.75); }
/* crosshair lines at cursor center */
#cur-cross {
  position:fixed;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
}
#cur-cross::before,#cur-cross::after {
  content:'';
  position:absolute;
  background:rgba(245,245,245,.6);
}
#cur-cross::before { width:12px; height:1px; top:0; left:-6px; }
#cur-cross::after  { width:1px; height:12px; left:0; top:-6px; }

@media (hover:none),(pointer:coarse) {
  * { cursor:auto !important; }
  #cur-ring,#cur-cross { display:none; }
}

/* ── SCROLL CONTAINER ──
   padding-top:64px — space below the floating back link
   padding-bottom:80px — space for the timeline bar
── */
.scroll-container{
  flex:1;
  display:flex;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-behavior:smooth;
  padding-top:64px;
  padding-bottom:80px;
  align-items:flex-start;
}
.scroll-container::-webkit-scrollbar{height:4px}
.scroll-container::-webkit-scrollbar-track{background:#1a1a1a}
.scroll-container::-webkit-scrollbar-thumb{background:#666;border-radius:2px}

/* ── PROJECT GROUP
   gap:8px  — intra-project columns close together
   margin:0 48px — inter-project columns far apart (≈96px gap between groups)
   New projects added in JS automatically get same margins → equidistant.
── */
.project-group{
  display:flex;
  gap:8px;
  flex-shrink:0;
  margin:0 48px;
  align-items:flex-start;
}

/* ── COLUMN ── */
.column{
  flex-shrink:0;
  width:180px;
  height:calc(100vh - 144px);
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:20px 15px;
  gap:8px;
}

.column-header{
  position:relative;
  text-align:center;
  margin-bottom:15px;
  z-index:10;
}
.column-year{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#999;}
.column-title{font-size:11px;font-weight:900;letter-spacing:-.01em;text-transform:uppercase;margin-top:3px;color:#f5f5f5;}
.column-subtitle{font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;color:#666;}

/* ── IMAGE ITEM ── */
.image-item{
  position:relative;
  transition:all .3s cubic-bezier(.23,1,.32,1);
  border:1px solid rgba(255,255,255,.08);
  background:#1a1a1a;
  overflow:hidden;
  border-radius:1px;
  flex-shrink:0;
}
.image-item img{width:100%;height:100%;display:block;object-fit:cover;}
.image-item:hover{filter:brightness(1.08);}

/* ── BACK LINK (no panel, floating) ── */
.hdr{
  position:fixed;
  top:18px;
  left:36px;
  z-index:150;
}
.back{
  font-size:12px;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  text-decoration:none;
  color:#666;
  transition:color .2s;
}
.back:hover{color:#f5f5f5}

/* ── MODAL ── */
.modal{
  position:fixed;
  inset:0;
  z-index:500;
  background:rgba(0,0,0,.97);
  backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  visibility:hidden;
  transition:opacity .3s,visibility .3s;
  padding:40px;
}
.modal.active{opacity:1;visibility:visible;}

.modal-content{
  position:relative;
  background:#1a1a1a;
  border:1px solid rgba(255,255,255,.1);
  max-width:95vw;
  max-height:90vh;
  width:100%;
  display:flex;
  border-radius:2px;
  overflow:hidden;
}
/* BTI: wider+taller since 4 images in a row need more space */
.modal-content.mode-row{
  max-width:99vw;
  max-height:96vh;
}

.modal-image-section{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#0a0a0a;
  position:relative;
}

/* ── SINGLE VIEW ── */
.modal-single{
  flex:1;
  width:100%;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.modal-single img{max-width:100%;max-height:100%;object-fit:contain;}

/* ── MULTI VIEW (collage / row / group) ── */
.modal-multi{
  display:none; /* shown via .show */
  flex:1;
  width:100%;
  min-height:0;
  padding:12px;
  gap:5px;
  align-items:center;
  justify-content:center;
  flex-wrap:nowrap;
  overflow:hidden;
}
.modal-multi.show { display:flex; }
/* collage: 3×2 grid */
.modal-multi.mode-collage{
  flex-wrap:wrap;
  align-content:center;
}
.modal-multi.mode-collage img{
  width:calc(33.33% - 5px);
  height:auto;
  max-height:42vh;
  object-fit:contain;
  border:1px solid rgba(255,255,255,.05);
}
/* row: up to 4 items in one line */
.modal-multi.mode-row img{
  flex:1 1 0;
  min-width:0;
  height:78vh;
  object-fit:contain;
  border:1px solid rgba(255,255,255,.05);
}
/* group: 1–3 CLO items side by side */
.modal-multi.mode-group img{
  flex:1 1 0;
  min-width:0;
  height:65vh;
  object-fit:contain;
  border:1px solid rgba(255,255,255,.05);
}

.modal-nav-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#f5f5f5;width:40px;height:40px;border-radius:50%;font-size:18px;
  transition:all .2s;z-index:10;
}
.modal-nav-btn:hover{background:rgba(255,255,255,.2);}
.modal-nav-btn.prev{left:15px}
.modal-nav-btn.next{right:15px}
.modal-nav-btn.off,.modal-counter.off{display:none}

.modal-counter{
  position:absolute;bottom:15px;left:15px;font-size:10px;color:#999;
  background:rgba(0,0,0,.5);padding:6px 10px;border-radius:2px;
}

.modal-info{
  width:320px;padding:35px;display:flex;flex-direction:column;
  gap:18px;overflow-y:auto;border-left:1px solid rgba(255,255,255,.1);
  flex-shrink:0;
}
.modal-info::-webkit-scrollbar{width:4px}
.modal-info::-webkit-scrollbar-thumb{background:#444;border-radius:2px}

.modal-title{font-size:20px;font-weight:900;letter-spacing:-.01em;color:#f5f5f5;}
.modal-subtitle{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#999;}
.modal-desc{font-size:12px;line-height:1.6;color:#aaa;white-space:pre-line;flex:1;}

.modal-close{
  position:absolute;top:20px;right:20px;background:none;border:none;
  color:#999;font-size:24px;transition:color .2s;z-index:10;
}
.modal-close:hover{color:#f5f5f5}

/* ── TIMELINE ── */
.timeline-bottom{
  position:fixed;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(to top,rgba(10,10,10,.98),rgba(10,10,10,.9));
  border-top:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;z-index:200;
  overflow-x:auto;overflow-y:hidden;
}
.timeline-bottom::-webkit-scrollbar{height:3px}
.timeline-bottom::-webkit-scrollbar-track{background:transparent}
.timeline-bottom::-webkit-scrollbar-thumb{background:#444;border-radius:2px}

.timeline-line{
  position:absolute;bottom:50%;left:0;right:0;height:1px;
  background:rgba(255,255,255,.1);transform:translateY(50%);z-index:1;
}
.timeline-content{
  position:relative;height:100%;display:flex;align-items:center;
  padding:0 40px;gap:80px;z-index:2;min-width:min-content;
}
.year-marker{
  position:relative;display:flex;flex-direction:column;
  align-items:center;gap:5px;white-space:nowrap;
}
.year-dot{width:4px;height:4px;background:#666;border-radius:50%;}
.year-marker.major .year-dot{width:6px;height:6px;background:#999;}
.year-label{font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#999;}
/* FUTURE marker: blue */
.year-marker.future .year-dot{background:#4d6aff;width:6px;height:6px;}
.year-marker.future .year-label{color:#4d6aff;}

/* ── FOOTER ── */
.ftl{
  position:fixed;bottom:68px;left:36px;z-index:100;
  font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
}
.ftl a{color:#f5f5f5;text-decoration:none;opacity:.25;transition:opacity .2s;}
.ftl a:hover{opacity:1}
.ftr{
  position:fixed;bottom:68px;right:36px;z-index:100;
  display:flex;gap:8px;align-items:center;
  font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
}
.ftr a{color:#f5f5f5;text-decoration:none;opacity:.25;transition:opacity .2s;}
.ftr a:hover{opacity:1}
.ftr span{opacity:.08;color:#f5f5f5}
</style>
</head>
<body>

<!-- CURSOR -->
<div id="cur-ring"></div>
<div id="cur-cross"></div>

<!-- HEADER: floating back link only, no panel -->
<div class="hdr">
  <a href="index.html" class="back">← Back</a>
</div>

<div class="scroll-container" id="scrollContainer"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <button class="modal-close" id="modalClose">✕</button>
  <div class="modal-content" id="modalContent">
    <div class="modal-image-section">
      <div class="modal-single" id="modalSingleView">
        <img id="modalImg" src="" alt="">
      </div>
      <div class="modal-multi" id="modalMultiView"></div>
      <button class="modal-nav-btn prev" id="modalPrev">‹</button>
      <button class="modal-nav-btn next" id="modalNext">›</button>
      <div class="modal-counter" id="modalCounter"></div>
    </div>
    <div class="modal-info">
      <div class="modal-title"    id="modalTitle"></div>
      <div class="modal-subtitle" id="modalSubtitle"></div>
      <p   class="modal-desc"     id="modalDesc"></p>
    </div>
  </div>
</div>

<!-- TIMELINE -->
<div class="timeline-bottom" id="timelineBottom">
  <div class="timeline-line"></div>
  <div class="timeline-content" id="timelineContent"></div>
</div>

<div class="ftl"><a href="about.html">About</a></div>
<div class="ftr">
  <a href="mailto:navilen@bk.ru">navilen@bk.ru</a><span>—</span>
  <a href="https://instagram.com/molodostibolshenebudet/" target="_blank">Instagram</a><span>—</span>
  <a href="https://behance.net/avasileuskaya" target="_blank">Behance</a><span>—</span>
  <a href="https://linkedin.com/in/worldwidemoment/" target="_blank">LinkedIn</a>
</div>

<script>
/* ─────────────────────────────────────────
   CLO GROUPS  (0-indexed: cloth1 = index 0)
   Each sub-array defines which file indices open together.
   "13 один" → index 12 alone → group of 1
───────────────────────────────────────── */
const CLO_GROUPS = [
  [0,1,2],    // cloth1–3
  [3,4],      // cloth4–5
  [5,6],      // cloth6–7
  [7,8,9],    // cloth8–10
  [10,11],    // cloth11–12
  [12],       // cloth13  (alone)
  [13,14,15], // cloth14–16
  [16,17],    // cloth17–18
  [18,19]     // cloth19–20
];

function getCloGroup(idx) {
  for (const g of CLO_GROUPS) if (g.includes(idx)) return g;
  return [idx];
}

/* ─────────────────────────────────────────
   PROJECT DATA
   FIX: year values changed from numeric expressions
        (2018-2021 = -3, 2025-2026 = -1) to strings.
───────────────────────────────────────── */
const projects = [
  {
    id: 'pilots',
    year: '2018–2021',
    month: 6,
    name: 'PILOTS',
    subtitle: 'HAND DRAWINGS · 2018–2021',
    desc: 'When I was younger, they shaped everything.\nAll my pain redirected through their image.\nEvery piece a different style, a different state.',
    files: Array.from({length:14}, (_,i) => ({
      path:   `images/assets/create/pilots/pilots${i+1}.jpg`,
      width:  Math.round(130 - Math.random()*14),
      height: Math.round(100 - Math.random()*7)
    }))
  },
  {
    id: 'Self-Portrait',
    year: '2024',
    month: 3,
    name: 'NONE OF THEM IS ME',
    subtitle: 'SELF-PORTRAIT SERIES · 2024',
    desc: 'A series about the gap between how you see yourself and how you appear.\n\nNone of the versions is definitive.',
    files: Array.from({length:6}, (_,i) => ({
      path:   `images/assets/create/portrait/Portrait${i+1}.jpg`,
      width:  Math.round(95 - Math.random()*10),
      height: Math.round(130 - Math.random()*15)
    }))
  },
  {
    id: 'scan',
    year: '2025–2026',
    month: 9,
    name: 'SCAN',
    subtitle: 'GRAINS OF THE CITIES',
    desc: 'Cities leave marks.\nScanned surfaces, found materials.\nConcrete, rust, fabric, stone.',
    files: Array.from({length:10}, (_,i) => ({
      path:   `images/assets/create/scan/Scan${i+1}.jpg`,
      width:  Math.round(125 - Math.random()*12),
      height: Math.round(98  - Math.random()*7)
    }))
  },
  {
    id: 'clo',
    year: '2023',
    month: 4,
    name: 'CLO',
    subtitle: 'CUSTOM CLOTHING',
    subprojects: [
      { name: 'TEKKONKINKREET',  desc: 'Hand-painted garments inspired by the aesthetic.\nNo sketch, no transfer.\nThe painting grew from the fabric up.' },
      { name: 'UNTITLED SERIES', desc: 'Experimental clothing pieces.\nExploring boundaries of wearable art.' },
      { name: 'MIXED MEDIA',     desc: 'Collaborative works combining textile and digital.' }
    ],
    files: Array.from({length:20}, (_,i) => ({
      path:       `images/assets/create/clo/cloth${i+1}.jpg`,
      width:      Math.round(125 - Math.random()*12),
      height:     Math.round(98  - Math.random()*8),
      subproject: i < 3 ? 0 : i < 5 ? 1 : 2
    }))
  },
  {
    id: 'bti',
    year: '2022',
    month: 11,
    name: 'BEFORE THE IMPACT',
    subtitle: 'SILENT HORIZON',
    desc: 'Silent Horizon explores the moment when an ordinary landscape becomes the stage for an unexpected event.\n\nThe four-frame sequence captures a gradual shift in perception. What begins as a quiet, open field transforms into a scene of tension as a sudden trajectory appears in the sky.\n\nThe work investigates landscape, technology, and the human witness.',
    files: Array.from({length:4}, (_,i) => ({
      path:   `images/assets/create/bti/bti${i+1}.jpg`,
      width:  Math.round(130 - Math.random()*12),
      height: Math.round(100 - Math.random()*8)
    }))
  },
  {
    id: 'graph',
    year: '—',
    month: null,
    name: 'GRAPH',
    subtitle: 'GRAPHIC DESIGN · AI TOOLS',
    desc: 'Visual experiments in graphic design.\nPoster generation, identity exploration.\nAI-assisted image work.\n— in progress',
    files: [] /* empty: shows header column only */
  }
];

/* ─────────────────────────────────────────
   DOM REFS
───────────────────────────────────────── */
const scrollContainer = document.getElementById('scrollContainer');
const timelineBottom  = document.getElementById('timelineBottom');
const timelineContent = document.getElementById('timelineContent');
const modal           = document.getElementById('modal');
const modalContent    = document.getElementById('modalContent');
const modalSingleView = document.getElementById('modalSingleView');
const modalMultiView  = document.getElementById('modalMultiView');
const modalImg        = document.getElementById('modalImg');
const modalTitle      = document.getElementById('modalTitle');
const modalSubtitle   = document.getElementById('modalSubtitle');
const modalDesc       = document.getElementById('modalDesc');
const modalCounter    = document.getElementById('modalCounter');
const modalClose      = document.getElementById('modalClose');
const modalPrev       = document.getElementById('modalPrev');
const modalNext       = document.getElementById('modalNext');

let currentProject  = null;
let currentImageIdx = 0;

/* ─────────────────────────────────────────
   CURSOR
───────────────────────────────────────── */
const curRing  = document.getElementById('cur-ring');
const curCross = document.getElementById('cur-cross');

if (window.matchMedia('(hover: hover)').matches) {
  document.addEventListener('mousemove', e => {
    curRing.style.left  = e.clientX + 'px';
    curRing.style.top   = e.clientY + 'px';
    curCross.style.left = e.clientX + 'px';
    curCross.style.top  = e.clientY + 'px';
  });
  // Event delegation for hover effect — works on dynamically created elements
  document.addEventListener('mouseover', e => {
    if (e.target.closest('a, button, .image-item')) curRing.classList.add('hover');
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('a, button, .image-item')) curRing.classList.remove('hover');
  });
}

/* ─────────────────────────────────────────
   MODAL HELPERS
───────────────────────────────────────── */
function setSingle() {
  modalSingleView.style.display = 'flex';
  modalMultiView.className = 'modal-multi'; // clear all mode classes
  modalContent.classList.remove('mode-row');
}
function setMulti(mode) {
  modalSingleView.style.display = 'none';
  modalMultiView.className = 'modal-multi show mode-' + mode;
  if (mode === 'row') modalContent.classList.add('mode-row');
  else modalContent.classList.remove('mode-row');
}
function showNav(on) {
  modalPrev.classList.toggle('off', !on);
  modalNext.classList.toggle('off', !on);
  modalCounter.classList.toggle('off', !on);
}
function setInfo(title, subtitle, desc) {
  modalTitle.textContent    = title    || '';
  modalSubtitle.textContent = subtitle || '';
  modalDesc.textContent     = desc     || '';
}
function buildMultiImgs(paths) {
  modalMultiView.innerHTML = '';
  paths.forEach(src => {
    const img = document.createElement('img');
    img.src    = src;
    img.alt    = '';
    img.onerror = () => { img.style.opacity = '0.2'; };
    modalMultiView.appendChild(img);
  });
}

/* ─────────────────────────────────────────
   OPEN MODAL — dispatches by project id
───────────────────────────────────────── */
function openModal(proj, fileIdx) {
  currentProject  = proj;
  currentImageIdx = fileIdx;

  /* ── PORTRAIT: all 6 as 3×2 collage ── */
  if (proj.id === 'Self-Portrait') {
    setMulti('collage');
    showNav(false);
    buildMultiImgs(proj.files.map(f => f.path));
    setInfo(proj.name, proj.subtitle, proj.desc);

  /* ── BTI: all 4 in one row ── */
  } else if (proj.id === 'bti') {
    setMulti('row');
    showNav(false);
    buildMultiImgs(proj.files.map(f => f.path));
    setInfo(proj.name, proj.subtitle, proj.desc);

  /* ── CLO: grouped per spec ── */
  } else if (proj.id === 'clo') {
    const group  = getCloGroup(fileIdx);
    const spIdx  = proj.files[fileIdx].subproject;
    const sp     = proj.subprojects?.[spIdx];
    setInfo(proj.name, sp?.name || proj.subtitle, sp?.desc || proj.desc);

    if (group.length === 1) {
      // cloth13: single image, no nav
      setSingle();
      modalImg.src = proj.files[fileIdx].path;
      showNav(false);
    } else {
      // grouped images side by side
      setMulti('group');
      showNav(false);
      buildMultiImgs(group.map(i => proj.files[i].path));
    }

  /* ── ALL OTHERS: single image with prev/next navigation ── */
  } else {
    setSingle();
    modalImg.src = proj.files[fileIdx].path;
    showNav(true);
    modalCounter.textContent = `${fileIdx + 1} / ${proj.files.length}`;
    setInfo(proj.name, proj.subtitle, proj.desc);
  }

  modal.classList.add('active');
}

/* ─────────────────────────────────────────
   MODAL NAVIGATION (single mode only)
───────────────────────────────────────── */
function navSingle(dir) {
  if (!currentProject || !currentProject.files.length) return;
  currentImageIdx = (currentImageIdx + dir + currentProject.files.length) % currentProject.files.length;
  modalImg.src = currentProject.files[currentImageIdx].path;
  modalCounter.textContent = `${currentImageIdx + 1} / ${currentProject.files.length}`;
}

modalClose.onclick = () => modal.classList.remove('active');
modal.onclick      = e => { if (e.target === modal) modal.classList.remove('active'); };
modalPrev.onclick  = () => navSingle(-1);
modalNext.onclick  = () => navSingle(+1);

document.addEventListener('keydown', e => {
  if (!modal.classList.contains('active')) return;
  if (e.key === 'Escape')     modal.classList.remove('active');
  if (e.key === 'ArrowLeft'  && !modalPrev.classList.contains('off')) navSingle(-1);
  if (e.key === 'ArrowRight' && !modalNext.classList.contains('off')) navSingle(+1);
});

/* ─────────────────────────────────────────
   BUILD SCROLL CONTAINER
   Empty-files projects (GRAPH) get one header column.
   Column spacing: gap:8px intra-project, margin:0 48px inter-project.
───────────────────────────────────────── */
function buildScrollContainer() {
  scrollContainer.innerHTML = '';
  const PER_COL = 7;

  projects.forEach(proj => {
    const group       = document.createElement('div');
    group.className   = 'project-group';
    const colCount    = proj.files.length > 0 ? Math.ceil(proj.files.length / PER_COL) : 1;

    for (let col = 0; col < colCount; col++) {
      const column = document.createElement('div');
      column.className = 'column';

      /* header on first column only */
      if (col === 0) {
        const hdr = document.createElement('div');
        hdr.className = 'column-header';
        hdr.innerHTML = `
          <div class="column-year">${proj.year}</div>
          <div class="column-title">${proj.name}</div>
          ${proj.subtitle ? `<div class="column-subtitle">${proj.subtitle}</div>` : ''}
        `;
        column.appendChild(hdr);
      }

      /* image items */
      const start = col * PER_COL;
      const end   = Math.min(start + PER_COL, proj.files.length);
      for (let i = start; i < end; i++) {
        const f    = proj.files[i];
        const item = document.createElement('div');
        item.className = 'image-item';
        item.style.width  = f.width  + 'px';
        item.style.height = f.height + 'px';

        const img = document.createElement('img');
        img.src     = f.path;
        img.alt     = `${proj.name} ${i + 1}`;
        img.onerror = () => { img.style.opacity = '0.3'; };

        item.appendChild(img);
        item.onclick = () => openModal(proj, i);
        column.appendChild(item);
      }

      group.appendChild(column);
    }

    scrollContainer.appendChild(group);
  });
}

/* ─────────────────────────────────────────
   BUILD TIMELINE
   FIX: was computing year as number (2018-2021 = -3).
   Now proj.year is a string, displayed as-is.
   Added FUTURE marker at the end.
───────────────────────────────────────── */
function buildTimeline() {
  timelineContent.innerHTML = '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  projects.forEach((proj, idx) => {
    const m = document.createElement('div');
    m.className = 'year-marker' + (idx % 2 === 0 ? ' major' : '');
    m.innerHTML = `
      <div class="year-dot"></div>
      <div class="year-label">${proj.year}</div>
      ${proj.month ? `<div class="year-label">${months[proj.month - 1]}</div>` : ''}
    `;
    timelineContent.appendChild(m);
  });

  /* FUTURE */
  const fut = document.createElement('div');
  fut.className = 'year-marker future';
  fut.innerHTML = `<div class="year-dot"></div><div class="year-label">Future</div>`;
  timelineContent.appendChild(fut);
}

/* ─────────────────────────────────────────
   SYNC TIMELINE SCROLL WITH MAIN SCROLL
───────────────────────────────────────── */
scrollContainer.addEventListener('scroll', () => {
  timelineBottom.scrollLeft = scrollContainer.scrollLeft;
});

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
buildScrollContainer();
buildTimeline();
</script>
</body>
</html>
