<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual — AV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
* { cursor: none !important; }
html,body{width:100%;height:100%;background:#0a0a0a;font-family:'Barlow',sans-serif;color:#f5f5f5;overflow:hidden}

body{
  display:flex;
  flex-direction:column;
  background-image:url('images/assets/create/visualmain.jpg');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(10,10,10,.68);
  z-index:-1;
}

/* ── CURSOR ── */
#cur-ring {
  position:fixed;width:30px;height:30px;
  border:1px solid rgba(210,35,35,.55);border-radius:50%;
  pointer-events:none;z-index:9998;transform:translate(-50%,-50%);
  transition:left .1s ease,top .1s ease,width .2s,height .2s,border-color .2s;
}
#cur-ring.hover{width:46px;height:46px;border-color:rgba(210,35,35,.9);}
#cur-cross{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cur-cross::before,#cur-cross::after{content:'';position:absolute;background:rgba(210,35,35,.8);}
#cur-cross::before{width:12px;height:1px;top:0;left:-6px;}
#cur-cross::after{width:1px;height:12px;left:0;top:-6px;}
@media (hover:none),(pointer:coarse){
  *{cursor:auto !important;}
  #cur-ring,#cur-cross{display:none;}
}

.scroll-container{
  flex:1;
  position:relative;
  overflow:hidden;
  padding-top:50px;
  padding-bottom:86px;
}

.project-group{ display:contents; }

.column{
  position:absolute;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:20px 8px;
  gap:6px;
}

/* ── CASE STUDY COLUMN — clickable, has a mini poster ── */
.column.case-clickable {
  cursor: pointer !important;
}
.column.case-clickable:hover .column-title {
  color: #B03020;
  transition: color .2s;
}
.column.case-clickable.as-case:hover .column-title {
  color: #C6E832;
}
.case-mini-poster {
  width: 84px;
  margin-top: 12px;
  border: 1px solid rgba(176,48,32,.35);
  border-radius: 2px;
  overflow: hidden;
  background: #0F0D0C;
}
.case-mini-poster.as-poster {
  border-color: rgba(198,232,50,.3);
}
.case-mini-poster svg { display: block; }
.case-open-hint {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #B03020;
  margin-top: 8px;
  opacity: .7;
}
.case-open-hint.as-hint { color: #C6E832; }

.column-header{text-align:center;margin-bottom:12px;z-index:10;}
.column-year{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#888;}
.column-title{font-size:14px;font-weight:900;letter-spacing:-.01em;text-transform:uppercase;margin-top:4px;color:#000;}
.column-subtitle{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:3px;color:#222;}

.image-item{
  position:relative;
  border:1px solid rgba(255,255,255,.07);
  background:#1a1a1a;
  overflow:hidden;
  border-radius:1px;
  flex-shrink:0;
  margin-top:-18px;
  transition:filter .3s;
}
.image-item:first-of-type{ margin-top:0; }
.image-item img{width:100%;height:100%;display:block;object-fit:cover;}
.image-item:hover{
  filter:brightness(1.15);
  z-index:20;
  position:relative;
}

.hdr{position:fixed;top:18px;left:36px;z-index:150;}
.back{font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;color:#555;transition:color .2s;}
.back:hover{color:#f5f5f5}

.modal{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;
  transition:opacity .3s,visibility .3s;
  padding:40px;
}
.modal.active{opacity:1;visibility:visible;}

.modal-content{
  position:relative;
  border:1px solid rgba(255,255,255,.12);
  max-width:95vw;max-height:90vh;width:100%;
  display:flex;border-radius:2px;overflow:hidden;
}
.modal-content.mode-row{max-width:99vw;max-height:96vh;}

/* ── CASE STUDY MODAL — wider, no image section ── */
.modal-content.mode-case {
  max-width: 720px;
  max-height: 88vh;
}

/* ── ARCHIVE/SPACE wider modal ── */
.modal-content.mode-case-as {
  max-width: 860px;
  max-height: 90vh;
}

.modal-image-section{
  flex:1;min-width:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(4,4,4,.65);
  position:relative;
}

/* ── CASE POSTER SECTION ── */
.modal-image-section.case-poster {
  background: #0F0D0C;
  flex: none;
  width: 260px;
  min-width: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.modal-single{flex:1;width:100%;min-height:0;display:flex;align-items:center;justify-content:center;}
.modal-single img{max-width:100%;max-height:100%;object-fit:contain;}

.modal-multi{
  display:none;flex:1;width:100%;min-height:0;
  padding:12px;gap:5px;align-items:center;justify-content:center;
  flex-wrap:nowrap;overflow:hidden;
}
.modal-multi.show{display:flex;}
.modal-multi.mode-collage{flex-wrap:wrap;align-content:center;}
.modal-multi.mode-collage img{width:calc(33.33% - 5px);height:auto;max-height:42vh;object-fit:contain;border:1px solid rgba(255,255,255,.05);}
.modal-multi.mode-row img{flex:1 1 0;min-width:0;height:78vh;object-fit:contain;border:1px solid rgba(255,255,255,.05);}
.modal-multi.mode-group img{flex:1 1 0;min-width:0;height:65vh;object-fit:contain;border:1px solid rgba(255,255,255,.05);}

.modal-nav-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:#f5f5f5;width:40px;height:40px;border-radius:50%;font-size:18px;
  transition:all .2s;z-index:10;
}
.modal-nav-btn:hover{background:rgba(255,255,255,.18);}
.modal-nav-btn.prev{left:15px}.modal-nav-btn.next{right:15px}
.modal-nav-btn.off,.modal-counter.off{display:none}
.modal-counter{position:absolute;bottom:15px;left:15px;font-size:10px;color:#999;background:rgba(0,0,0,.4);padding:6px 10px;border-radius:2px;}

.modal-info{
  width:300px;padding:32px 28px;display:flex;flex-direction:column;
  gap:16px;overflow-y:auto;border-left:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
  background:rgba(14,14,14,.92);
}
.modal-info::-webkit-scrollbar{width:3px}
.modal-info::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

/* ── CASE STUDY INFO PANEL ── */
.modal-info.case-info {
  width: 100%;
  flex: 1;
  gap: 0;
  border-left: none;
  padding: 32px 32px;
  background: rgba(10,10,10,.95);
}

.modal-title{font-size:18px;font-weight:900;letter-spacing:-.01em;color:#f5f5f5;}
.modal-subtitle{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#888;}
.modal-desc{font-size:11px;line-height:1.65;color:#999;white-space:pre-line;flex:1;}

/* ── CASE STUDY RICH CONTENT STYLES ── */
.case-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: #555;
  margin-bottom: 6px;
  display: block;
}
.case-rule {
  height: 1px;
  background: #B03020;
  width: 32px;
  margin: 18px 0 14px;
}
.case-rule.full { width: 100%; background: rgba(255,255,255,.07); margin: 20px 0; }
.case-body {
  font-size: 11px;
  line-height: 1.7;
  color: #888;
}
.case-body strong {
  color: #ccc;
  font-weight: 600;
}
.case-swatches {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.case-swatch {
  flex: 1;
  height: 28px;
  border-radius: 2px;
  display: flex;
  align-items: flex-end;
  padding: 3px 5px;
}
.case-swatch span {
  font-size: 7px;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.case-steps {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-top: 8px;
}
.case-step {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.05);
}
.case-step:last-child { border-bottom: none; }
.case-step-num {
  font-size: 8px;
  color: #444;
  min-width: 16px;
  padding-top: 2px;
  letter-spacing: .06em;
}
.case-step-text {
  font-size: 10px;
  line-height: 1.6;
  color: #777;
}
.case-step-text strong {
  color: #bbb;
  font-weight: 700;
  display: block;
  font-size: 10px;
  margin-bottom: 2px;
}
.case-tag {
  display: inline-block;
  font-size: 8px;
  padding: 2px 7px;
  border: 1px solid rgba(176,48,32,.4);
  border-radius: 20px;
  color: #B03020;
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-right: 4px;
  margin-bottom: 4px;
}
.case-note {
  font-size: 9px;
  line-height: 1.6;
  color: #555;
  border-left: 1px solid #B03020;
  padding-left: 10px;
  margin-top: 12px;
}

/* ── ARCHIVE/SPACE case specific ── */
.as-case-info {
  width: 100%;
  flex: 1;
  gap: 0;
  border-left: 1px solid rgba(198,232,50,.1);
  padding: 28px 30px;
  background: rgba(10,10,10,.97);
  overflow-y: auto;
}
.as-case-info::-webkit-scrollbar{width:3px}
.as-case-info::-webkit-scrollbar-thumb{background:#1e1e1e;border-radius:2px}

.modal-close{
  position:absolute;top:18px;right:18px;background:none;border:none;
  color:#888;font-size:22px;transition:color .2s;z-index:10;
}
.modal-close:hover{color:#f5f5f5}

.bottom-bar {
  position:fixed;
  bottom:0; left:0; right:0;
  height:200px;
  background: linear-gradient(to top,
    rgba(8,8,8,.97) 0%,
    rgba(8,8,8,.88) 25%,
    rgba(8,8,8,.60) 50%,
    rgba(8,8,8,.22) 72%,
    rgba(8,8,8,.0)  100%
  );
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  z-index:199;
  pointer-events:none;
}

.timeline-bottom{
  position:fixed;
  bottom:32px;
  left:0;right:0;
  height:46px;
  display:flex;align-items:center;
  z-index:200;
  pointer-events:none;
}

.timeline-line{
  position:absolute;
  left:24px;right:24px;
  height:1px;
  background:rgba(255,255,255,.12);
  top:50%;transform:translateY(-50%);
  z-index:1;
}

.timeline-content{
  position:relative;width:100%;height:100%;
  display:flex;align-items:center;
  justify-content:space-between;
  padding:0 24px;
  z-index:2;
}

.year-marker{
  display:flex;flex-direction:column;align-items:center;
  gap:4px;white-space:nowrap;flex-shrink:0;
}

.year-dot{
  border-radius:50%;
  background:rgba(255,255,255,.55);
  flex-shrink:0;
}
.year-marker.future .year-dot{background:#4d6aff;box-shadow:0 0 8px rgba(77,106,255,.5);}

.year-label{font-size:7px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#777;}
.year-marker.future .year-label{color:#4d6aff;}

.ftl{position:fixed;bottom:10px;left:36px;z-index:201;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
.ftl a{color:#f5f5f5;text-decoration:none;opacity:.75;transition:opacity .2s;pointer-events:auto;}
.ftl a:hover{opacity:1}
.ftr{position:fixed;bottom:10px;right:36px;z-index:201;display:flex;gap:8px;align-items:center;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
.ftr a{color:#f5f5f5;text-decoration:none;opacity:.75;transition:opacity .2s;pointer-events:auto;}
.ftr a:hover{opacity:1}
.ftr span{opacity:.1;color:#f5f5f5}

.modal-counter { display: none !important; }

@media (max-width: 640px), (max-height: 500px) {
  .modal {
    padding: 0;
    align-items: flex-start;
    overflow-y: auto;
  }
  .modal-content {
    flex-direction: column;
    width: 100%;
    max-width: 100vw;
    height: auto;
    min-height: 100vh;
    max-height: none;
    border-radius: 0;
    border: none;
  }
  .modal-content.mode-row { max-width: 100vw; max-height: none; }
  .modal-content.mode-case,
  .modal-content.mode-case-as {
    max-width: 100vw;
    max-height: none;
  }
  .modal-image-section {
    flex: none;
    width: 100%;
    height: auto;
    max-height: none;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-end;
  }
  .modal-image-section.case-poster {
    width: 100%;
    min-width: 0;
    padding: 32px 24px;
  }
  .modal-single {
    flex: none;
    width: 100%;
    height: auto;
  }
  .modal-single img {
    width: 100%;
    height: auto;
    max-height: none;
    object-fit: contain;
  }
  .modal-multi {
    flex: none;
    width: 100%;
    height: auto;
    padding: 8px;
    gap: 6px;
    overflow-x: auto;
    overflow-y: hidden;
    flex-wrap: nowrap;
    justify-content: flex-start;
    align-items: center;
  }
  .modal-multi.mode-row {
    overflow-x: auto;
  }
  .modal-multi.mode-row img {
    height: 50vw;
    width: auto;
    flex-shrink: 0;
    object-fit: contain;
  }
  .modal-multi.mode-group img {
    height: 65vw;
    width: auto;
    flex-shrink: 0;
    object-fit: contain;
  }
  .modal-multi.mode-collage {
    flex-wrap: wrap;
    overflow-x: hidden;
    justify-content: center;
  }
  .modal-multi.mode-collage img {
    width: calc(50% - 4px);
    height: auto;
    max-height: none;
    object-fit: contain;
  }
  .modal-image-section { position: relative; }
  .modal-nav-btn {
    top: auto;
    bottom: 12px;
    transform: none;
    background: rgba(140,140,140,.25);
    border-color: rgba(180,180,180,.3);
    color: rgba(255,255,255,.7);
    width: 36px; height: 36px; font-size: 16px;
  }
  .modal-nav-btn.prev { left: 12px; }
  .modal-nav-btn.next { right: 12px; }
  .modal-info {
    flex: none;
    width: 100%;
    height: auto;
    max-height: none;
    border-left: none;
    border-top: 1px solid rgba(255,255,255,.1);
    padding: 24px 20px 48px;
    overflow-y: visible;
  }
  .modal-info.case-info,
  .as-case-info {
    padding: 24px 20px 48px;
  }
}

@media (max-width: 768px) {
  .scroll-container {
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    padding-top: 60px;
    padding-bottom: 90px;
  }
  .column {
    position: relative !important;
    left: auto !important;
    top: auto !important;
    width: 45vw !important;
    flex-shrink: 0;
    margin-right: 4px;
  }
  .column.group-start { margin-left: 24px; }
}
</style>
</head>

/* ── MODAL HELPERS ── */
function setSingle() {
  modalSingleView.style.display = 'flex';
  modalMultiView.className = 'modal-multi';
  modalContent.classList.remove('mode-row','mode-case','mode-case-as');
}
function setMulti(mode) {
  modalSingleView.style.display = 'none';
  modalMultiView.className = 'modal-multi show mode-' + mode;
  if (mode==='row') modalContent.classList.add('mode-row');
  else modalContent.classList.remove('mode-row');
}
function showNav(on) {
  modalPrev.classList.toggle('off',!on);
  modalNext.classList.toggle('off',!on);
  modalCounter.classList.toggle('off',!on);
}
function setInfo(title, subtitle, desc) {
  modalTitle.textContent    = title    || '';
  modalSubtitle.textContent = subtitle || '';
  modalDesc.textContent     = desc     || '';
}
function buildMultiImgs(paths) {
  modalMultiView.innerHTML = '';
  paths.forEach(src => {
    const img = document.createElement('img');
    img.src = src; img.alt = '';
    img.onerror = ()=>{ img.style.opacity='0.2'; };
    modalMultiView.appendChild(img);
  });
}

/* ── ROUTE CASE MODALS ── */
function openModalCase(proj) {
  if (proj.id === 'archive-space') {
    openModalCaseArchive(proj);
    return;
  }
  if (proj.id === 'ostatok') {
    openModalCaseOstatok(proj);
    return;
  }
}

/* ── OPEN MODAL (main entry) ── */
function openModal(proj, fileIdx) {
  resetModal();
  currentProject  = proj;
  currentImageIdx = fileIdx;

  if (proj.type === 'case') {
    openModalCase(proj);
    return;
  }

  if (proj.id === 'Self-Portrait') {
    setMulti('collage');
    showNav(false);
    buildMultiImgs(proj.files.map(f=>f.path));
    setInfo(proj.name, proj.subtitle, proj.desc);

  } else if (proj.id === 'bti') {
    setMulti('row');
    showNav(false);
    buildMultiImgs(proj.files.map(f=>f.path));
    setInfo(proj.name, proj.subtitle, proj.desc);

  } else if (proj.id === 'clo') {
    const group = getCloGroup(fileIdx);
    setInfo(proj.name, group.name||proj.subtitle, group.desc||proj.desc);
    if (group.files.length===1) {
      setSingle();
      modalImg.src = proj.files[fileIdx].path;
    } else {
      setMulti('group');
      buildMultiImgs(group.files.map(i=>proj.files[i].path));
    }
    showNav(true);
    const gIdx = CLO_GROUPS.findIndex(g=>g.files.includes(fileIdx));
    modalCounter.textContent = `${gIdx+1} / ${CLO_GROUPS.length}`;

  } else {
    setSingle();
    modalImg.src = proj.files[fileIdx].path;
    showNav(true);
    modalCounter.textContent = `${fileIdx+1} / ${proj.files.length}`;
    setInfo(proj.name, proj.subtitle, proj.desc);
  }

  modal.classList.add('active');
}

function navSingle(dir) {
  if (!currentProject||!currentProject.files.length) return;
  currentImageIdx=(currentImageIdx+dir+currentProject.files.length)%currentProject.files.length;
  modalImg.src=currentProject.files[currentImageIdx].path;
  modalCounter.textContent=`${currentImageIdx+1} / ${currentProject.files.length}`;
}

function navClo(dir) {
  const gIdx=CLO_GROUPS.findIndex(g=>g.files.includes(currentImageIdx));
  const nextIdx=(gIdx+dir+CLO_GROUPS.length)%CLO_GROUPS.length;
  const nextGroup=CLO_GROUPS[nextIdx];
  currentImageIdx=nextGroup.files[0];
  openModal(currentProject,currentImageIdx);
}

modalClose.onclick = () => modal.classList.remove('active');
modal.onclick      = e => { if (e.target===modal) modal.classList.remove('active'); };
modalPrev.onclick  = () => currentProject?.id==='clo'?navClo(-1):navSingle(-1);
modalNext.onclick  = () => currentProject?.id==='clo'?navClo(+1):navSingle(+1);
document.addEventListener('keydown', e => {
  if (!modal.classList.contains('active')) return;
  if (e.key==='Escape') modal.classList.remove('active');
  if (e.key==='ArrowLeft'  && !modalPrev.classList.contains('off'))
    currentProject?.id==='clo'?navClo(-1):navSingle(-1);
  if (e.key==='ArrowRight' && !modalNext.classList.contains('off'))
    currentProject?.id==='clo'?navClo(+1):navSingle(+1);
});

/* ── BUILD SCROLL CONTAINER ── */
function buildScrollContainer() {
  scrollContainer.innerHTML = '';
  const PER_COL = 7;
  const isMobile = window.innerWidth <= 768;

  projects.forEach((proj, projIdx) => {
    const group    = document.createElement('div');
    group.className = 'project-group';
    const colCount = proj.files.length > 0 ? Math.ceil(proj.files.length/PER_COL) : 1;

    for (let col=0; col<colCount; col++) {
      const column     = document.createElement('div');
      column.className = 'column';
      column.dataset.projId = proj.id;
      if (col===0) column.classList.add('group-start');

      if (proj.type==='case') {
        column.classList.add('case-clickable');
        if (proj.id === 'archive-space') column.classList.add('as-case');
        column.onclick = () => openModalCase(proj);
      }

      if (col===0) {
        const hdr = document.createElement('div');
        hdr.className = 'column-header';
        hdr.innerHTML = `
          <div class="column-year">${proj.year}</div>
          <div class="column-title">${proj.name}</div>
          ${proj.subtitle ? `<div class="column-subtitle">${proj.subtitle}</div>` : ''}
        `;
        column.appendChild(hdr);

        if (proj.type==='case') {
          const poster = document.createElement('div');
          poster.className = 'case-mini-poster';
          if (proj.id === 'archive-space') {
            poster.classList.add('as-poster');
            poster.innerHTML = AS_MINI_POSTER_SVG;
          } else {
            poster.innerHTML = MINI_POSTER_SVG;
          }
          column.appendChild(poster);
          const hint = document.createElement('div');
          hint.className = 'case-open-hint';
          if (proj.id === 'archive-space') hint.classList.add('as-hint');
          hint.textContent = '→ Open';
          column.appendChild(hint);
        }
      }

      const start = col*PER_COL;
      const end   = Math.min(start+PER_COL, proj.files.length);
      for (let i=start; i<end; i++) {
        const f    = proj.files[i];
        const item = document.createElement('div');
        item.className = 'image-item';
        item.style.width  = f.width  + 'px';
        item.style.height = f.height + 'px';
        const img = document.createElement('img');
        img.src = f.path;
        img.alt = `${proj.name} ${i+1}`;
        img.onerror = () => { img.style.opacity='0.3'; };
        item.appendChild(img);
        item.onclick = () => openModal(proj, i);
        column.appendChild(item);
      }

      group.appendChild(column);
    }
    scrollContainer.appendChild(group);
  });

  if (!isMobile) {
    distributeColumns();
  } else {
    Array.from(scrollContainer.querySelectorAll('.project-group')).forEach(g => {
      while (g.firstChild) scrollContainer.appendChild(g.firstChild);
      g.remove();
    });
  }
}

/* ── DISTRIBUTE COLUMNS ── */
function distributeColumns() {
  const W = scrollContainer.clientWidth;
  if (!W) { requestAnimationFrame(distributeColumns); return; }

  const PADDING = 24;
  const COL_W   = 100;

  const groups = Array.from(scrollContainer.querySelectorAll('.project-group'));
  const cols   = [];
  groups.forEach(g => Array.from(g.querySelectorAll('.column')).forEach(c => cols.push(c)));

  const N = cols.length;
  if (N===0) return;

  const WITHIN_GAP  = 8;
  const BETWEEN_GAP = 48;

  groups.forEach(g => {
    while (g.firstChild) scrollContainer.appendChild(g.firstChild);
    g.remove();
  });

  let x = PADDING;
  cols.forEach((col, i) => {
    col.style.position = 'absolute';
    col.style.left     = Math.round(x) + 'px';
    col.style.top      = '80px';
    col.style.width    = COL_W + 'px';
    col.style.zIndex   = String(i+1);
    if (i < N-1) {
      const sameProj = cols[i].dataset.projId === cols[i+1].dataset.projId;
      x += COL_W + (sameProj ? WITHIN_GAP : BETWEEN_GAP);
    }
  });
}

let lastMobile = window.innerWidth <= 768;
window.addEventListener('resize', () => {
  const nowMobile = window.innerWidth <= 768;
  if (nowMobile !== lastMobile) {
    lastMobile = nowMobile;
    buildScrollContainer();
  } else if (!nowMobile) {
    distributeColumns();
  }
});

/* ── BUILD TIMELINE ── */
function buildTimeline() {
  timelineContent.innerHTML = '';
  const YEARS = [
    {label:'2019',size:14},{label:'2020',size:14},{label:'2021',size:12},
    {label:'2022',size:8},{label:'2023',size:22},{label:'2024',size:13},
    {label:'2025',size:14},{label:'2026',size:8},{label:'FUTURE',size:9,future:true}
  ];
  YEARS.forEach(y => {
    const m = document.createElement('div');
    m.className = 'year-marker' + (y.future?' future':'');
    const dot = document.createElement('div');
    dot.className = 'year-dot';
    dot.style.width = y.size+'px';
    dot.style.height = y.size+'px';
    const label = document.createElement('div');
    label.className = 'year-label';
    label.textContent = y.label;
    m.appendChild(dot);
    m.appendChild(label);
    timelineContent.appendChild(m);
  });
}
