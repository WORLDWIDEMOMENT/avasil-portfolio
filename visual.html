<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual — AV</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
::selection { background: #2a2a2a; color: #eeeeee; }

:root {
  --bg:    #0a0a0a;
  --white: #eeeeee;
  --dim:   rgba(238,238,238,.38);
  --line:  rgba(238,238,238,.1);
  --blue:  #4d6aff;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  min-height: 100vh;
  cursor: none;
  overflow-x: hidden;
}

/* ── CURSOR ── */
#cur {
  position: fixed; z-index: 9999;
  width: 10px; height: 10px;
  background: var(--white); border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%,-50%);
  transition: width .15s, height .15s;
  mix-blend-mode: difference;
}
#cur.big { width: 50px; height: 50px; }
@media (hover:none) { #cur { display: none; } }

/* ── GRAIN ── */
.grain {
  position: fixed; inset: 0; pointer-events: none; z-index: 200; opacity: .04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 160px 160px;
}

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 34px 48px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  background: linear-gradient(to bottom, rgba(10,10,10,1) 65%, transparent);
}

.back {
  font-size: 11px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  text-decoration: none; color: var(--dim);
  transition: color .2s; flex-shrink: 0;
}
.back:hover { color: var(--white); }

/* tabs */
.tabs {
  display: flex; gap: 0;
  border: 1px solid var(--line);
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 7px 20px;
  font-size: 9px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--dim);
  border-right: 1px solid var(--line);
  cursor: none;
  transition: color .2s;
  white-space: nowrap; user-select: none;
  position: relative;
}
.tab:last-child { border-right: none; }
.tab:hover { color: var(--white); }
.tab.active { color: var(--white); }
.tab.active::after {
  content:'';
  position: absolute; left: 0; right: 0; bottom: -1px;
  height: 2px; background: var(--blue);
}
.tab .count { color: var(--blue); margin-left: 5px; font-size: 8px; }

/* ── BG WORD ── */
.bg-word {
  position: fixed;
  bottom: -24px; right: -12px;
  font-size: clamp(120px, 17vw, 220px);
  font-weight: 900; letter-spacing: -.04em; text-transform: uppercase;
  color: rgba(255,255,255,.025);
  pointer-events: none; z-index: 0;
  user-select: none; line-height: 1;
  transition: opacity .4s;
}

/* ── MAIN ── */
.main {
  position: relative; z-index: 1;
  padding: 108px 48px 120px;
}

/* ── MASONRY ── */
.grid {
  columns: 4;
  column-gap: 5px;
}

/* ── CARD ── */
.card {
  break-inside: avoid;
  margin-bottom: 5px;
  position: relative;
  overflow: hidden;
  cursor: none;
  display: block;
  opacity: 0;
  transform: translateY(22px);
  transition: opacity .42s ease, transform .42s ease;
}
.card.in  { opacity: 1; transform: none; }
.card.out { opacity: 0; transform: translateY(-10px) scale(.97); transition: opacity .22s, transform .22s; }

.card .inner { position: relative; overflow: hidden; display: block; }
.card .inner img {
  display: block; width: 100%; height: 100%; object-fit: cover;
  transition: transform .5s cubic-bezier(.4,0,.2,1), filter .5s;
  filter: grayscale(12%);
}
.card:hover .inner img { transform: scale(1.045); filter: grayscale(0%) brightness(1.07); }

/* placeholder bg when image absent */
.card .ph {
  display: block; width: 100%;
  background: #141414;
  border: 1px solid #1c1c1c;
}

/* sizes */
.sz-tall  .ph, .sz-tall  img { aspect-ratio: 3/4; }
.sz-wide  .ph, .sz-wide  img { aspect-ratio: 4/3; }
.sz-sq    .ph, .sz-sq    img { aspect-ratio: 1/1; }
.sz-port  .ph, .sz-port  img { aspect-ratio: 2/3; }
.sz-land  .ph, .sz-land  img { aspect-ratio: 16/9; }

/* caption */
.cap {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 32px 12px 10px;
  background: linear-gradient(transparent, rgba(0,0,0,.8));
  transform: translateY(100%);
  transition: transform .3s ease;
  display: flex; justify-content: space-between; align-items: flex-end;
  pointer-events: none;
}
.card:hover .cap { transform: translateY(0); }
.cap-title { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; }
.cap-cat   { font-size: 8px;  font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--blue); }

/* ── FOOTER ── */
.footer {
  position: fixed; bottom: 28px; right: 48px;
  display: flex; gap: 14px; align-items: center;
  font-size: 10px; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase;
  z-index: 100;
}
.footer a { color: var(--white); text-decoration: none; opacity: .4; transition: opacity .2s; }
.footer a:hover { opacity: 1; }
.footer .sep { opacity: .18; }

/* ── RESPONSIVE ── */
@media (max-width: 1100px) { .grid { columns: 3; } }
@media (max-width: 780px) {
  .grid { columns: 2; }
  .header { padding: 22px 22px 14px; flex-wrap: wrap; gap: 12px; }
  .main { padding: 120px 10px 100px; }
  .footer { right: 22px; flex-wrap: wrap; gap: 8px; }
  .footer .sep { display: none; }
}
@media (max-width: 440px) {
  .grid { columns: 1; }
  .bg-word { font-size: 80px; }
}
</style>
</head>
<body>

<div id="cur"></div>
<div class="grain"></div>
<div class="bg-word" id="bgWord">Visual</div>

<header class="header">
  <a href="index.html" class="back">← Back</a>
  <nav class="tabs" id="tabs">
    <div class="tab active" data-cat="all">All<span class="count" id="cnt-all"></span></div>
    <div class="tab" data-cat="scan">Scan<span class="count" id="cnt-scan"></span></div>
    <div class="tab" data-cat="none">None of them is me<span class="count" id="cnt-none"></span></div>
    <div class="tab" data-cat="custom">Custom<span class="count" id="cnt-custom"></span></div>
    <div class="tab" data-cat="other">Other<span class="count" id="cnt-other"></span></div>
  </nav>
</header>

<main class="main">
  <div class="grid" id="grid"></div>
</main>

<footer class="footer">
  <a href="mailto:navilen@bk.ru">navilen@bk.ru</a>
  <span class="sep">—</span>
  <a href="https://www.instagram.com/molodostibolshenebudet/" target="_blank">Instagram</a>
  <span class="sep">—</span>
  <a href="https://www.behance.net/avasileuskaya" target="_blank">Behance</a>
  <span class="sep">—</span>
  <a href="https://linkedin.com/in/worldwidemoment/" target="_blank">LinkedIn</a>
</footer>

<script>
/* ═══════════════════════════════════════════════════
   DATA
   sizes: tall | wide | sq | port | land
   img: path to real file — if missing, shows placeholder
   ═══════════════════════════════════════════════════ */
const ITEMS = [
  // ── SCAN ──
  { cat:'scan',   title:'Scan 01', size:'tall', img:'images/assets/create/scan/Scan1.jpg' },
  { cat:'scan',   title:'Scan 02', size:'sq',   img:'images/assets/create/scan/Scan2.JPG' },
  { cat:'scan',   title:'Scan 03', size:'port', img:'images/assets/create/scan/Scan3.JPG' },
  { cat:'scan',   title:'Scan 04', size:'wide', img:'images/assets/create/scan/Scan4.JPG' },
  { cat:'scan',   title:'Scan 05', size:'tall', img:'images/assets/create/scan/Scan5.JPG' },
  { cat:'scan',   title:'Scan 06', size:'sq',   img:'images/assets/create/scan/Scan6.JPG' },
  { cat:'scan',   title:'Scan 07', size:'land', img:'iimages/assets/create/scan/Scan7.jpg' },
  { cat:'scan',   title:'Scan 08', size:'port', img:'images/assets/create/scan/Scan8.JPG' },
  { cat:'scan',   title:'Scan 09', size:'port', img:'images/assets/create/scan/Scan9.JPG' },
  { cat:'scan',   title:'Scan 10', size:'port', img:'images/assets/create/scan/Scan10.jpg' },
  // ── NONE OF THEM IS ME ──
  { cat:'none',   title:'#01',     size:'tall', img:'images/assets/create/portrait/Portrait1.jpg' },
  { cat:'none',   title:'#02',     size:'wide', img:'images/assets/create/portrait/Portrait2.jpg' },
  { cat:'none',   title:'#03',     size:'sq',   img:'images/assets/create/portrait/Portrait3.jpg' },
  { cat:'none',   title:'#04',     size:'port', img:'images/assets/create/portrait/Portrait4.jpg' },
  { cat:'none',   title:'#05',     size:'tall', img:'images/assets/create/portrait/Portrait5.jpg' },
  { cat:'none',   title:'#06',     size:'land', img:'images/assets/create/portrait/Portrait6.jpg' },
  
  // ── CUSTOM ──
  { cat:'custom', title:'Custom 01', size:'tall', img:'images/assets/create/custom-01.jpg' },
  { cat:'custom', title:'Custom 02', size:'sq',   img:'images/assets/create/custom-02.jpg' },
  { cat:'custom', title:'Custom 03', size:'wide', img:'images/assets/create/custom-03.jpg' },
  { cat:'custom', title:'Custom 04', size:'port', img:'images/assets/create/custom-04.jpg' },
  { cat:'custom', title:'Custom 05', size:'tall', img:'images/assets/create/custom-05.jpg' },
  { cat:'custom', title:'Custom 06', size:'land', img:'images/assets/create/custom-06.jpg' },
  // ── OTHER ──
  { cat:'other',  title:'Visual 01', size:'sq',   img:'images/assets/create/other-01.jpg' },
  { cat:'other',  title:'Visual 02', size:'tall', img:'images/assets/create/other-02.jpg' },
  { cat:'other',  title:'Visual 03', size:'wide', img:'images/assets/create/other-03.jpg' },
  { cat:'other',  title:'Visual 04', size:'port', img:'images/assets/create/other-04.jpg' },
];

const CAT_LABEL = { scan:'Scan', none:'None of them is me', custom:'Custom', other:'Other' };
const VALID_CATS = ['all','scan','none','custom','other'];
let activeCat = 'all';

/* ── COUNTS ── */
function updateCounts() {
  document.getElementById('cnt-all').textContent = ' ' + ITEMS.length;
  ['scan','none','custom','other'].forEach(c => {
    const el = document.getElementById('cnt-' + c);
    if (el) el.textContent = ' ' + ITEMS.filter(i => i.cat === c).length;
  });
}

/* ── BUILD CARD ── */
function makeCard(item) {
  const card = document.createElement('div');
  card.className = `card sz-${item.size}`;
  card.dataset.cat = item.cat;

  const inner = document.createElement('div');
  inner.className = 'inner';

  const img = document.createElement('img');
  img.src = item.img;
  img.alt = item.title;
  img.loading = 'lazy';
  img.onerror = function() {
    const ph = document.createElement('div');
    ph.className = 'ph';
    inner.replaceChild(ph, this);
  };
  inner.appendChild(img);

  const cap = document.createElement('div');
  cap.className = 'cap';
  cap.innerHTML = `<span class="cap-title">${item.title}</span><span class="cap-cat">${CAT_LABEL[item.cat] || item.cat}</span>`;
  inner.appendChild(cap);
  card.appendChild(inner);
  return card;
}

/* ── RENDER ── */
const grid = document.getElementById('grid');
const bgWord = document.getElementById('bgWord');

function render(cat, animate) {
  const list = cat === 'all' ? ITEMS : ITEMS.filter(i => i.cat === cat);
  // update bg word
  bgWord.textContent = cat === 'all' ? 'Visual' : (CAT_LABEL[cat] || cat);

  if (animate) {
    [...grid.children].forEach(c => c.classList.add('out'));
    setTimeout(() => { grid.innerHTML = ''; inject(list); }, 240);
  } else {
    grid.innerHTML = ''; inject(list);
  }
}

function inject(list) {
  list.forEach((item, i) => {
    const card = makeCard(item);
    grid.appendChild(card);
    requestAnimationFrame(() =>
      setTimeout(() => card.classList.add('in'), 20 + i * 38)
    );
  });
}

/* ── TABS ── */
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  const cat = tab.dataset.cat;
  if (cat === activeCat) return;
  activeCat = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
  history.replaceState(null, '', '#' + cat);
  render(cat, true);
});

/* ── CURSOR ── */
const cur = document.getElementById('cur');
if (window.matchMedia('(hover:hover)').matches) {
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });
  document.addEventListener('mouseover', e => {
    cur.classList.toggle('big', !!e.target.closest('a,.tab,.card'));
  });
}

/* ── DEEP LINK ── */
function readHash() {
  const h = location.hash.replace('#','');
  return VALID_CATS.includes(h) ? h : 'all';
}

/* ── INIT ── */
updateCounts();
activeCat = readHash();
document.querySelectorAll('.tab').forEach(t =>
  t.classList.toggle('active', t.dataset.cat === activeCat)
);
render(activeCat, false);

window.addEventListener('hashchange', () => {
  const cat = readHash();
  if (cat !== activeCat) {
    activeCat = cat;
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.dataset.cat === activeCat)
    );
    render(cat, true);
  }
});
</script>
</body>
</html>
