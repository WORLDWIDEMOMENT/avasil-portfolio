<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual — AV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
* { cursor: none !important; }
html,body{width:100%;height:100%;background:#0a0a0a;font-family:'Barlow',sans-serif;color:#f5f5f5;overflow:hidden}

body{
  display:flex;
  flex-direction:column;
  background-image:url('images/assets/create/visualmain.jpg');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(10,10,10,.68);
  z-index:-1;
}

/* ── CURSOR ── */
#cur-ring {
  position:fixed;width:30px;height:30px;
  border:1px solid rgba(245,245,245,.45);border-radius:50%;
  pointer-events:none;z-index:9998;transform:translate(-50%,-50%);
  transition:left .1s ease,top .1s ease,width .2s,height .2s,border-color .2s;
}
#cur-ring.hover{width:46px;height:46px;border-color:rgba(245,245,245,.75);}
#cur-cross{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cur-cross::before,#cur-cross::after{content:'';position:absolute;background:rgba(245,245,245,.6);}
#cur-cross::before{width:12px;height:1px;top:0;left:-6px;}
#cur-cross::after{width:1px;height:12px;left:0;top:-6px;}
@media (hover:none),(pointer:coarse){
  *{cursor:auto !important;}
  #cur-ring,#cur-cross{display:none;}
}

/* ── SCROLL CONTAINER ──
   No horizontal scroll. Position:relative so columns can be absolutely placed.
   padding-top: below the back link.
   padding-bottom: space for timeline + footer.
── */
.scroll-container{
  flex:1;
  position:relative;
  overflow:hidden;
  padding-top:50px;
  padding-bottom:86px;
}

/* ── PROJECT GROUP — no visual effect, JS removes and replaces with abs columns ── */
.project-group{ display:contents; }

/* ── COLUMN ── */
.column{
  position:absolute; /* JS sets left, width, z-index */
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:20px 8px;
  gap:6px;
}

.column-header{text-align:center;margin-bottom:12px;z-index:10;}
.column-year{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#888;}
.column-title{font-size:10px;font-weight:900;letter-spacing:-.01em;text-transform:uppercase;margin-top:2px;color:#f5f5f5;}
.column-subtitle{font-size:7px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;color:#555;}

/* ── IMAGE ITEM ── */
.image-item{
  position:relative;
  border:1px solid rgba(255,255,255,.07);
  background:#1a1a1a;
  overflow:hidden;
  border-radius:1px;
  flex-shrink:0;
  margin-top:-18px; /* overlap: each image slides up over the previous */
  transition:filter .3s;
}
.image-item:first-of-type{ margin-top:0; }
.image-item img{width:100%;height:100%;display:block;object-fit:cover;}
.image-item:hover{
  filter:brightness(1.15);
  z-index:20;
  position:relative;
}

/* ── BACK LINK — floating, no panel ── */
.hdr{position:fixed;top:18px;left:36px;z-index:150;}
.back{font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;color:#555;transition:color .2s;}
.back:hover{color:#f5f5f5}

/* ── MODAL ──
   Background = blur of the actual page behind it (not solid black).
── */
.modal{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.45);   /* semi-transparent only */
  backdrop-filter:blur(18px);   /* blurs the page content behind */
  -webkit-backdrop-filter:blur(18px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;
  transition:opacity .3s,visibility .3s;
  padding:40px;
}
.modal.active{opacity:1;visibility:visible;}

.modal-content{
  position:relative;
  border:1px solid rgba(255,255,255,.12);
  max-width:95vw;max-height:90vh;width:100%;
  display:flex;border-radius:2px;overflow:hidden;
}
.modal-content.mode-row{max-width:99vw;max-height:96vh;}

.modal-image-section{
  flex:1;min-width:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(4,4,4,.65); /* semi-transparent dark for image area */
  position:relative;
}

.modal-single{flex:1;width:100%;min-height:0;display:flex;align-items:center;justify-content:center;}
.modal-single img{max-width:100%;max-height:100%;object-fit:contain;}

.modal-multi{
  display:none;flex:1;width:100%;min-height:0;
  padding:12px;gap:5px;align-items:center;justify-content:center;
  flex-wrap:nowrap;overflow:hidden;
}
.modal-multi.show{display:flex;}
.modal-multi.mode-collage{flex-wrap:wrap;align-content:center;}
.modal-multi.mode-collage img{width:calc(33.33% - 5px);height:auto;max-height:42vh;object-fit:contain;border:1px solid rgba(255,255,255,.05);}
.modal-multi.mode-row img{flex:1 1 0;min-width:0;height:78vh;object-fit:contain;border:1px solid rgba(255,255,255,.05);}
.modal-multi.mode-group img{flex:1 1 0;min-width:0;height:65vh;object-fit:contain;border:1px solid rgba(255,255,255,.05);}

.modal-nav-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:#f5f5f5;width:40px;height:40px;border-radius:50%;font-size:18px;
  transition:all .2s;z-index:10;
}
.modal-nav-btn:hover{background:rgba(255,255,255,.18);}
.modal-nav-btn.prev{left:15px}.modal-nav-btn.next{right:15px}
.modal-nav-btn.off,.modal-counter.off{display:none}
.modal-counter{position:absolute;bottom:15px;left:15px;font-size:10px;color:#999;background:rgba(0,0,0,.4);padding:6px 10px;border-radius:2px;}

/* ── MODAL INFO PANEL ──
   TEXTURE: replace `background` below with your texture.
   Example: background: url('images/assets/create/scan/Scan1.jpg') center/cover, rgba(12,12,12,.88);
   Or:      background: url('images/assets/background.jpg') center/cover, rgba(8,8,8,.85);
── */
.modal-info{
  width:300px;padding:32px 28px;display:flex;flex-direction:column;
  gap:16px;overflow-y:auto;border-left:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
  /* ↓ REPLACE THIS LINE WITH YOUR TEXTURE */
  background:rgba(14,14,14,.92);
}
.modal-info::-webkit-scrollbar{width:3px}
.modal-info::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

.modal-title{font-size:18px;font-weight:900;letter-spacing:-.01em;color:#f5f5f5;}
.modal-subtitle{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#888;}
.modal-desc{font-size:11px;line-height:1.65;color:#999;white-space:pre-line;flex:1;}

.modal-close{
  position:absolute;top:18px;right:18px;background:none;border:none;
  color:#888;font-size:22px;transition:color .2s;z-index:10;
}
.modal-close:hover{color:#f5f5f5}

/* ── TIMELINE ── fixed, above footer, spans full width ── */
.timeline-bottom{
  position:fixed;
  bottom:32px; /* above footer links */
  left:0;right:0;
  height:46px;
  display:flex;align-items:center;
  z-index:200;
  pointer-events:none;
  /* subtle bg so the line is readable */
  background:linear-gradient(to top,rgba(10,10,10,.7),transparent);
}

/* horizontal line spanning full width */
.timeline-line{
  position:absolute;
  left:24px;right:24px;
  height:1px;
  background:rgba(255,255,255,.12);
  top:50%;transform:translateY(-50%);
  z-index:1;
}

/* markers distributed evenly via flexbox */
.timeline-content{
  position:relative;width:100%;height:100%;
  display:flex;align-items:center;
  justify-content:space-between;
  padding:0 24px;
  z-index:2;
}

.year-marker{
  display:flex;flex-direction:column;align-items:center;
  gap:4px;white-space:nowrap;flex-shrink:0;
}

/* dot — size set via inline style in JS */
.year-dot{
  border-radius:50%;
  background:rgba(255,255,255,.55);
  flex-shrink:0;
}
.year-marker.future .year-dot{background:#4d6aff;box-shadow:0 0 8px rgba(77,106,255,.5);}

.year-label{font-size:7px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#777;}
.year-marker.future .year-label{color:#4d6aff;}

/* ── FOOTER — at very bottom ── */
.ftl{position:fixed;bottom:10px;left:36px;z-index:100;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
.ftl a{color:#f5f5f5;text-decoration:none;opacity:.22;transition:opacity .2s;}
.ftl a:hover{opacity:1}
.ftr{position:fixed;bottom:10px;right:36px;z-index:100;display:flex;gap:8px;align-items:center;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
.ftr a{color:#f5f5f5;text-decoration:none;opacity:.22;transition:opacity .2s;}
.ftr a:hover{opacity:1}
.ftr span{opacity:.08;color:#f5f5f5}
</style>
</head>
<body>

<!-- CURSOR -->
<div id="cur-ring"></div>
<div id="cur-cross"></div>

<!-- BACK LINK — floating, no panel -->
<div class="hdr"><a href="index.html" class="back">← Back</a></div>

<div class="scroll-container" id="scrollContainer"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <button class="modal-close" id="modalClose">✕</button>
  <div class="modal-content" id="modalContent">
    <div class="modal-image-section">
      <div class="modal-single" id="modalSingleView">
        <img id="modalImg" src="" alt="">
      </div>
      <div class="modal-multi" id="modalMultiView"></div>
      <button class="modal-nav-btn prev" id="modalPrev">‹</button>
      <button class="modal-nav-btn next" id="modalNext">›</button>
      <div class="modal-counter" id="modalCounter"></div>
    </div>
    <div class="modal-info">
      <div class="modal-title"    id="modalTitle"></div>
      <div class="modal-subtitle" id="modalSubtitle"></div>
      <p   class="modal-desc"     id="modalDesc"></p>
    </div>
  </div>
</div>

<!-- TIMELINE — years 2019–FUTURE, fixed above footer -->
<div class="timeline-bottom" id="timelineBottom">
  <div class="timeline-line"></div>
  <div class="timeline-content" id="timelineContent"></div>
</div>

<!-- FOOTER — at very bottom -->
<div class="ftl"><a href="about.html">About</a></div>
<div class="ftr">
  <a href="mailto:navilen@bk.ru">navilen@bk.ru</a><span>—</span>
  <a href="https://instagram.com/molodostibolshenebudet/" target="_blank">Instagram</a><span>—</span>
  <a href="https://behance.net/avasileuskaya" target="_blank">Behance</a><span>—</span>
  <a href="https://linkedin.com/in/worldwidemoment/" target="_blank">LinkedIn</a>
</div>

<script>
/* ─────────────────────────────────────────
   CLO GROUPS — each group has its own name and desc.
   files: 0-indexed array of cloth file indices.
   Edit name/desc here to update per-group modal text.
───────────────────────────────────────── */
const CLO_GROUPS = [
  {
    files: [0,1,2],
    name: 'TEKKONKINKREET',
    desc: 'Hand-painted garments inspired by the aesthetic.\nNo sketch, no transfer.\nThe painting grew from the fabric up.'
  },
  {
    files: [3,4],
    name: 'UNTITLED SERIES',
    desc: 'Experimental clothing pieces.\nExploring boundaries of wearable art.'
  },
  {
    files: [5,6],
    name: 'MIXED MEDIA · I',
    desc: 'First experiments combining textile with paint and other materials.\nLayering textures directly onto the fabric.'
  },
  {
    files: [7,8,9],
    name: 'MIXED MEDIA · II',
    desc: 'Continuing the series — heavier compositions.\nMore layers, more material conflict.'
  },
  {
    files: [10,11],
    name: 'MIXED MEDIA · III',
    desc: 'Further layering of texture and paint.\nRestraint in palette, density in application.'
  },
  {
    files: [12],
    name: 'SOLO PIECE',
    desc: 'A standalone work — singular in approach and execution.\nThis one needed nothing added.'
  },
  {
    files: [13,14,15],
    name: 'MIXED MEDIA · IV',
    desc: 'New directions — larger scale, looser stroke.\nThe series becoming less about control.'
  },
  {
    files: [16,17],
    name: 'MIXED MEDIA · V',
    desc: 'Late series. Restraint where earlier was excess.\nLess surface, more intention.'
  },
  {
    files: [18,19],
    name: 'MIXED MEDIA · VI',
    desc: 'Final works in the CLO series.\nWhat remains when the system is exhausted.'
  }
];

function getCloGroup(idx) {
  for (const g of CLO_GROUPS) {
    if (g.files.includes(idx)) return g;
  }
  return { files: [idx], name: null, desc: null };
}

/* ─────────────────────────────────────────
   PROJECT DATA
   Image sizes: smaller (58–80px) to fit no-scroll layout.
   Width/height vary per project type for visual interest.
───────────────────────────────────────── */
const projects = [
  {
    id: 'pilots',
    year: '2018–2021',
    name: 'PILOTS',
    subtitle: 'HAND DRAWINGS · 2018–2021',
    desc: 'When I was younger, they shaped everything.\nAll my pain redirected through their image.\nEvery piece a different style, a different state.',
    files: Array.from({length:14}, (_,i) => ({
      path:   `images/assets/create/pilots/pilots${i+1}.jpg`,
      width:  Math.round(62 + Math.random()*14),
      height: Math.round(46 + Math.random()*16)
    }))
  },
  {
    id: 'Self-Portrait',
    year: '2024',
    name: 'NONE OF THEM IS ME',
    subtitle: 'SELF-PORTRAIT SERIES · 2024',
    desc: 'A series about the gap between how you see yourself and how you appear.\n\nNone of the versions is definitive.',
    files: Array.from({length:6}, (_,i) => ({
      path:   `images/assets/create/portrait/Portrait${i+1}.jpg`,
      width:  Math.round(64 + Math.random()*12),
      height: Math.round(82 + Math.random()*14)
    }))
  },
  {
    id: 'scan',
    year: '2025–2026',
    name: 'SCAN',
    subtitle: 'GRAINS OF THE CITIES',
    desc: 'Cities leave marks.\nScanned surfaces, found materials.\nConcrete, rust, fabric, stone.',
    files: Array.from({length:10}, (_,i) => ({
      path:   `images/assets/create/scan/Scan${i+1}.jpg`,
      width:  Math.round(66 + Math.random()*14),
      height: Math.round(50 + Math.random()*14)
    }))
  },
  {
    id: 'clo',
    year: '2023',
    name: 'CLO',
    subtitle: 'CUSTOM CLOTHING',
    desc: 'Hand-painted garments. No sketch, no transfer.',
    files: Array.from({length:20}, (_,i) => ({
      path:   `images/assets/create/clo/cloth${i+1}.jpg`,
      width:  Math.round(60 + Math.random()*18),
      height: Math.round(46 + Math.random()*16),
      subproject: i < 3 ? 0 : i < 5 ? 1 : 2
    }))
  },
  {
    id: 'bti',
    year: '2022',
    name: 'BEFORE THE IMPACT',
    subtitle: 'SILENT HORIZON',
    desc: 'Silent Horizon explores the moment when an ordinary landscape becomes the stage for an unexpected event.\n\nThe four-frame sequence captures a gradual shift in perception.',
    files: Array.from({length:4}, (_,i) => ({
      path:   `images/assets/create/bti/bti${i+1}.jpg`,
      width:  Math.round(68 + Math.random()*14),
      height: Math.round(50 + Math.random()*14)
    }))
  },
  {
    id: 'graph',
    year: '—',
    name: 'GRAPH',
    subtitle: 'GRAPHIC DESIGN · AI TOOLS',
    desc: 'Visual experiments in graphic design.\nPoster generation, identity exploration.\nAI-assisted image work.\n— in progress',
    files: []
  }
];

/* ─────────────────────────────────────────
   DOM REFS
───────────────────────────────────────── */
const scrollContainer = document.getElementById('scrollContainer');
const timelineContent = document.getElementById('timelineContent');
const modal           = document.getElementById('modal');
const modalContent    = document.getElementById('modalContent');
const modalSingleView = document.getElementById('modalSingleView');
const modalMultiView  = document.getElementById('modalMultiView');
const modalImg        = document.getElementById('modalImg');
const modalTitle      = document.getElementById('modalTitle');
const modalSubtitle   = document.getElementById('modalSubtitle');
const modalDesc       = document.getElementById('modalDesc');
const modalCounter    = document.getElementById('modalCounter');
const modalClose      = document.getElementById('modalClose');
const modalPrev       = document.getElementById('modalPrev');
const modalNext       = document.getElementById('modalNext');

let currentProject  = null;
let currentImageIdx = 0;

/* ─────────────────────────────────────────
   CURSOR
───────────────────────────────────────── */
const curRing  = document.getElementById('cur-ring');
const curCross = document.getElementById('cur-cross');

if (window.matchMedia('(hover: hover)').matches) {
  document.addEventListener('mousemove', e => {
    curRing.style.left  = e.clientX + 'px';
    curRing.style.top   = e.clientY + 'px';
    curCross.style.left = e.clientX + 'px';
    curCross.style.top  = e.clientY + 'px';
  });
  document.addEventListener('mouseover', e => {
    if (e.target.closest('a, button, .image-item')) curRing.classList.add('hover');
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('a, button, .image-item')) curRing.classList.remove('hover');
  });
}

/* ─────────────────────────────────────────
   MODAL HELPERS — UNCHANGED from previous version
───────────────────────────────────────── */
function setSingle() {
  modalSingleView.style.display = 'flex';
  modalMultiView.className = 'modal-multi';
  modalContent.classList.remove('mode-row');
}
function setMulti(mode) {
  modalSingleView.style.display = 'none';
  modalMultiView.className = 'modal-multi show mode-' + mode;
  if (mode === 'row') modalContent.classList.add('mode-row');
  else modalContent.classList.remove('mode-row');
}
function showNav(on) {
  modalPrev.classList.toggle('off', !on);
  modalNext.classList.toggle('off', !on);
  modalCounter.classList.toggle('off', !on);
}
function setInfo(title, subtitle, desc) {
  modalTitle.textContent    = title    || '';
  modalSubtitle.textContent = subtitle || '';
  modalDesc.textContent     = desc     || '';
}
function buildMultiImgs(paths) {
  modalMultiView.innerHTML = '';
  paths.forEach(src => {
    const img = document.createElement('img');
    img.src = src; img.alt = '';
    img.onerror = () => { img.style.opacity = '0.2'; };
    modalMultiView.appendChild(img);
  });
}

/* ─────────────────────────────────────────
   OPEN MODAL
   Portrait: 3×2 collage (unchanged)
   BTI: 4 in one row (unchanged)
   CLO: grouped, each group has its own name+desc from CLO_GROUPS
   Others: single with nav (unchanged)
───────────────────────────────────────── */
function openModal(proj, fileIdx) {
  currentProject  = proj;
  currentImageIdx = fileIdx;

  if (proj.id === 'Self-Portrait') {
    setMulti('collage');
    showNav(false);
    buildMultiImgs(proj.files.map(f => f.path));
    setInfo(proj.name, proj.subtitle, proj.desc);

  } else if (proj.id === 'bti') {
    setMulti('row');
    showNav(false);
    buildMultiImgs(proj.files.map(f => f.path));
    setInfo(proj.name, proj.subtitle, proj.desc);

  } else if (proj.id === 'clo') {
    /* Per-group name and desc from CLO_GROUPS */
    const group = getCloGroup(fileIdx);
    setInfo(proj.name, group.name || proj.subtitle, group.desc || proj.desc);

    if (group.files.length === 1) {
      setSingle();
      modalImg.src = proj.files[fileIdx].path;
      showNav(false);
    } else {
      setMulti('group');
      showNav(false);
      buildMultiImgs(group.files.map(i => proj.files[i].path));
    }

  } else {
    setSingle();
    modalImg.src = proj.files[fileIdx].path;
    showNav(true);
    modalCounter.textContent = `${fileIdx + 1} / ${proj.files.length}`;
    setInfo(proj.name, proj.subtitle, proj.desc);
  }

  modal.classList.add('active');
}

function navSingle(dir) {
  if (!currentProject || !currentProject.files.length) return;
  currentImageIdx = (currentImageIdx + dir + currentProject.files.length) % currentProject.files.length;
  modalImg.src = currentProject.files[currentImageIdx].path;
  modalCounter.textContent = `${currentImageIdx + 1} / ${currentProject.files.length}`;
}

modalClose.onclick = () => modal.classList.remove('active');
modal.onclick      = e => { if (e.target === modal) modal.classList.remove('active'); };
modalPrev.onclick  = () => navSingle(-1);
modalNext.onclick  = () => navSingle(+1);
document.addEventListener('keydown', e => {
  if (!modal.classList.contains('active')) return;
  if (e.key === 'Escape')     modal.classList.remove('active');
  if (e.key === 'ArrowLeft'  && !modalPrev.classList.contains('off')) navSingle(-1);
  if (e.key === 'ArrowRight' && !modalNext.classList.contains('off')) navSingle(+1);
});

/* ─────────────────────────────────────────
   BUILD SCROLL CONTAINER
   Creates project-group > column > image-item DOM.
   Then calls distributeColumns() to position everything.
───────────────────────────────────────── */
function buildScrollContainer() {
  scrollContainer.innerHTML = '';
  const PER_COL = 7;

  projects.forEach(proj => {
    const group     = document.createElement('div');
    group.className = 'project-group';
    const colCount  = proj.files.length > 0 ? Math.ceil(proj.files.length / PER_COL) : 1;

    for (let col = 0; col < colCount; col++) {
      const column    = document.createElement('div');
      column.className = 'column';

      if (col === 0) {
        const hdr = document.createElement('div');
        hdr.className = 'column-header';
        hdr.innerHTML = `
          <div class="column-year">${proj.year}</div>
          <div class="column-title">${proj.name}</div>
          ${proj.subtitle ? `<div class="column-subtitle">${proj.subtitle}</div>` : ''}
        `;
        column.appendChild(hdr);
      }

      const start = col * PER_COL;
      const end   = Math.min(start + PER_COL, proj.files.length);
      for (let i = start; i < end; i++) {
        const f    = proj.files[i];
        const item = document.createElement('div');
        item.className = 'image-item';
        item.style.width  = f.width  + 'px';
        item.style.height = f.height + 'px';
        const img = document.createElement('img');
        img.src = f.path;
        img.alt = `${proj.name} ${i + 1}`;
        img.onerror = () => { img.style.opacity = '0.3'; };
        item.appendChild(img);
        item.onclick = () => openModal(proj, i);
        column.appendChild(item);
      }

      group.appendChild(column);
    }

    scrollContainer.appendChild(group);
  });

  distributeColumns();
}

/* ─────────────────────────────────────────
   DISTRIBUTE COLUMNS
   Removes project-group wrappers and positions each column
   absolutely across the scroll container.

   Within-group gap < column width → columns from same project
   are packed together. Between-group gap larger → visual
   separation between projects. All columns overlap slightly.

   RATIO = betweenGap / withinGap. Increase for more
   separation between projects, decrease for tighter overall.
───────────────────────────────────────── */
function distributeColumns() {
  const W = scrollContainer.clientWidth;
  if (!W) { requestAnimationFrame(distributeColumns); return; }

  const PADDING  = 24;  /* left/right margin from edge */
  const COL_W    = 100; /* column width in px */
  const RATIO    = 1.5; /* between-group / within-group gap ratio */

  /* collect column info before DOM restructure */
  const groups  = Array.from(scrollContainer.querySelectorAll('.project-group'));
  const colData = [];
  groups.forEach((g, gi) => {
    const cols = Array.from(g.querySelectorAll('.column'));
    cols.forEach((col, ci) => {
      colData.push({
        col,
        gi,
        ci,
        isLastInGroup: ci === cols.length - 1
      });
    });
  });

  const N        = colData.length;
  const nWithin  = colData.slice(0, -1).filter(c => !c.isLastInGroup).length;
  const nBetween = colData.slice(0, -1).filter(c =>  c.isLastInGroup).length;

  /* Compute steps so everything fits within viewport width:
     PADDING + nWithin*wg + nBetween*bg + COL_W + PADDING = W
     bg = RATIO * wg  →  wg = (W - 2*PADDING - COL_W) / (nWithin + RATIO*nBetween)
  */
  const available = W - 2 * PADDING - COL_W;
  let wg = available / (nWithin + RATIO * nBetween);
  let bg = wg * RATIO;

  /* enforce overlap: step must be < COL_W so columns overlap */
  const MAX_STEP = COL_W * 0.88; /* at least 12% overlap always */
  if (wg > MAX_STEP) { wg = MAX_STEP; bg = MAX_STEP * RATIO; }
  /* also cap bg to keep everything within viewport */
  const totalIfCapped = PADDING + nWithin * wg + nBetween * bg + COL_W + PADDING;
  if (totalIfCapped > W) {
    const scale = (W - 2*PADDING - COL_W) / (nWithin * wg + nBetween * bg);
    wg *= scale; bg *= scale;
  }

  /* restructure DOM: move columns directly into scrollContainer */
  groups.forEach(g => {
    while (g.firstChild) scrollContainer.appendChild(g.firstChild);
    g.remove();
  });

  /* position each column absolutely */
  let x = PADDING;
  colData.forEach((info, i) => {
    const col = info.col;
    col.style.position  = 'absolute';
    col.style.left      = Math.round(x) + 'px';
    col.style.top       = '0';
    col.style.width     = COL_W + 'px';
    /* z-index: increases left-to-right so right columns appear on top */
    col.style.zIndex    = String(i + 1);

    if (i < N - 1) {
      x += info.isLastInGroup ? bg : wg;
    }
  });
}

/* re-distribute on resize */
window.addEventListener('resize', distributeColumns);

/* ─────────────────────────────────────────
   BUILD TIMELINE
   Hardcoded years 2019 → 2026 → FUTURE.
   Dot sizes reflect project activity in each year.
   Positioned above footer via CSS (bottom:32px).
   Distributed evenly via flexbox space-between.
───────────────────────────────────────── */
function buildTimeline() {
  timelineContent.innerHTML = '';

  /* dot size reflects project activity that year */
  const YEARS = [
    { label: '2019', size: 14 }, /* pilots active */
    { label: '2020', size: 14 }, /* pilots active */
    { label: '2021', size: 12 }, /* pilots ending */
    { label: '2022', size:  8 }, /* bti (4 files) */
    { label: '2023', size: 22 }, /* clo (20 files — most active) */
    { label: '2024', size: 13 }, /* portrait */
    { label: '2025', size: 12 }, /* scan */
    { label: '2026', size:  8 }, /* scan ending */
    { label: 'FUTURE', size: 9, future: true }
  ];

  YEARS.forEach(y => {
    const m = document.createElement('div');
    m.className = 'year-marker' + (y.future ? ' future' : '');

    const dot = document.createElement('div');
    dot.className = 'year-dot';
    dot.style.width  = y.size + 'px';
    dot.style.height = y.size + 'px';

    const label = document.createElement('div');
    label.className = 'year-label';
    label.textContent = y.label;

    m.appendChild(dot);
    m.appendChild(label);
    timelineContent.appendChild(m);
  });
}

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
buildScrollContainer();
buildTimeline();
</script>
