<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual — AV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #070707;
      --white:   #ededed;
      --dim:     #464646;
      --line:    #1c1c1c;
      --blue:    #4d6aff;
      --mono:    'IBM Plex Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
      --sans:    'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      color: var(--white);
      font-family: var(--sans);
      cursor: none;
    }

    /* ── BACKGROUND IMAGE ─────────────────────────────────────
       url('images/assets/create/visualmain.jpg')  ← твоя картинка
    ──────────────────────────────────────────────────────────── */
    body {
      background-image: url('images/assets/create/visualmain.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    /* тёмная плёнка поверх фото — 0.0 = прозрачно, 1.0 = глухо чёрный */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: rgba(7,7,7, 0.1);
      pointer-events: none;
      z-index: 0;
    }

    /* ── GRAIN ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      opacity: .08;
      pointer-events: none;
      z-index: 8500;
    }

    /* ── CURSOR ── */
    #cur {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--white);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .14s, height .14s;
      mix-blend-mode: difference;
    }
    #cur.big { width: 50px; height: 50px; }
    @media (hover: none) { #cur { display: none; } }

    /* ── HEADER ── */
    .header-bar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 54px;
      border-bottom: 1px solid var(--line);
      background: rgba(7,7,7,.9);
      backdrop-filter: blur(12px);
    }
    .back {
      font-family: var(--sans);
      font-size: 13px; font-weight: 700;
      letter-spacing: .16em; text-transform: uppercase;
      text-decoration: none; color: var(--dim);
      transition: color .2s;
    }
    .back:hover { color: var(--white); }

    /* ── FILTER ROW ── */
    .filter-row {
      position: fixed; top: 54px; left: 0; right: 0;
      z-index: 200;
      display: flex; justify-content: center;
      padding: 0 40px;
      height: 46px; align-items: center;
      border-bottom: 1px solid var(--line);
      background: rgba(7,7,7,.85);
      backdrop-filter: blur(12px);
    }
    .f-btn {
      font-family: var(--mono);
      font-size: 12px; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase;
      background: none; border: none; color: var(--dim);
      cursor: none; padding: 8px 20px;
      transition: color .15s; position: relative;
    }
    .f-btn::after {
      content: '/'; position: absolute; right: 0;
      color: #1e1e1e; pointer-events: none;
    }
    .f-btn:last-child::after { display: none; }
    .f-btn:hover { color: var(--white); }
    .f-btn.active {
      color: var(--white);
      text-decoration: underline;
      text-underline-offset: 5px;
      text-decoration-color: var(--blue);
    }

    /* ── CLUSTER AREA ── */
    .cluster-area {
      position: fixed;
      top: 100px; left: 0; right: 0;
      bottom: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #clusterScale { transform-origin: center center; }

    #clusterFloat {
      animation: clusterDrift 9s ease-in-out infinite;
    }
    @keyframes clusterDrift {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-20px); }
    }

    #cluster { position: relative; }

    /* ── CUBE ── */
    .cube {
      position: absolute;
      cursor: none;
      transition: opacity .45s ease;
    }
    .cube.dimmed { opacity: 0.07; }
    .cube:hover  { z-index: 9000 !important; }

    /* ── FACES  (W = 220px)
       top  : rhombus  — polygon(110 0, 220 55, 110 110, 0 55)
       left : para     — polygon(0 55, 110 110, 110 220, 0 165)
       right: para     — polygon(110 110, 220 55, 220 165, 110 220)
    ── */
    .face {
      position: absolute;
      width: 220px; height: 220px;
      background-size: cover;
      background-position: center;
    }
    .face-top {
      clip-path: polygon(110px 0px, 220px 55px, 110px 110px, 0px 55px);
      filter: brightness(1.08);
      transition: filter .3s;
    }
    .face-left {
      clip-path: polygon(0px 55px, 110px 110px, 110px 220px, 0px 165px);
      filter: brightness(0.70);
    }
    .face-right {
      clip-path: polygon(110px 110px, 220px 55px, 220px 165px, 110px 220px);
      filter: brightness(0.48);
    }
    .cube:hover .face-top   { filter: brightness(1.30); }
    .cube:hover .face-left  { filter: brightness(0.84); }
    .cube:hover .face-right { filter: brightness(0.58); }

    .face-top::after, .face-left::after, .face-right::after {
      content: '';
      position: absolute; inset: 0;
      box-shadow: inset 0 0 0 .5px rgba(255,255,255,.07);
      clip-path: inherit;
      pointer-events: none;
    }

    /* ── MODAL ── */
    .modal {
      position: fixed; inset: 0;
      background: rgba(4,4,4,.97);
      z-index: 600;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 24px;
      visibility: hidden; opacity: 0;
      transition: opacity .4s ease, visibility .4s;
    }
    .modal.active { visibility: visible; opacity: 1; }

    .modal-img-wrap {
      position: relative;
      max-width: 80vw; max-height: 65vh;
    }
    .modal-img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.55) 100%);
      pointer-events: none;
    }
    #modalImg {
      display: block;
      max-width: 80vw; max-height: 65vh;
      object-fit: contain;
      animation: imgIn .4s ease;
    }
    @keyframes imgIn {
      from { opacity: 0; transform: scale(.96); }
      to   { opacity: 1; transform: none; }
    }
    .modal-placeholder {
      width: 55vw; min-width: 280px; height: 42vh;
      background: #111;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-placeholder span {
      font-family: var(--mono); font-size: 9px;
      letter-spacing: .2em; text-transform: uppercase; color: #252525;
    }

    .modal-caption { text-align: center; }
    .modal-title {
      font-family: var(--display);
      font-size: clamp(32px, 5vw, 68px);
      letter-spacing: .04em; color: var(--white); line-height: 1;
    }
    .modal-meta {
      font-family: var(--mono); font-size: 13px;
      letter-spacing: .12em; color: var(--dim);
      margin-top: 8px; font-style: italic;
    }
    .modal-desc {
      font-family: var(--mono); font-size: 13px;
      line-height: 1.85; color: rgba(237,237,237,.4);
      max-width: 500px; margin: 12px auto 0; letter-spacing: .02em;
    }

    .modal-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: rgba(237,237,237,.18); font-size: 36px;
      cursor: none; padding: 20px; z-index: 610;
      transition: color .2s; line-height: 1;
    }
    .modal-nav:hover { color: var(--white); }
    .modal-prev { left: 16px; }
    .modal-next { right: 16px; }

    .modal-close {
      position: fixed; top: 22px; right: 32px;
      background: none; border: none;
      font-family: var(--mono); font-size: 13px;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--dim); cursor: none; z-index: 610;
      transition: color .2s;
    }
    .modal-close:hover { color: var(--white); }

    .modal-counter {
      position: fixed; top: 24px; left: 40px;
      font-family: var(--mono); font-size: 13px;
      letter-spacing: .2em; color: var(--dim); z-index: 610;
    }

    /* ── FOOTER ── */
    .footer-left {
      position: fixed; bottom: 26px; left: 40px;
      font-size: 10px; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase; z-index: 50;
    }
    .footer-left a {
      color: var(--white); text-decoration: none;
      opacity: .25; transition: opacity .2s; font-family: var(--sans);
    }
    .footer-left a:hover { opacity: 1; }

    .global-footer {
      position: fixed; bottom: 26px; right: 40px;
      display: flex; gap: 14px; align-items: center;
      font-size: 10px; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase; z-index: 50;
    }
    .global-footer a {
      color: var(--white); text-decoration: none;
      opacity: .25; transition: opacity .2s; font-family: var(--sans);
    }
    .global-footer a:hover { opacity: 1; }
    .global-footer span { opacity: .1; }

    .page-label {
      position: fixed; bottom: 60px; left: 40px;
      font-family: var(--display);
      font-size: clamp(56px, 8vw, 110px);
      line-height: .85; letter-spacing: .02em;
      color: var(--white); opacity: .04;
      pointer-events: none; z-index: 10; user-select: none;
    }
  </style>
</head>

<script>
/* ═══════════════════════════════
   PROJECTS  (idx 0–24)
   custom 0–3 | scan 4–13 | graphic 14–20 | texture 21–24
═══════════════════════════════ */
const PROJECTS = [
  // ─── CUSTOM (0–3) ──────────────────────────────────────────────────────
  // img: "images/assets/create/custom-01.jpg"  →  папка images/assets/create/
  { title: "Untitled Jacket №1", meta: "acrylic on denim · one of a kind",     desc: "Hand-painted. No sketch, no transfer. The painting grew from the fabric up.",               cat: "custom",  img: "images/assets/create/custom-01.jpg",  color: "#201228" },
  { title: "Field Study",        meta: "acrylic on canvas jacket · sold",       desc: "Botanical study series. Plants as architecture — structure, system, repetition.",             cat: "custom",  img: "images/assets/create/custom-02.jpg",  color: "#122010" },
  { title: "Flora Series No.4",  meta: "acrylic on cotton · one of a kind",     desc: "Part of the ongoing Flora series. Oversized botanical forms, bleeding edges.",               cat: "custom",  img: "images/assets/create/custom-03.jpg",  color: "#201808" },
  { title: "Dark Moth",          meta: "acrylic on black denim · sold, London", desc: "The first piece that sold internationally. The buyer never told me where it ended up.",      cat: "custom",  img: "images/assets/create/custom-04.jpg",  color: "#08080f" },

  // ─── SCAN (4–13) ───────────────────────────────────────────────────────
  // img: "images/assets/create/scan/Scan1.jpg" … Scan10.jpg
  { title: "Grains of the cities — I",   meta: "scan · graphic · 2023+", desc: "Something somewhere.", cat: "scan", img: "images/assets/create/scan/Scan1.jpg",  color: "#1a0808" },
  { title: "Grains of the cities — II",  meta: "scan · graphic · 2023+", desc: "Something somewhere.", cat: "scan", img: "images/assets/create/scan/Scan1.jpg",  color: "#0a0a1c" },
  { title: "Grains of the cities — III", meta: "scan · graphic · 2023+", desc: "Something somewhere.", cat: "scan", img: "images/assets/create/scan/Scan2.jpg",  color: "#0a0a1c" },
  { title: "Grains of the cities — IV",  meta: "scan · graphic · 2023+", desc: "Something somewhere.", cat: "scan", img: "images/assets/create/scan/Scan3.jpg",  color: "#0a0a1c" },
  { title: "Grains of the cities — V",   meta: "scan · graphic · 2023+", desc: "Something somewhere.", cat: "scan", img: "images/assets/create/scan/Scan4.jpg",  color: "#0a0a1c" },
  { title: "Grains of the cities — VI",  meta: "scan · graphic · 2023+", desc: "Something somewhere.", cat: "scan", img: "images/assets/create/scan/Scan5.jpg",  color: "#0a0a1c" },
  { title: "Grains of the cities — VII", meta: "scan · graphic · 2023+", desc: "Something somewhere.", cat: "scan", img: "images/assets/create/scan/Scan6.jpg",  color: "#0a0a1c" },
  { title: "Grains of the cities — VIII",meta: "scan · graphic · 2023+", desc: "Something somewhere.", cat: "scan", img: "images/assets/create/scan/Scan7.jpg",  color: "#0a0a1c" },
  { title: "Grains of the cities — IX",  meta: "scan · graphic · 2023+", desc: "Something somewhere.", cat: "scan", img: "images/assets/create/scan/Scan8.jpg",  color: "#0a0a1c" },
  { title: "Grains of the cities — X",   meta: "scan · graphic · 2023+", desc: "Something somewhere.", cat: "scan", img: "images/assets/create/scan/Scan10.jpg", color: "#0a0a1c" },

  // ─── GRAPHIC (14–20) ──────────────────────────────────────────────────
  // img: "images/assets/create/portrait/Portrait1.jpg" … Portrait6.jpg
  { title: "None of them is me — I",   meta: "self-portrait series · graphic · 2024", desc: "A series about the gap between how you see yourself and how you appear. None of the versions is definitive.", cat: "art", img: "images/assets/create/portrait/Portrait1.jpg", color: "#1a0808" },
  { title: "None of them is me — II",  meta: "self-portrait series · graphic · 2024", desc: "Ink on paper. Third version. Each iteration further from the original.",                                      cat: "art", img: "images/assets/create/portrait/Portrait2.jpg", color: "#0a0a1c" },
  { title: "None of them is me — III", meta: "self-portrait series · graphic · 2024", desc: "Seventh version. The series continues until there are no more versions to make.",                              cat: "art", img: "images/assets/create/portrait/Portrait3.jpg", color: "#18120a" },
  { title: "None of them is me — IV",  meta: "self-portrait series · graphic · 2024", desc: "Seventh version. The series continues until there are no more versions to make.",                              cat: "art", img: "images/assets/create/portrait/Portrait4.jpg", color: "#18120a" },
  { title: "None of them is me — V",   meta: "self-portrait series · graphic · 2024", desc: "Seventh version. The series continues until there are no more versions to make.",                              cat: "art", img: "images/assets/create/portrait/Portrait5.jpg", color: "#18120a" },
  { title: "None of them is me — VI",  meta: "self-portrait series · graphic · 2024", desc: "Seventh version. The series continues until there are no more versions to make.",                              cat: "art", img: "images/assets/create/portrait/Portrait6.jpg", color: "#18120a" },
  { title: "Study in B",               meta: "ballpoint on paper · A3 · 2021",         desc: "Obsessive line work. Started as a doodle, lasted six hours.",                                                 cat: "art", img: "images/assets/create/portrait/Portrait4.jpg", color: "#0c1418" },

  // ─── TEXTURE (21–24) ──────────────────────────────────────────────────
  // img: "images/assets/create/texture-concrete.jpg" etc.
  { title: "Concrete, Minsk",      meta: "flatbed scanner · 1200 dpi · 2024",         desc: "Concrete fragment from a demolished building on Komsomolskaya. The city changes, the surface stays.", cat: "texture", img: "images/assets/create/texture-concrete.jpg", color: "#161616" },
  { title: "Fabric Memory",        meta: "flatbed scanner · textile fragment · 2023",  desc: "A piece of jacket lining from 1996. Scanning is a form of preservation.",                             cat: "texture", img: "images/assets/create/texture-fabric.jpg",   color: "#1a1410" },
  { title: "Rust Study",           meta: "flatbed scanner · oxidised metal · 2024",    desc: "Found on a fence near the construction site on Nezavisimosti. Brought home in a bag.",               cat: "texture", img: "images/assets/create/texture-rust.jpg",     color: "#1a0d08" },
  { title: "Stone Yard, Marbella", meta: "flatbed scanner · limestone chip · 2023",    desc: "From the construction site of Villa Amelie. The same stone, a different scale.",                    cat: "texture", img: "images/assets/create/texture-stone.jpg",    color: "#121620" },
];

const N = PROJECTS.length; // 25

/* ═══════════════════════════════
   SCATTERED GRID
   [col, row, primaryIdx]
   Layout: loose clusters + isolates across wide field
   — как на скрине из фигмы
═══════════════════════════════ */
const GRID = [
  // top-left cluster (custom + scan)
  [0,0,  0], [1,0,  3],
  [0,1,  1], [1,1, 22],
             [1,2,  2],

  // isolated top
  [4,0,  4],
  [6,0, 14],

  // top-right cluster (scan)
  [8,0,  5], [9,0, 17],
  [8,1,  6],  [9,1, 15],
                         [10,1, 7],

  // middle loose band
  [3,2, 10], [4,2, 23],
             [4,3, 11], [5,3, 21],
  [3,3, 24],

  // isolated mid
  [7,2, 16],
  [11,2, 8],

  // mid-right cluster
  [10,3,  9], [11,3, 18],
              [11,4, 12],

  // bottom-left cluster (graphic)
  [1,4, 19], [2,4, 20],
  [1,5, 13],

  // bottom-center
  [5,5, 21],
  [7,4, 23],

  // bottom-right isolated
  [9,5,  2],
  [12,3, 4],
];

/* ═══════════════════════════════
   GEOMETRY  (W = 220)
═══════════════════════════════ */
const W  = 220;
const HX = W / 2;   // 110 — horizontal step
const HY = W / 4;   //  55 — vertical step

const xs = GRID.map(([c,r]) => (c - r) * HX);
const ys = GRID.map(([c,r]) => (c + r) * HY);
const OX = -Math.min(...xs);
const OY = -Math.min(...ys);
const CONTAINER_W = Math.max(...xs) + OX + W;
const CONTAINER_H = Math.max(...ys) + OY + W;

/* ═══════════════════════════════
   BUILD CLUSTER
═══════════════════════════════ */
const clusterEl = document.getElementById('cluster');
clusterEl.style.width  = CONTAINER_W + 'px';
clusterEl.style.height = CONTAINER_H + 'px';

const cubeEls = [];

GRID.forEach(([col, row, primaryIdx], i) => {
  const x     = (col - row) * HX + OX;
  const y     = (col + row) * HY + OY;
  const zBase = -(col + row) * 100;
  const p     = PROJECTS[primaryIdx % N];

  const cube = document.createElement('div');
  cube.className     = 'cube';
  cube.dataset.cat   = p.cat;
  cube.dataset.title = p.title;
  cube.dataset.meta  = p.meta;
  cube.dataset.desc  = p.desc;
  cube.dataset.img   = p.img;
  cube.style.cssText = `left:${x}px; top:${y}px; z-index:${zBase};`;

  // Three faces — evenly spread through pool so neighbours differ
  const step = Math.floor(N / 3);
  [0, step, step * 2].forEach((offset, fi) => {
    const fp   = PROJECTS[(primaryIdx + offset) % N];
    const face = document.createElement('div');
    face.className = `face face-${['top','left','right'][fi]}`;
    face.style.backgroundImage  = `url('${fp.img}')`;
    face.style.backgroundColor  = fp.color;
    cube.appendChild(face);
  });

  cube.addEventListener('click', () => openModal(i));
  cubeEls.push(cube);
  clusterEl.appendChild(cube);
});

/* ═══════════════════════════════
   RESPONSIVE SCALE
═══════════════════════════════ */
const scaleEl = document.getElementById('clusterScale');
function resize() {
  const pad   = 50;
  const availW = window.innerWidth  - pad * 2;
  const availH = window.innerHeight - 100 - 60 - pad * 2;
  const s = Math.min(1, availW / CONTAINER_W, availH / CONTAINER_H);
  scaleEl.style.transform = `scale(${s})`;
}
resize();
window.addEventListener('resize', resize);

/* ═══════════════════════════════
   FILTER
═══════════════════════════════ */
document.querySelectorAll('.f-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    cubeEls.forEach(cube => {
      cube.classList.toggle('dimmed', f !== 'all' && cube.dataset.cat !== f);
    });
  });
});

/* ═══════════════════════════════
   MODAL
═══════════════════════════════ */
const modal    = document.getElementById('modal');
const imgWrap  = document.getElementById('modalImgWrap');
const ph       = document.getElementById('modalPH');
const mTitle   = document.getElementById('modalTitle');
const mMeta    = document.getElementById('modalMeta');
const mDesc    = document.getElementById('modalDesc');
const mCounter = document.getElementById('modalCounter');

let modalIdx = 0;

function getActive() {
  return cubeEls.filter(c => !c.classList.contains('dimmed'));
}

function openModal(cubeIdx) {
  const active = getActive();
  const cube   = cubeEls[cubeIdx];
  modalIdx     = active.indexOf(cube);
  if (modalIdx === -1) modalIdx = 0;
  renderModal(active);
  modal.classList.add('active');
}

function renderModal(active) {
  if (!active) active = getActive();
  const cube = active[modalIdx];
  if (!cube) return;
  const d = cube.dataset;
  mTitle.textContent   = d.title || '';
  mMeta.textContent    = d.meta  || '';
  mDesc.textContent    = d.desc  || '';
  mCounter.textContent = `${String(modalIdx+1).padStart(2,'0')} / ${String(active.length).padStart(2,'0')}`;

  const old = imgWrap.querySelector('img');
  if (old) old.remove();
  ph.style.display = 'none';

  if (d.img) {
    const img = document.createElement('img');
    img.id = 'modalImg'; img.src = d.img; img.alt = d.title;
    img.onerror = () => { img.remove(); ph.style.display = 'flex'; };
    imgWrap.insertBefore(img, ph);
  } else {
    ph.style.display = 'flex';
  }
}

function closeModal() { modal.classList.remove('active'); }

function navModal(dir) {
  const active = getActive();
  modalIdx = (modalIdx + dir + active.length) % active.length;
  renderModal(active);
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalPrev').addEventListener('click', e => { e.stopPropagation(); navModal(-1); });
document.getElementById('modalNext').addEventListener('click', e => { e.stopPropagation(); navModal(+1); });
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
window.addEventListener('keydown', e => {
  if (!modal.classList.contains('active')) return;
  if (e.key === 'Escape')     closeModal();
  if (e.key === 'ArrowLeft')  navModal(-1);
  if (e.key === 'ArrowRight') navModal(+1);
});

/* ═══════════════════════════════
   CURSOR
═══════════════════════════════ */
const cur = document.getElementById('cur');
if (window.matchMedia('(hover: hover)').matches) {
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });
  document.querySelectorAll('a, button, .cube').forEach(el => {
    el.addEventListener('mouseenter', () => cur.classList.add('big'));
    el.addEventListener('mouseleave', () => cur.classList.remove('big'));
  });
}
</script>
</body>
</html>
