<!DOCTYPE html>

<meta charset="UTF-8">

<title>Visual Timeline Portfolio</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;font-family:'Barlow',sans-serif;color:#f5f5f5;overflow:hidden}

body{display:flex;flex-direction:column}

/* MAIN SCROLL CONTAINER */
.scroll-container{
  flex:1;
  display:flex;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-behavior:smooth;
  padding-bottom:120px;
}

.scroll-container::-webkit-scrollbar{height:6px}
.scroll-container::-webkit-scrollbar-track{background:#1a1a1a}
.scroll-container::-webkit-scrollbar-thumb{background:#4d6aff;border-radius:3px}

/* COLUMN - VERTICAL STACK */
.column{
  flex-shrink:0;
  width:320px;
  height:calc(100vh - 120px);
  position:relative;
  display:flex;
  align-items:flex-start;
  justify-content:flex-start;
  padding:40px 20px;
  gap:0;
}

/* PROJECT HEADER */
.column-header{
  position:absolute;
  top:15px;
  left:20px;
  z-index:10;
}
.column-year{
  font-size:12px;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:#4d6aff;
}
.column-title{
  font-size:16px;
  font-weight:900;
  letter-spacing:-.01em;
  text-transform:uppercase;
  margin-top:4px;
  color:#f5f5f5;
}

/* IMAGE STACK */
.image-stack{
  position:relative;
  width:280px;
  height:100%;
  margin-top:80px;
}

/* INDIVIDUAL IMAGE */
.image-item{
  position:absolute;
  cursor:pointer;
  transition:all .4s cubic-bezier(.23,1,.32,1);
  transform-origin:center;
  border:1px solid rgba(255,255,255,.15);
  background:#1a1a1a;
  overflow:hidden;
  border-radius:2px;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}

.image-item img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
}

.image-item:hover{
  filter:brightness(1.1);
  box-shadow:0 20px 60px rgba(77,106,255,.3);
}

/* CLICKED STATE */
.image-item.active{
  transform:scale(1.7)!important;
  z-index:999!important;
  filter:brightness(1.3);
  box-shadow:0 30px 80px rgba(77,106,255,.6);
}

/* IMAGE SIZES & POSITIONS */
.img-1{width:220px;height:180px;top:0px;left:30px;z-index:5;transform:rotate(-2deg)}
.img-2{width:200px;height:160px;top:120px;left:20px;z-index:4;transform:rotate(1deg);margin-top:-60px}
.img-3{width:240px;height:190px;top:240px;left:50px;z-index:3;transform:rotate(-1.5deg);margin-top:-80px}
.img-4{width:210px;height:170px;top:380px;left:10px;z-index:2;transform:rotate(2deg);margin-top:-70px}
.img-5{width:230px;height:185px;top:520px;left:40px;z-index:1;transform:rotate(-0.5deg);margin-top:-75px}

/* TIMELINE - BOTTOM FIXED */
.timeline-bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:100px;
  background:linear-gradient(to top,rgba(10,10,10,.98),rgba(10,10,10,.9));
  border-top:1px solid rgba(77,106,255,.2);
  display:flex;
  align-items:center;
  z-index:200;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-behavior:smooth;
}

.timeline-bottom::-webkit-scrollbar{height:4px}
.timeline-bottom::-webkit-scrollbar-track{background:transparent}
.timeline-bottom::-webkit-scrollbar-thumb{background:#4d6aff;border-radius:2px}

/* TIMELINE LINE */
.timeline-line{
  position:absolute;
  bottom:50%;
  left:0;
  right:0;
  height:2px;
  background:linear-gradient(to right,rgba(77,106,255,.1),rgba(77,106,255,.4),rgba(77,106,255,.1));
  transform:translateY(50%);
  z-index:1;
}

/* TIMELINE CONTENT */
.timeline-content{
  position:relative;
  height:100%;
  display:flex;
  align-items:center;
  padding:0 40px;
  gap:60px;
  z-index:2;
  min-width:min-content;
}

/* YEAR MARKER */
.year-marker{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  white-space:nowrap;
}

.year-dot{
  width:8px;
  height:8px;
  background:#4d6aff;
  border-radius:50%;
  transition:all .3s;
}

.year-marker.major .year-dot{
  width:12px;
  height:12px;
  background:#4d6aff;
  box-shadow:0 0 12px rgba(77,106,255,.6);
}

.year-label{

  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:#4d6aff;
}

<script>
let activeImage = null;
let originalClass = null;

function toggleImage(element) {
  if(activeImage === element) {
    // Deactivate
    element.classList.remove('active');
    activeImage = null;
  } else {
    // Deactivate previous
    if(activeImage) {
      activeImage.classList.remove('active');
    }
    // Activate new
    element.classList.add('active');
    activeImage = element;
  }
}

// Sync horizontal scrolls
const scrollContainer = document.getElementById('scrollContainer');
const timelineBottom = document.getElementById('timelineBottom');

scrollContainer.addEventListener('scroll', () => {
  timelineBottom.scrollLeft = scrollContainer.scrollLeft;
});

timelineBottom.addEventListener('scroll', () => {
  scrollContainer.scrollLeft = timelineBottom.scrollLeft;
});

// Close active image on ESC
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape' && activeImage) {
    activeImage.classList.remove('active');
    activeImage = null;
  }
});
</script>
