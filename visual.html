<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual — AV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f3f0;--fg:#0d0d0d;--dim:#999;
  --accent:#4d6aff;--glow:#ff6b9d;
  --sans:'Barlow','Helvetica Neue',Helvetica,Arial,sans-serif;
}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);font-family:var(--sans);cursor:auto;
}
body{
  background:linear-gradient(135deg,#f5f3f0 0%,#faf8f6 100%);
  overflow-y:auto;
}

/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;display:flex;align-items:center;padding:0 36px;}
.back{font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;color:var(--dim);transition:color .2s;}
.back:hover{color:var(--fg);}

/* MAIN CONTAINER */
.container{position:relative;width:100%;min-height:100vh;padding:60px 40px 40px;}

/* LEFT SIDE — PORTRAIT */
.portrait-section{
  position:fixed;left:40px;top:100px;width:35%;height:calc(100vh - 140px);
  display:flex;align-items:center;justify-content:center;z-index:10;
}
.portrait-wrapper{
  width:100%;height:100%;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.portrait{
  width:85%;height:85%;
  background:url('images/assets/portrait-main.jpg') center/cover;
  border-radius:50%;
  box-shadow:0 40px 100px rgba(0,0,0,.15),inset -10px -10px 30px rgba(0,0,0,.1);
  filter:blur(2px) brightness(1.05);
  opacity:.85;
  animation:float-soft 6s ease-in-out infinite;
}
@keyframes float-soft{0%,100%{transform:translate(0,0)}50%{transform:translate(8px,-12px)}}

/* RIGHT SIDE — MOOD BOARD */
.board-section{
  margin-left:40%;padding-top:80px;padding-bottom:100px;
  position:relative;
}
.board-container{
  position:relative;
  width:100%;
  min-height:150vh;
}

/* FLOATING ELEMENT STYLES */
.float-item{
  position:absolute;
  backdrop-filter:blur(8px);
  transition:all .3s cubic-bezier(.23,1,.32,1);
  cursor:pointer;
}
.float-item:hover{
  transform:scale(1.08) translate(0,-8px)!important;
  filter:brightness(1.15) drop-shadow(0 15px 35px rgba(0,0,0,.2));
  z-index:150!important;
}

/* Image Thumbnails */
.thumb-img{
  width:100%;height:100%;
  object-fit:cover;
  border-radius:4px;
  display:block;
  box-shadow:0 8px 24px rgba(0,0,0,.15);
}
.item-img{width:90px;height:90px;border-radius:3px;}
.item-img.medium{width:120px;height:120px;}
.item-img.small{width:65px;height:65px;}

/* Text Labels & UI Fragments */
.label-text{
  font-size:11px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;
  padding:8px 12px;
  background:rgba(255,255,255,.8);
  border:1px solid rgba(0,0,0,.08);
  border-radius:2px;
  color:var(--fg);
  white-space:nowrap;
}
.label-text.accent{
  background:var(--accent);color:#fff;
  border-color:var(--accent);
}
.label-text.glow{
  background:var(--glow);color:#fff;
  box-shadow:0 4px 16px rgba(255,107,157,.3);
}

/* UI Fragments */
.ui-fragment{
  background:rgba(255,255,255,.6);
  border:1px solid rgba(0,0,0,.1);
  border-radius:3px;
  padding:6px 10px;
  font-size:9px;
  color:var(--fg);
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}
.ui-fragment.icon{
  width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  font-size:24px;
  background:rgba(77,106,255,.08);
  border-color:var(--accent);
}

/* Glowing circles */
.glow-circle{
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(77,106,255,.2),rgba(77,106,255,.02));
  border:1.5px solid rgba(77,106,255,.15);
  box-shadow:0 0 30px rgba(77,106,255,.1),inset 0 0 30px rgba(77,106,255,.05);
}

/* Scattered elements positioning */
.element{position:absolute;}

@keyframes float-1{0%,100%{transform:translateY(0) rotate(var(--rot,0deg))}50%{transform:translateY(-12px) rotate(var(--rot,0deg))}}
@keyframes float-2{0%,100%{transform:translateY(0) rotate(var(--rot,0deg))}50%{transform:translateY(-8px) rotate(var(--rot,0deg))}}
@keyframes float-3{0%,100%{transform:translateY(0) rotate(var(--rot,0deg))}50%{transform:translateY(-15px) rotate(var(--rot,0deg))}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(77,106,255,.4)}50%{box-shadow:0 0 40px rgba(77,106,255,.8)}}

.item-1{animation:float-1 4s ease-in-out infinite;}
.item-2{animation:float-2 5s ease-in-out infinite;}
.item-3{animation:float-3 6s ease-in-out infinite;}

/* Hover blur effect */
.blur-sm{filter:blur(1.5px);opacity:.7;}
.blur-md{filter:blur(3px);opacity:.5;}

/* FOOTER */
.ftl{position:fixed;bottom:24px;left:36px;z-index:50;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;}
.ftl a{color:var(--fg);text-decoration:none;opacity:.28;transition:opacity .2s;}
.ftl a:hover{opacity:1;}
.ftr{position:fixed;bottom:24px;right:36px;z-index:50;display:flex;gap:10px;align-items:center;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;}
.ftr a{color:var(--fg);text-decoration:none;opacity:.28;transition:opacity .2s;}
.ftr a:hover{opacity:1;}
.ftr span{opacity:.1;color:var(--fg);}

@media(max-width:1024px){
  .portrait-section{position:relative;width:100%;height:300px;margin-bottom:40px;}
  .board-section{margin-left:0;}
  .container{padding:60px 20px 40px;}
}
</style>
</head>
<body>

<div class="hdr"><a href="index.html" class="back">← Back</a></div>

<div class="container">
  <div class="portrait-section">
    <div class="portrait-wrapper">
      <div class="portrait"></div>
    </div>
  </div>

  <div class="board-section">
    <div class="board-container" id="board">
      <!-- Elements will be generated by JS -->
    </div>
  </div>
</div>

<div class="ftl"><a href="about.html">About</a></div>
<div class="ftr">
  <a href="mailto:navilen@bk.ru">navilen@bk.ru</a><span>—</span>
  <a href="https://instagram.com/molodostibolshenebudet/" target="_blank">Instagram</a><span>—</span>
  <a href="https://behance.net/avasileuskaya" target="_blank">Behance</a><span>—</span>
  <a href="https://linkedin.com/in/worldwidemoment/" target="_blank">LinkedIn</a>
</div>

<script>
// Element data
const elements = [
  // Top row cluster
  {type:'image',size:'medium',x:5,y:8,rot:-8,anim:1},
  {type:'label',text:'#SWAG',x:15,y:6,rot:3,anim:2},
  {type:'image',size:'small',x:25,y:12,rot:15,anim:3},
  {type:'label',text:'mind',x:8,y:22,rot:-5,anim:1},
  {type:'image',size:'medium',x:18,y:26,rot:8,anim:2},
  {type:'ui',text:'○',x:12,y:35,rot:0,anim:1},
  
  // Middle section
  {type:'image',size:'small',x:3,y:45,rot:-12,anim:2},
  {type:'label',text:'love',x:22,y:48,rot:6,anim:3},
  {type:'image',size:'medium',x:35,y:42,rot:-4,anim:1},
  {type:'label',text:'music',x:28,y:58,rot:10,anim:2},
  {type:'image',size:'small',x:10,y:65,rot:8,anim:3},
  
  // Right upper cluster
  {type:'image',size:'medium',x:60,y:15,rot:-10,anim:1},
  {type:'label',text:'BRAIN',x:72,y:8,rot:4,anim:2},
  {type:'image',size:'small',x:68,y:28,rot:12,anim:3},
  {type:'ui',text:'↑',x:75,y:35,rot:0,anim:1},
  {type:'image',size:'small',x:82,y:42,rot:-6,anim:2},
  
  // Center-right
  {type:'label',text:'life',x:45,y:35,rot:8,anim:3},
  {type:'image',size:'medium',x:55,y:50,rot:-8,anim:1},
  {type:'glow',size:'large',x:40,y:65,rot:0,anim:2},
  
  // Lower section
  {type:'image',size:'small',x:8,y:80,rot:15,anim:2},
  {type:'label',text:'STUFF',x:20,y:88,rot:-4,anim:3},
  {type:'image',size:'medium',x:35,y:82,rot:6,anim:1},
  {type:'image',size:'small',x:65,y:75,rot:-12,anim:2},
  {type:'label',text:'art',x:78,y:85,rot:8,anim:3},
  
  // Bottom scattered
  {type:'image',size:'small',x:12,y:105,rot:20,anim:1},
  {type:'ui',text:'◆',x:45,y:110,rot:0,anim:2},
  {type:'image',size:'medium',x:60,y:100,rot:-10,anim:3},
  {type:'label',text:'create',x:75,y:115,rot:5,anim:1},
];

const board = document.getElementById('board');

elements.forEach((el, idx) => {
  const item = document.createElement('div');
  item.className = `float-item element item-${el.anim}`;
  item.style.left = el.x + '%';
  item.style.top = el.y + '%';
  item.style.setProperty('--rot', el.rot + 'deg');
  
  let html = '';
  
  if(el.type === 'image'){
    const imgClass = el.size === 'medium' ? 'item-img medium' : el.size === 'small' ? 'item-img small' : 'item-img';
    html = `<img src="images/assets/create/placeholder-${idx}.jpg" alt="" class="${imgClass} thumb-img">`;
  }
  else if(el.type === 'label'){
    html = `<div class="label-text ${idx % 3 === 0 ? 'accent' : idx % 5 === 0 ? 'glow' : ''}">${el.text}</div>`;
  }
  else if(el.type === 'ui'){
    html = `<div class="ui-fragment icon">${el.text}</div>`;
  }
  else if(el.type === 'glow'){
    html = `<div class="glow-circle" style="width:140px;height:140px;"></div>`;
  }
  
  item.innerHTML = html;
  board.appendChild(item);
});

// Simple image fallback
document.querySelectorAll('.thumb-img').forEach(img => {
  img.onerror = function(){
    this.style.background = 'linear-gradient(135deg, #e8e4de 0%, #ddd 100%)';
    this.style.opacity = '0.5';
  };
});
</script>

</body>
</html>
