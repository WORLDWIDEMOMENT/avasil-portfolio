<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual — AV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>
/* ────────────────────────────────────────────────────
   RESET & VARIABLES
──────────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #070707;
  --white:   #ededed;
  --dim:     #484848;
  --line:    #1c1c1c;
  --blue:    #4d6aff;
  --green:   #00e676;
  --mono:    'IBM Plex Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
  --sans:    'Helvetica Neue', Helvetica, Arial, sans-serif;
}

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background: var(--bg);
  color: var(--white);
  cursor: none;
  font-family: var(--sans);
}

/* grain */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px;
  opacity:.05;
  pointer-events:none;
  z-index:8000;
}

/* scanlines */
body::after {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 3px,
    rgba(0,0,0,.018) 3px, rgba(0,0,0,.018) 4px
  );
  pointer-events:none;
  z-index:8001;
}

/* ────────────────────────────────────────────────────
   FACE ID OVERLAY
──────────────────────────────────────────────────── */
#faceId {
  position:fixed; inset:0;
  background:#000;
  z-index:9500;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:20px;
  transition: opacity .7s ease;
}
#faceId.out { opacity:0; pointer-events:none; }

/* outer dashed ring */
.fid-ring {
  width:160px; height:200px;
  border:1px dashed rgba(0,230,118,.2);
  border-radius:50%;
  position:relative;
  display:flex; align-items:center; justify-content:center;
  animation: ringPulse 1.4s ease-in-out infinite;
}
@keyframes ringPulse {
  0%,100% { border-color:rgba(0,230,118,.18); }
  50%      { border-color:rgba(0,230,118,.45); }
}

/* face oval */
.fid-oval {
  width:130px; height:168px;
  border:1.5px solid rgba(0,230,118,.5);
  border-radius:50%;
  position:relative;
  overflow:hidden;
}
/* corner marks */
.fid-oval::before, .fid-oval::after {
  content:'';
  position:absolute;
  width:14px; height:14px;
  border-color: var(--green);
  border-style: solid;
}
.fid-oval::before { top:-1px; left:-1px; border-width:2px 0 0 2px; }
.fid-oval::after  { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }

/* scan line */
.fid-scan {
  position:absolute;
  left:-5%; right:-5%;
  height:2px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  box-shadow: 0 0 10px var(--green), 0 0 3px var(--green);
  top:-4px;
  animation: scanDown 2s ease-in-out forwards;
}
@keyframes scanDown {
  0%   { top:-4px; opacity:0; }
  8%   { opacity:1; }
  92%  { opacity:1; }
  100% { top:100%; opacity:0; }
}

/* dots on oval (decorative) */
.fid-dot {
  position:absolute;
  width:3px; height:3px;
  background: var(--green);
  border-radius:50%;
  animation: dotBlink 1.2s ease-in-out infinite;
}
@keyframes dotBlink {
  0%,100%{opacity:.3;} 50%{opacity:1;}
}

.fid-label {
  font-family: var(--mono);
  font-size:9px; letter-spacing:.4em; text-transform:uppercase;
  color: var(--green);
  opacity:0; animation: fidIn .4s ease .3s forwards;
}
.fid-status {
  font-family: var(--mono);
  font-size:8px; letter-spacing:.28em; text-transform:uppercase;
  color:rgba(0,230,118,.5);
  opacity:0; animation: fidIn .3s ease .6s forwards;
}
#fidGranted {
  font-family: var(--display);
  font-size:36px; letter-spacing:.12em;
  color: var(--green);
  text-shadow: 0 0 20px rgba(0,230,118,.5);
  position:absolute;
  opacity:0;
}

@keyframes fidIn { to{opacity:1;} }
@keyframes fidGrantedAnim {
  0%   { opacity:0; transform:scale(.88); }
  60%  { opacity:1; transform:scale(1.04); }
  100% { opacity:1; transform:scale(1); }
}

/* ────────────────────────────────────────────────────
   CUSTOM CURSOR — CROSSHAIR + COORDS
──────────────────────────────────────────────────── */
#cur {
  position:fixed;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  transition: transform .08s ease;
}

.cur-h, .cur-v {
  position:absolute;
  background: var(--white);
  mix-blend-mode:difference;
}
.cur-h { width:24px; height:1px; top:50%; left:50%; transform:translate(-50%,-50%); }
.cur-v { height:24px; width:1px; left:50%; top:50%; transform:translate(-50%,-50%); }

.cur-center {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:3px; height:3px;
  background: var(--blue);
  border-radius:50%;
  mix-blend-mode:normal;
}

.cur-data {
  position:absolute;
  top:16px; left:16px;
  font-family: var(--mono);
  font-size:7px; letter-spacing:.08em;
  color:rgba(237,237,237,.35);
  white-space:nowrap;
  mix-blend-mode:normal;
}

#cur.on-interactive .cur-h { width:36px; }
#cur.on-interactive .cur-v { height:36px; }
#cur.on-interactive .cur-center { width:6px; height:6px; background:var(--blue); }

/* ────────────────────────────────────────────────────
   HEADER
──────────────────────────────────────────────────── */
.header-bar {
  position:fixed; top:0; left:0; right:0; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 40px; height:54px;
  border-bottom:1px solid var(--line);
  background:rgba(7,7,7,.92);
  backdrop-filter:blur(10px);
}
.back {
  font-size:11px; font-weight:700;
  letter-spacing:.16em; text-transform:uppercase;
  text-decoration:none; color:var(--dim);
  transition:color .2s;
}
.back:hover { color:var(--white); }
.header-title {
  font-family: var(--display);
  font-size:20px; letter-spacing:.1em;
  color:rgba(237,237,237,.12);
  user-select:none;
}

/* ────────────────────────────────────────────────────
   HUD ELEMENTS (TouchDesigner aesthetic)
──────────────────────────────────────────────────── */
.hud {
  position:fixed;
  font-family: var(--mono);
  font-size:8px; letter-spacing:.16em; text-transform:uppercase;
  pointer-events:none;
  z-index:50;
  line-height:1.9;
}
.hud-tl { top:68px; left:40px; color:rgba(77,106,255,.55); }
.hud-tr { top:68px; right:40px; text-align:right; color:rgba(237,237,237,.18); }

.hud-pulse {
  display:inline-block;
  width:5px; height:5px;
  background:var(--blue);
  border-radius:50%;
  margin-right:6px;
  vertical-align:middle;
  animation: hudBlink 2.4s ease-in-out infinite;
}
@keyframes hudBlink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

/* ────────────────────────────────────────────────────
   WALL (full-screen canvas)
──────────────────────────────────────────────────── */
.wall {
  position:fixed;
  inset:0;
  overflow:visible;
}

/* ────────────────────────────────────────────────────
   FOLDER / PATCH
──────────────────────────────────────────────────── */
.folder {
  position:absolute;
  width:210px;
  cursor:none;
  /* floating set via JS */
}
.folder:hover { z-index:90 !important; }

/* tape strip */
.folder-tape {
  position:absolute;
  top:-11px; left:50%;
  transform:translateX(-50%) rotate(-1deg);
  width:72px; height:18px;
  background:rgba(237,237,237,.09);
  backdrop-filter:blur(4px);
  z-index:2;
  border-radius:1px;
}

/* card body */
.folder-card {
  background:#0e0e0e;
  border:1px solid #1f1f1f;
  padding:10px;
  position:relative;
  transition:
    transform .4s cubic-bezier(.23,1,.32,1),
    box-shadow .4s ease,
    border-color .3s;
}
.folder:hover .folder-card {
  transform:translateY(-4px) scale(1.01);
  box-shadow:0 20px 50px rgba(0,0,0,.8), 0 0 0 1px rgba(77,106,255,.18);
  border-color:rgba(77,106,255,.3);
}

/* empty folder style */
.folder.empty .folder-card {
  border-style:dashed;
  border-color:#181818;
  opacity:.45;
}
.folder.empty:hover .folder-card {
  border-color:#303030;
  box-shadow:none;
  transform:none;
}

/* photo stack */
.folder-photos {
  position:relative;
  height:136px;
  margin-bottom:10px;
}
.folder-photo, .folder-photo-ph {
  position:absolute;
  width:124px; height:100px;
  transition:transform .45s cubic-bezier(.23,1,.32,1);
  box-shadow:2px 3px 14px rgba(0,0,0,.7);
}
.folder-photo { object-fit:cover; display:block; }
.folder-photo-ph {
  background:#151515;
  display:flex; align-items:center; justify-content:center;
}
.folder-photo-ph::after {
  content:attr(data-label);
  font-family:var(--mono);
  font-size:6px; letter-spacing:.18em; text-transform:uppercase;
  color:#2a2a2a;
}

/* stacking positions */
.folder-photo:nth-child(1),.folder-photo-ph:nth-child(1) { transform:rotate(-4.5deg) translate(-4px,4px); z-index:3; left:4px; top:8px; }
.folder-photo:nth-child(2),.folder-photo-ph:nth-child(2) { transform:rotate(2deg)   translate( 2px,0px); z-index:2; left:22px; top:2px; }
.folder-photo:nth-child(3),.folder-photo-ph:nth-child(3) { transform:rotate(-1deg)  translate( 0px,6px); z-index:1; left:46px; top:10px; }

/* spread on hover */
.folder:hover .folder-photo:nth-child(1),
.folder:hover .folder-photo-ph:nth-child(1) { transform:rotate(-8deg)  translate(-18px, 8px); }
.folder:hover .folder-photo:nth-child(2),
.folder:hover .folder-photo-ph:nth-child(2) { transform:rotate( 4deg)  translate(  4px,-10px); }
.folder:hover .folder-photo:nth-child(3),
.folder:hover .folder-photo-ph:nth-child(3) { transform:rotate( 2deg)  translate( 18px, 4px); }

/* label row */
.folder-label {
  display:flex; justify-content:space-between; align-items:flex-end;
  border-top:1px solid var(--line);
  padding-top:8px;
}
.folder-name {
  font-family: var(--display);
  font-size:20px; letter-spacing:.03em; line-height:1;
  color:var(--white);
}
.folder.empty .folder-name { color:var(--dim); font-size:16px; }
.folder-count {
  font-family: var(--mono);
  font-size:7px; letter-spacing:.1em;
  color:var(--dim);
}

/* "TBA" tag on empty */
.folder-tba {
  font-family: var(--mono);
  font-size:6px; letter-spacing:.2em; text-transform:uppercase;
  color:rgba(77,106,255,.45);
  padding:2px 5px;
  border:1px solid rgba(77,106,255,.18);
  margin-top:4px;
}

/* "coming soon" flash */
.folder-flash {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(7,7,7,.92);
  font-family:var(--mono);
  font-size:8px; letter-spacing:.22em; text-transform:uppercase;
  color:rgba(77,106,255,.7);
  opacity:0;
  pointer-events:none;
  transition:opacity .2s;
  z-index:10;
}
.folder.empty:active .folder-flash { opacity:1; }

/* ────────────────────────────────────────────────────
   FLOATING ANIMATION (via JS custom props)
──────────────────────────────────────────────────── */
@keyframes float0 { 0%,100%{translate:0 0px;} 50%{translate:0 -5px;} }
@keyframes float1 { 0%,100%{translate:0 0px;} 50%{translate:0 -6px;} }
@keyframes float2 { 0%,100%{translate:0 0px;} 50%{translate:0 -4px;} }
@keyframes float3 { 0%,100%{translate:0 0px;} 50%{translate:0 -7px;} }
@keyframes float4 { 0%,100%{translate:0 0px;} 50%{translate:0 -5px;} }
@keyframes float5 { 0%,100%{translate:0 0px;} 50%{translate:0 -4px;} }

/* ────────────────────────────────────────────────────
   MODAL
──────────────────────────────────────────────────── */
.modal {
  position:fixed; inset:0;
  z-index:400;
  display:flex; align-items:center; justify-content:center;
  visibility:hidden; opacity:0;
  transition:opacity .35s ease, visibility .35s;
  padding:60px 3vw 40px;
}
.modal.active { visibility:visible; opacity:1; }

.modal-bd {
  position:absolute; inset:0;
  backdrop-filter:blur(14px) saturate(.7);
  background:rgba(0,0,0,.75);
}

.modal-panel {
  position:relative;
  width:100%; max-width:1200px;
  height:85vh;
  background:#0c0c0c;
  border:1px solid var(--line);
  display:grid;
  grid-template-columns:1fr 340px;
  overflow:hidden;
  z-index:410;
  transform:scale(.94);
  transition:transform .38s cubic-bezier(.23,1,.32,1);
}
.modal.active .modal-panel { transform:scale(1); }

/* corner bracket decoration */
.modal-corner {
  position:absolute;
  width:18px; height:18px;
  border-color:var(--blue);
  border-style:solid;
  pointer-events:none;
  z-index:5;
}
.modal-corner.tl { top:-1px; left:-1px; border-width:2px 0 0 2px; }
.modal-corner.tr { top:-1px; right:-1px; border-width:2px 2px 0 0; }
.modal-corner.bl { bottom:-1px; left:-1px; border-width:0 0 2px 2px; }
.modal-corner.br { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }

/* gallery side */
.modal-gallery {
  display:flex; flex-direction:column;
  overflow:hidden; background:#080808;
  height:85vh; position:relative;
}
.modal-img-wrap {
  flex:1; min-height:0;
  display:flex; align-items:flex-start; justify-content:center;
  overflow:hidden;
  background:#080808;
}
.modal-main-img {
  width:100%; height:100%;
  object-fit:contain;
  object-position:top center;
  display:block;
}

/* nav arrows */
.modal-nav {
  position:absolute; top:50%; transform:translateY(-50%);
  background:none; border:none;
  font-size:32px; color:rgba(237,237,237,.2);
  cursor:none; padding:20px; z-index:10;
  transition:color .2s;
}
.modal-nav:hover { color:var(--white); }
.modal-prev { left:0; }
.modal-next { right:0; }

/* progress bar */
.modal-prog {
  position:absolute; bottom:72px; left:0;
  height:1px; background:var(--blue);
  transition:width .25s;
  z-index:5;
}

/* thumbnail strip */
.modal-thumbs {
  height:72px; flex-shrink:0;
  display:flex; overflow-x:auto; overflow-y:hidden;
  border-top:1px solid var(--line);
  scrollbar-width:none;
}
.modal-thumbs::-webkit-scrollbar { display:none; }
.modal-thumb {
  width:72px; height:72px; flex-shrink:0;
  object-fit:cover; opacity:.38;
  border-right:1px solid var(--line);
  cursor:none; transition:opacity .2s;
  display:block;
}
.modal-thumb:last-child { border-right:none; }
.modal-thumb:hover { opacity:.75; }
.modal-thumb.active { opacity:1; box-shadow:inset 0 -2.5px 0 var(--blue); }

/* info side */
.modal-info {
  border-left:1px solid var(--line);
  display:flex; flex-direction:column;
  padding:28px 28px 24px;
  overflow-y:auto; height:85vh;
  scrollbar-width:thin; scrollbar-color:#333 transparent;
}
.modal-info::-webkit-scrollbar { width:4px; }
.modal-info::-webkit-scrollbar-thumb { background:#333; }

.modal-proj-name {
  font-family:var(--display);
  font-size:clamp(28px,3.5vw,46px);
  letter-spacing:.04em; line-height:1;
  color:var(--white); margin-bottom:4px;
}
.modal-proj-sub {
  font-family:var(--mono);
  font-size:8px; letter-spacing:.22em; text-transform:uppercase;
  color:var(--blue); margin-bottom:20px;
}
.modal-counter-display {
  font-family:var(--mono);
  font-size:28px; font-weight:700;
  color:rgba(237,237,237,.08);
  letter-spacing:.02em; line-height:1;
  margin-bottom:20px;
}
.modal-proj-desc {
  font-family:var(--mono);
  font-size:11px; line-height:1.85;
  color:rgba(237,237,237,.42);
  font-style:italic; flex:1;
}
.modal-close {
  position:absolute; top:12px; right:16px;
  background:none; border:none;
  font-family:var(--mono); font-size:10px;
  letter-spacing:.22em; text-transform:uppercase;
  color:var(--dim); cursor:none; z-index:420;
  transition:color .2s;
}
.modal-close:hover { color:var(--white); }

/* ────────────────────────────────────────────────────
   FOOTER
──────────────────────────────────────────────────── */
.footer-left {
  position:fixed; bottom:26px; left:40px;
  font-size:10px; font-weight:700;
  letter-spacing:.18em; text-transform:uppercase; z-index:50;
}
.footer-left a {
  color:var(--white); text-decoration:none;
  opacity:.22; transition:opacity .2s; font-family:var(--sans);
}
.footer-left a:hover { opacity:1; }

.global-footer {
  position:fixed; bottom:26px; right:40px;
  display:flex; gap:12px; align-items:center;
  font-size:10px; font-weight:700;
  letter-spacing:.18em; text-transform:uppercase; z-index:50;
}
.global-footer a {
  color:var(--white); text-decoration:none;
  opacity:.22; transition:opacity .2s; font-family:var(--sans);
}
.global-footer a:hover { opacity:1; }
.global-footer span { opacity:.1; }

/* ────────────────────────────────────────────────────
   MOBILE — basic graceful degradation
──────────────────────────────────────────────────── */
@media (max-width:760px) {
  .wall { overflow-y:auto; position:relative; min-height:100vh; padding:60px 20px 80px; }
  .folder { position:relative !important; left:auto !important; top:auto !important; width:auto; margin-bottom:24px; }
  .modal-panel { grid-template-columns:1fr; height:auto; max-height:92vh; overflow-y:auto; }
  .modal-gallery { height:55vw; }
  .modal-info { height:auto; }
  .hud { display:none; }
  #cur { display:none; }
  body { cursor:auto; overflow:auto; }
  html { overflow:auto; }
}
</style>
</head>
<body>

<!-- ──── FACE ID ──── -->
<div id="faceId">
  <div class="fid-ring">
    <div class="fid-oval">
      <div class="fid-scan"></div>
      <!-- dot decorations on oval edge -->
      <div class="fid-dot" style="top:-2px;left:calc(50% - 2px);animation-delay:.1s"></div>
      <div class="fid-dot" style="top:10px;left:-2px;animation-delay:.2s"></div>
      <div class="fid-dot" style="top:10px;right:-2px;animation-delay:.3s"></div>
      <div class="fid-dot" style="bottom:-2px;left:calc(50% - 2px);animation-delay:.4s"></div>
      <div class="fid-dot" style="bottom:14px;left:-2px;animation-delay:.15s"></div>
      <div class="fid-dot" style="bottom:14px;right:-2px;animation-delay:.25s"></div>
      <div class="fid-dot" style="top:50%;left:-2px;transform:translateY(-50%);animation-delay:.35s"></div>
      <div class="fid-dot" style="top:50%;right:-2px;transform:translateY(-50%);animation-delay:.05s"></div>
    </div>
  </div>
  <div class="fid-label">Face ID</div>
  <div class="fid-status" id="fidStatus">Scanning</div>
  <div id="fidGranted">ACCESS GRANTED</div>
</div>

<!-- ──── CURSOR ──── -->
<div id="cur">
  <div class="cur-h"></div>
  <div class="cur-v"></div>
  <div class="cur-center"></div>
  <div class="cur-data" id="curData">X:0000 Y:0000</div>
</div>

<!-- ──── HEADER ──── -->
<div class="header-bar">
  <a href="index.html" class="back">← Back</a>
  <div class="header-title">VISUAL</div>
  <div style="width:56px"></div>
</div>

<!-- ──── HUD ──── -->
<div class="hud hud-tl">
  <span class="hud-pulse"></span>SYSTEM ONLINE<br>
  <span style="margin-left:11px;color:rgba(237,237,237,.14);">AV · CREATIVE ARCHIVE</span>
</div>
<div class="hud hud-tr">
  <div id="hudTime">--:--:--</div>
  <div style="color:rgba(77,106,255,.35);">TO CREATE</div>
</div>

<!-- ──── WALL ──── -->
<div class="wall" id="wall"></div>

<!-- ──── MODAL ──── -->
<div class="modal" id="modal">
  <div class="modal-bd" id="modalBd"></div>
  <div class="modal-panel">
    <div class="modal-corner tl"></div>
    <div class="modal-corner tr"></div>
    <div class="modal-corner bl"></div>
    <div class="modal-corner br"></div>
    <button class="modal-close" id="modalClose">ESC ✕</button>

    <div class="modal-gallery" id="modalGallery">
      <div class="modal-img-wrap">
        <img class="modal-main-img" id="modalImg" src="" alt="">
      </div>
      <button class="modal-nav modal-prev" id="navPrev">‹</button>
      <button class="modal-nav modal-next" id="navNext">›</button>
      <div class="modal-prog" id="modalProg"></div>
      <div class="modal-thumbs" id="modalThumbs"></div>
    </div>

    <div class="modal-info">
      <div class="modal-proj-name"  id="modalName"></div>
      <div class="modal-proj-sub"   id="modalSub"></div>
      <div class="modal-counter-display" id="modalNum"></div>
      <p   class="modal-proj-desc"  id="modalDesc"></p>
    </div>
  </div>
</div>

<div class="global-footer">

</div>

<script>
/* ════════════════════════════════════════════════════
   PROJECT DATA
════════════════════════════════════════════════════ */
const PROJECTS = [
  {
    id: 'clo',
    name: 'CLO',
    sub: 'CUSTOM CLOTHING',
    desc: 'Hand-painted garments.\nNo sketch, no transfer.\nThe painting grew from the fabric up.',
    images: Array.from({length:20}, (_,i) => `images/assets/create/clo/cloth${i+1}.jpg`),
    rotation: -2.5,
    pos: { left:'5%',  top:'13%' },
    zIndex: 10,
    floatAnim: 'float0', floatDur: '5.2s', floatDelay: '0s',
  },
  {
    id: 'scan',
    name: 'SCAN',
    sub: 'GRAINS OF THE CITIES',
    desc: 'Cities leave marks.\nScanned surfaces, found materials.\nConcrete, rust, fabric, stone.',
    images: Array.from({length:10}, (_,i) => `images/assets/create/scan/Scan${i+1}.jpg`),
    rotation: 1.8,
    pos: { left:'56%', top:'10%' },
    zIndex: 11,
    floatAnim: 'float1', floatDur: '6.8s', floatDelay: '1.1s',
  },
  {
    id: 'portrait',
    name: 'NONE OF THEM IS ME',
    sub: 'SELF-PORTRAIT SERIES · GRAPHIC',
    desc: 'A series about the gap between how you see yourself and how you appear.\n\nNone of the versions is definitive.',
    images: Array.from({length:6}, (_,i) => `images/assets/create/portrait/Portrait${i+1}.jpg`),
    rotation: -1.2,
    pos: { left:'24%', top:'48%' },
    zIndex: 12,
    floatAnim: 'float2', floatDur: '4.9s', floatDelay: '0.6s',
  },
  {
    id: 'pilots',
    name: 'TWENTY ONE PILOTS',
    sub: 'HAND DRAWINGS · 2015–2019',
    desc: 'When I was younger, they shaped everything.\nAll my pain redirected through their image.\nEvery piece a different style, a different state.',
    images: Array.from({length:15}, (_,i) => `images/assets/create/pilots/pilots${i+1}.jpg`),
    rotation: 2.2,
    pos: { left:'67%', top:'50%' },
    zIndex: 13,
    floatAnim: 'float3', floatDur: '7.1s', floatDelay: '1.8s',
  },
  {
    id: 'graphic',
    name: 'GRAPHIC',
    sub: 'COMING SOON',
    desc: '',
    images: [],
    rotation: -0.9,
    pos: { left:'39%', top:'19%' },
    zIndex: 9,
    floatAnim: 'float4', floatDur: '5.7s', floatDelay: '0.3s',
    empty: true,
  },
  {
    id: 'motion',
    name: 'MOTION',
    sub: 'COMING SOON',
    desc: '',
    images: [],
    rotation: 1.4,
    pos: { left:'7%',  top:'63%' },
    zIndex: 8,
    floatAnim: 'float5', floatDur: '6.3s', floatDelay: '2.1s',
    empty: true,
  },
];

/* ════════════════════════════════════════════════════
   FACE ID SEQUENCE
════════════════════════════════════════════════════ */
const faceIdEl  = document.getElementById('faceId');
const fidStatus = document.getElementById('fidStatus');
const fidGranted= document.getElementById('fidGranted');

setTimeout(() => { fidStatus.textContent = 'Identity verified'; }, 1600);
setTimeout(() => {
  fidGranted.style.animation = 'fidGrantedAnim .45s ease forwards';
}, 1900);
setTimeout(() => {
  faceIdEl.classList.add('out');
}, 2500);

/* ════════════════════════════════════════════════════
   CLOCK
════════════════════════════════════════════════════ */
function tick() {
  const now = new Date();
  const t = [now.getHours(), now.getMinutes(), now.getSeconds()]
    .map(n => String(n).padStart(2,'0')).join(':');
  document.getElementById('hudTime').textContent = t;
}
tick(); setInterval(tick, 1000);

/* ════════════════════════════════════════════════════
   CURSOR
════════════════════════════════════════════════════ */
const cur     = document.getElementById('cur');
const curData = document.getElementById('curData');
let cx = 0, cy = 0;

document.addEventListener('mousemove', e => {
  cx = e.clientX; cy = e.clientY;
  cur.style.left = cx + 'px';
  cur.style.top  = cy + 'px';
  curData.textContent = `X:${String(cx).padStart(4,' ')} Y:${String(cy).padStart(4,' ')}`;
});

document.addEventListener('mouseover', e => {
  const t = e.target.closest('a,button,.folder:not(.empty)');
  cur.classList.toggle('on-interactive', !!t);
});

/* ════════════════════════════════════════════════════
   BUILD FOLDERS
════════════════════════════════════════════════════ */
const wall = document.getElementById('wall');

PROJECTS.forEach((p, idx) => {
  const div = document.createElement('div');
  div.className = 'folder' + (p.empty ? ' empty' : '');
  div.style.cssText = `
    left:${p.pos.left}; top:${p.pos.top};
    transform:rotate(${p.rotation}deg);
    z-index:${p.zIndex};
    animation:${p.floatAnim} ${p.floatDur} ease-in-out ${p.floatDelay} infinite;
  `;
  div.dataset.id = p.id;

  // tape
  const tape = document.createElement('div');
  tape.className = 'folder-tape';
  // slight random tape angle
  tape.style.transform = `translateX(-50%) rotate(${-1 + Math.random() * 2.5}deg)`;

  // card
  const card = document.createElement('div');
  card.className = 'folder-card';

  // photos
  const photos = document.createElement('div');
  photos.className = 'folder-photos';

  if (p.images.length > 0) {
    p.images.slice(0, 3).forEach(src => {
      const img = document.createElement('img');
      img.className = 'folder-photo';
      img.src = src;
      img.alt = p.name;
      img.onerror = () => img.style.opacity = '0';
      photos.appendChild(img);
    });
  } else {
    for (let i = 0; i < 2; i++) {
      const ph = document.createElement('div');
      ph.className = 'folder-photo-ph';
      ph.dataset.label = 'tba';
      photos.appendChild(ph);
    }
  }

  // label row
  const label = document.createElement('div');
  label.className = 'folder-label';
  label.innerHTML = `
    <div class="folder-name">${p.name}</div>
    <div class="folder-count">${p.images.length ? p.images.length + ' files' : 'tba'}</div>
  `;

  // flash for empty
  const flash = document.createElement('div');
  flash.className = 'folder-flash';
  flash.textContent = 'coming soon';

  card.appendChild(photos);
  card.appendChild(label);
  card.appendChild(flash);
  div.appendChild(tape);
  div.appendChild(card);
  wall.appendChild(div);

  // click
  if (!p.empty) {
    div.addEventListener('click', () => openModal(p.id));
  }
});

/* ════════════════════════════════════════════════════
   MODAL
════════════════════════════════════════════════════ */
const modal      = document.getElementById('modal');
const modalImg   = document.getElementById('modalImg');
const modalName  = document.getElementById('modalName');
const modalSub   = document.getElementById('modalSub');
const modalNum   = document.getElementById('modalNum');
const modalDesc  = document.getElementById('modalDesc');
const modalThumbs= document.getElementById('modalThumbs');
const modalProg  = document.getElementById('modalProg');

let curImages = [], curIdx = 0;

function openModal(id) {
  const p = PROJECTS.find(x => x.id === id);
  if (!p || !p.images.length) return;

  curImages = p.images;
  curIdx = 0;

  modalName.textContent = p.name;
  modalSub.textContent  = p.sub;
  modalDesc.textContent = p.desc;

  // thumbs
  modalThumbs.innerHTML = '';
  p.images.forEach((src, i) => {
    const img = document.createElement('img');
    img.className = 'modal-thumb' + (i === 0 ? ' active' : '');
    img.src = src;
    img.alt = '';
    img.addEventListener('click', () => showImg(i));
    modalThumbs.appendChild(img);
  });

  showImg(0);
  modal.classList.add('active');
}

function showImg(idx) {
  curIdx = idx;
  const src = curImages[idx];

  // update main image
  modalImg.src = src;
  modalImg.onerror = () => { modalImg.removeAttribute('src'); };

  // counter
  const n = idx + 1, total = curImages.length;
  modalNum.textContent = String(n).padStart(2,'0') + ' · ' + String(total).padStart(2,'0');

  // progress
  modalProg.style.width = (n / total * 100) + '%';

  // thumbs
  document.querySelectorAll('.modal-thumb').forEach((t, i) =>
    t.classList.toggle('active', i === idx)
  );

  // scroll active thumb into view
  const activeTh = modalThumbs.children[idx];
  if (activeTh) activeTh.scrollIntoView({behavior:'smooth', block:'nearest', inline:'nearest'});
}

function navigate(dir) {
  showImg((curIdx + dir + curImages.length) % curImages.length);
}

function closeModal() { modal.classList.remove('active'); }

document.getElementById('navPrev').addEventListener('click',  () => navigate(-1));
document.getElementById('navNext').addEventListener('click',  () => navigate(+1));
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalBd').addEventListener('click',  closeModal);

window.addEventListener('keydown', e => {
  if (!modal.classList.contains('active')) return;
  if (e.key === 'Escape')     closeModal();
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate(+1);
});

/* ════════════════════════════════════════════════════
   CURSOR — make interactive elements not cursor:none broken
════════════════════════════════════════════════════ */
// re-attach cursor tracking to dynamically added elements
wall.addEventListener('mouseover', e => {
  const folder = e.target.closest('.folder:not(.empty)');
  cur.classList.toggle('on-interactive', !!folder);
});
</script>
</body>
