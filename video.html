<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVASIL — Video</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
::selection { background: #2a2a2a; color: #eee; }

:root {
  --white: #eeeeee;
  --dim:   rgba(238,238,238,.5);
  --line:  rgba(238,238,238,.12);
  --blue:  #4d6aff;
}

html, body {
  height: 100%; overflow: hidden;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  color: var(--white); cursor: none; background: #060606;
}

/* ── CURSOR ── */
#cur {
  position: fixed; width: 10px; height: 10px;
  background: white; border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width .16s, height .16s;
  mix-blend-mode: difference;
}
#cur.big { width: 50px; height: 50px; }
@media (hover: none) { #cur { display: none; } }

/* ── BG CROSSFADE — two layers ── */
.bg-a, .bg-b {
  position: fixed; inset: 0; z-index: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  filter: blur(3px);
  transform: scale(1.03);   /* covers blur edges */
  transition: opacity .9s ease;
}
.bg-a { opacity: 1; }
.bg-b { opacity: 0; }

.bg-veil {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: rgba(0,0,0,.55);
}
.grain {
  position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: .05;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px;
}

/* ── PAGE ── */
.page {
  position: fixed; inset: 0; z-index: 3;
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  pointer-events: none;
}
.page * { pointer-events: auto; }

/* ── TOP BAR ── */
.top-bar {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 32px 44px 0; gap: 32px;
}
.back {
  font-size: 12px; font-weight: 700; letter-spacing: .18em;
  text-transform: uppercase; text-decoration: none; color: var(--dim);
  transition: color .2s; flex-shrink: 0; padding-top: 2px;
}
.back:hover { color: var(--white); }

/* manifesto top-right */
.manifesto {
  text-align: right; max-width: 340px; pointer-events: none;
  font-size: clamp(12px, 1.1vw, 15px);
  font-style: italic; font-weight: 400;
  line-height: 1.7; letter-spacing: .01em;
  color: rgba(238,238,238,.65);
}

/* ── STAGE ── */
.stage {
  display: flex; align-items: center; justify-content: center;
  padding: 0 48px;
}
.arrow {
  flex-shrink: 0; width: 52px; height: 52px;
  border: 1px solid var(--line); background: rgba(0,0,0,.35);
  display: flex; align-items: center; justify-content: center;
  cursor: none; transition: border-color .2s, background .2s;
}
.arrow:hover { border-color: rgba(238,238,238,.5); background: rgba(0,0,0,.65); }
.arrow svg { width: 20px; height: 20px; fill: none; stroke: var(--white); stroke-width: 1.5; }

.video-frame { flex: 1; max-width: 880px; }
.video-ratio {
  position: relative; width: 100%; padding-bottom: 56.25%;
  background: #000;
  box-shadow: 0 12px 80px rgba(0,0,0,.9), 0 0 0 1px rgba(255,255,255,.06);
}
.video-ratio iframe {
  position: absolute; inset: 0; width: 100%; height: 100%; border: none;
}

/* video title row — fixed height so layout never shifts */
.video-info {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 16px 2px 0;
  height: 52px; /* fixed — prevents layout jump between videos */
}
.video-title {
  font-size: clamp(22px, 2.6vw, 34px);
  font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  color: var(--white); line-height: 1;
}
.video-counter {
  font-size: clamp(13px, 1.1vw, 16px);
  font-weight: 700; letter-spacing: .22em;
  color: rgba(238,238,238,.55);
}

/* ── FILMSTRIP ── */
.filmstrip-wrap {
  padding: 0 44px;
  /* overflow visible so tooltips can escape upward */
  overflow: visible;
}
.filmstrip {
  display: flex; gap: 10px;
  overflow-x: auto;
  overflow-y: visible;           /* tooltips must go up */
  padding-bottom: 6px;
  padding-top: 180px;            /* invisible space above thumbs for tooltip */
  margin-top: -180px;            /* pull back so no gap in layout */
  scrollbar-width: none;
}
.filmstrip::-webkit-scrollbar { display: none; }

.strip-item {
  flex-shrink: 0; width: 130px; cursor: none;
  opacity: .75; transition: opacity .2s, transform .2s;
  position: relative;
}
.strip-item:hover  { opacity: 1; transform: translateY(-2px); }
.strip-item.active { opacity: 1; }
.strip-item.active::after {
  content: ''; position: absolute; bottom: -5px; left: 0; right: 0;
  height: 2px; background: var(--blue);
}
.strip-thumb {
  width: 130px; height: 74px; object-fit: cover; display: block;
}
.strip-ph {
  width: 130px; height: 74px; background: #1e1e1e;
  display: flex; align-items: center; justify-content: center;
  font-size: 7px; letter-spacing: .15em; text-transform: uppercase; color: #444;
}
.strip-name {
  font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: rgba(238,238,238,.8); margin-top: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── CINEMA TOOLTIP ── */
/* anchored to left edge of each thumb — not centered */
.cinema-tooltip {
  position: absolute;
  bottom: calc(100% + 18px);  /* above the thumb */
  left: 0;                    /* LEFT edge of that specific strip-item */
  width: 210px;
  background: #0c0c0c;
  border: 1px solid rgba(238,238,238,.15);
  padding: 11px 13px 10px;
  pointer-events: none;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .2s ease, transform .2s ease;
  z-index: 100;
  /* film-frame: double inner border */
  box-shadow: inset 0 0 0 3px #0c0c0c, inset 0 0 0 4px rgba(238,238,238,.08);
}
/* sprocket holes — top & bottom */
.cinema-tooltip::before,
.cinema-tooltip::after {
  content: '';
  position: absolute; left: 0; right: 0; height: 7px;
  background-image: repeating-linear-gradient(
    90deg,
    transparent 0, transparent 5px,
    rgba(238,238,238,.1) 5px, rgba(238,238,238,.1) 12px
  );
}
.cinema-tooltip::before { top: -8px; }
.cinema-tooltip::after  { bottom: -8px; }

.tooltip-title {
  display: block;
  font-size: 8px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase;
  color: rgba(238,238,238,.28); margin-bottom: 5px;
}
.tooltip-caption {
  font-size: 11px; font-style: italic; font-weight: 400;
  line-height: 1.6; letter-spacing: .02em;
  color: rgba(238,238,238,.75);
}

/* show on hover — no translateX */
.strip-item:hover .cinema-tooltip {
  opacity: 1;
  transform: translateY(0);
}

/* ── BOTTOM BAR — same on all pages ── */
.bottom-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 44px 28px;
  border-top: 1px solid var(--line);
  margin-top: 10px;
}
.footer-left a {
  font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  text-decoration: none; color: var(--white); opacity: .35; transition: opacity .2s;
}
.footer-left a:hover { opacity: 1; }
.footer-links {
  display: flex; gap: 14px; align-items: center;
  font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
}
.footer-links a { color: var(--white); text-decoration: none; opacity: .35; transition: opacity .2s; }
.footer-links a:hover { opacity: 1; }
.footer-links .sep { opacity: .18; }

/* ── MOBILE (ПОЛНОСТЬЮ ИСПРАВЛЕНО И ИЗОЛИРОВАНО) ── */
@media (max-width: 768px) {
  html, body { overflow-y: auto; overflow-x: hidden; height: auto; }
  
  /* Отключаем Grid на мобильных, чтобы элементы не ломали верстку и не сдвигались */
  .page { 
    display: block; 
    position: relative; 
    height: auto; 
    min-height: 100svh; 
    width: 100vw; 
    max-width: 100vw; 
    overflow-x: hidden; 
  }
  .bg-a, .bg-b, .bg-veil, .grain { position: fixed; }

  .top-bar, .stage, .filmstrip-wrap, .bottom-bar { 
    width: 100vw;
    max-width: 100vw;
    min-width: 0; 
    box-sizing: border-box; 
  }

  /* Шапка */
  .top-bar { 
    padding: 24px 20px 0; 
    display: flex;
    flex-direction: column; 
    gap: 16px; 
  }
  .manifesto { 
    max-width: 100%; 
    font-size: 13px; 
    text-align: left; 
  }
  
  /* УБИРАЕМ СТРЕЛКИ НА МОБИЛЬНОЙ ВЕРСИИ */
  .arrow { 
    display: none !important; 
  }

  /* Сцена: Теперь экран 100% будет центрирован */
  .stage { 
    display: block; 
    padding: 32px 20px; /* 20px отступ слева и справа: экран ровно посередине */
  }
  
  .video-frame { 
    width: 100%; 
    max-width: 100%; 
    margin: 0 auto; /* Жесткое центрирование */
  }
  .video-info { 
    height: auto; 
    padding: 12px 0 0; 
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap; /* Заголовок перенесется, если он очень длинный */
    gap: 8px;
  }
  .video-title { 
    font-size: 18px; 
    white-space: normal; 
    word-break: break-word; 
  }
  
  /* Миниатюры: Выровнены по той же линии (20px отступ) */
  .filmstrip-wrap { 
    padding: 0 20px; 
  }
  .strip-item { width: 90px; }
  .strip-thumb, .strip-ph { width: 90px; height: 51px; }
  .cinema-tooltip { width: 140px; font-size: 10px; }
  
  /* Подвал: Настройка выравнивания по левому краю */
  .bottom-bar { 
    display: flex;
    flex-direction: column; 
    align-items: flex-start; 
    padding: 32px 20px 40px; /* 32px сверху опустит ссылки чуть ниже */
    gap: 12px; 
    margin-top: 0; 
  }
  .footer-links { 
    display: flex;
    flex-wrap: wrap; 
    gap: 12px; 
    width: 100%;
  }
  /* Делаем почту на 100% ширины, чтобы IG и LinkedIn упали под неё на вторую строку */
  .footer-links a[href^="mailto"] { 
    width: 100%; 
  }
  .footer-links .sep { display: none; }
}
</style>
</head>
<body>

<div id="cur"></div>
<div class="bg-a" id="bgA"></div>
<div class="bg-b" id="bgB"></div>
<div class="bg-veil"></div>
<div class="grain"></div>

<div class="page">

  <div class="top-bar">
    <a href="index.html" class="back">&#8592; Back</a>
    <div class="manifesto">
      I never trained to shoot &mdash; I just stopped being afraid of the camera.<br>
      Noticing details through a lens became part of how I think.<br>
      Editing became a form of experiment.<br>
      The outcome is rarely known in advance. That&rsquo;s the point.
    </div>
  </div>

  <div class="stage">
    <button class="arrow" id="btnPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="video-frame">
      <div class="video-ratio">
        <iframe id="vimeoFrame" src=""
          allow="fullscreen; picture-in-picture" allowfullscreen></iframe>
      </div>
      <div class="video-info">
        <div class="video-title" id="vTitle"></div>
        <div class="video-counter" id="vCounter"></div>
      </div>
    </div>
    <button class="arrow" id="btnNext" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>

  <div class="filmstrip-wrap">
    <div class="filmstrip" id="filmstrip"></div>
  </div>

  <div class="bottom-bar">
    <div class="footer-left">
      <a href="about.html">About</a>
    </div>
    <div class="footer-links">
      <a href="mailto:navilen@bk.ru">NAVILEN@BK.RU</a>
      <span class="sep">&mdash;</span>
      <a href="https://www.instagram.com/molodostibolshenebudet/" target="_blank">Instagram</a>
      <span class="sep">&mdash;</span>
      <a href="https://linkedin.com/in/worldwidemoment/" target="_blank">LinkedIn</a>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
//  ВИДЕО — редактируй только этот массив
//  id      — Vimeo ID из URL: vimeo.com/XXXXXXXXX
//  title   — название
//  caption — всплывает в cinema-tooltip при наведении на миниатюру
//  bg      — фото фона → папка images/video/ в репозитории
//  thumb   — превью (vumbnail.com/ID.jpg генерирует автоматически)
// ═══════════════════════════════════════════════════════
var VIDEOS = [
  {
    id:      '1171844542',
    title:   'BIRDS',
    caption: 'From Paris with love.',
    bg:      'images/video/videobirds1.jpg',
    thumb:   'https://vumbnail.com/1171844542.jpg'
  },
  {
    id:      '1172106551',
    title:   'Rebirth Cycles',
    caption: 'A journey into the past. A meditation on caring for abandoned homes. The inevitability of cycles repeating.',
    bg:      'images/video/videoRebirthCycles.jpg',
    thumb:   'https://vumbnail.com/1172106551.jpg'
  },
  {
    id:      '1172281707',
    title:   'Special Diary',
    caption: 'This is how life used to feel.',
    bg:      'images/video/videocrystal1.jpg',
    thumb:   'https://vumbnail.com/1172281707.jpg'
  },
  {
    id:      '1172106388',
    title:   'LVL',
    caption: 'Short experimental stuff with friends.',
    bg:      'images/video/videolvl.jpg',
    thumb:   'https://vumbnail.com/1172106388.jpg'
  },
  {
    id:      '1172128536',
    title:   'Short Walks Down Long Roads',
    caption: 'Just a feeling.',
    bg:      'images/video/videoshort1.jpg',
    thumb:   'https://vumbnail.com/1172128536.jpg'
  },
  {
    id:      '1172128396',
    title:   'Youth Chapter',
    caption: 'Was filmed with an ice cream in one hand.',
    bg:      'images/video/videoruslan.png',
    thumb:   'https://vumbnail.com/1172128396.jpg'
  }
];
// ═══════════════════════════════════════════════════════

var current     = 0;
var frame       = document.getElementById('vimeoFrame');
var bgA         = document.getElementById('bgA');
var bgB         = document.getElementById('bgB');
var activeLayer = 'a';
var titleEl     = document.getElementById('vTitle');
var counterEl   = document.getElementById('vCounter');
var strip       = document.getElementById('filmstrip');

function makePh(label) {
  var d = document.createElement('div');
  d.className = 'strip-ph';
  d.textContent = label || 'video';
  return d;
}

// build filmstrip
VIDEOS.forEach(function(v, i) {
  var item = document.createElement('div');
  item.className = 'strip-item' + (i === 0 ? ' active' : '');

  // thumbnail
  if (v.thumb) {
    var img = document.createElement('img');
    img.className = 'strip-thumb';
    img.src = v.thumb;
    img.alt = v.title;
    img.onerror = function() { this.replaceWith(makePh(v.title)); };
    item.appendChild(img);
  } else {
    item.appendChild(makePh(v.title));
  }

  // name below thumb
  var nameEl = document.createElement('div');
  nameEl.className = 'strip-name';
  nameEl.textContent = v.title;
  item.appendChild(nameEl);

  // cinema tooltip above thumb
  if (v.caption) {
    var tip = document.createElement('div');
    tip.className = 'cinema-tooltip';

    var tipTitle = document.createElement('span');
    tipTitle.className = 'tooltip-title';
    tipTitle.textContent = v.title;
    tip.appendChild(tipTitle);

    var tipCap = document.createElement('div');
    tipCap.className = 'tooltip-caption';
    tipCap.textContent = v.caption;
    tip.appendChild(tipCap);

    item.appendChild(tip);
  }

  item.addEventListener('click', (function(idx) {
    return function() { goTo(idx); };
  })(i));

  strip.appendChild(item);
});

// crossfade background
function setBg(url) {
  if (activeLayer === 'a') {
    bgB.style.backgroundImage = url ? "url('" + url + "')" : 'none';
    bgB.style.opacity = '1';
    bgA.style.opacity = '0';
    activeLayer = 'b';
  } else {
    bgA.style.backgroundImage = url ? "url('" + url + "')" : 'none';
    bgA.style.opacity = '1';
    bgB.style.opacity = '0';
    activeLayer = 'a';
  }
}

function goTo(i, skipHash) {
  current = ((i % VIDEOS.length) + VIDEOS.length) % VIDEOS.length;
  var v = VIDEOS[current];

  // no autoplay — user presses play in player
  frame.src = 'https://player.vimeo.com/video/' + v.id
    + '?dnt=1&color=ffffff&title=0&byline=0&portrait=0';

  setBg(v.bg);

  titleEl.textContent   = v.title || '';
  counterEl.textContent =
    String(current + 1).padStart(2, '0') + ' / ' +
    String(VIDEOS.length).padStart(2, '0');

  document.querySelectorAll('.strip-item').forEach(function(el, idx) {
    el.classList.toggle('active', idx === current);
  });

  var activeItem = strip.children[current];
  if (activeItem) {
    activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  // deep link
  if (!skipHash) {
    history.replaceState(null, '', '#' + current);
  }
}

// arrows
document.getElementById('btnPrev').addEventListener('click', function() { goTo(current - 1); });
document.getElementById('btnNext').addEventListener('click', function() { goTo(current + 1); });

// keyboard
window.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft')  goTo(current - 1);
  if (e.key === 'ArrowRight') goTo(current + 1);
});

// init — read hash
(function() {
  var hash = parseInt(window.location.hash.replace('#', ''), 10);
  var start = (!isNaN(hash) && hash >= 0 && hash < VIDEOS.length) ? hash : 0;
  goTo(start, true);
}());

// cursor
var cur = document.getElementById('cur');
if (window.matchMedia('(hover: hover)').matches) {
  document.addEventListener('mousemove', function(e) {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });
  document.querySelectorAll('a, button, .strip-item').forEach(function(el) {
    el.addEventListener('mouseenter', function() { cur.classList.add('big'); });
    el.addEventListener('mouseleave', function() { cur.classList.remove('big'); });
  });
}
</script>
</body>
</html>
