<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video — AV</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
::selection { background: #2a2a2a; color: #eee; }
:root {
  --white: #eeeeee;
  --dim:   rgba(238,238,238,.5);
  --line:  rgba(238,238,238,.12);
  --blue:  #4d6aff;
}
html, body {
  height: 100%; overflow: hidden;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  color: var(--white); cursor: none; background: #060606;
}
#cur {
  position: fixed; width: 10px; height: 10px;
  background: white; border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width .16s, height .16s;
  mix-blend-mode: difference;
}
#cur.big { width: 50px; height: 50px; }
@media (hover: none) { #cur { display: none; } }

/* ── BG CROSSFADE ── */
.bg-a, .bg-b {
  position: fixed; inset: 0; z-index: 0;
  background-size: cover; background-position: center; background-repeat: no-repeat;
  filter: blur(3px); transform: scale(1.03);
  transition: opacity .9s ease;
}
.bg-a { opacity: 1; }
.bg-b { opacity: 0; }
.bg-veil {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: rgba(0,0,0,.54);
}
.grain {
  position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: .05;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px 180px;
}

/* ── PAGE GRID ── */
.page {
  position: fixed; inset: 0; z-index: 3;
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  pointer-events: none;
}
.page * { pointer-events: auto; }

/* ── TOP BAR ── */
.top-bar {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 32px 44px 0;
}
.back {
  font-size: 12px; font-weight: 700; letter-spacing: .18em;
  text-transform: uppercase; text-decoration: none; color: var(--dim);
  transition: color .2s; flex-shrink: 0;
}
.back:hover { color: var(--white); }

/* description — top right */
.page-desc {
  max-width: 300px; text-align: right;
  pointer-events: none;
}
.page-desc p {
  font-size: 11px; font-weight: 400; line-height: 1.75;
  letter-spacing: .04em;
  color: rgba(238,238,238,.42);
  font-style: italic;
}
.page-desc p strong {
  font-style: normal; font-weight: 600;
  color: rgba(238,238,238,.65);
}

/* ── STAGE ── */
.stage {
  display: flex; align-items: center; justify-content: center;
  padding: 0 48px;
}
.arrow {
  flex-shrink: 0; width: 52px; height: 52px;
  border: 1px solid var(--line); background: rgba(0,0,0,.35);
  display: flex; align-items: center; justify-content: center;
  cursor: none; transition: border-color .2s, background .2s;
}
.arrow:hover { border-color: rgba(238,238,238,.5); background: rgba(0,0,0,.65); }
.arrow svg { width: 20px; height: 20px; fill: none; stroke: var(--white); stroke-width: 1.5; }

.video-frame { flex: 1; max-width: 880px; position: relative; }
.video-ratio {
  position: relative; width: 100%; padding-bottom: 56.25%;
  background: #000;
  box-shadow: 0 12px 80px rgba(0,0,0,.9), 0 0 0 1px rgba(255,255,255,.06);
}
.video-ratio iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%; border: none;
}

/* title row — fixed height so nothing jumps */
.video-info {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 14px 2px 0;
  height: 36px; /* fixed — prevents layout shift */
}
.video-title {
  font-size: clamp(16px, 1.8vw, 22px);
  font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--white);
}
.video-counter {
  font-size: 13px; font-weight: 700; letter-spacing: .2em;
  color: rgba(238,238,238,.55);
}

/* ── FILMSTRIP ── */
.filmstrip-wrap {
  padding: 16px 44px 0;
  overflow: hidden;
  position: relative; /* anchor for tooltip */
}
.filmstrip {
  display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px;
  scrollbar-width: none;
}
.filmstrip::-webkit-scrollbar { display: none; }

.strip-item {
  flex-shrink: 0; width: 130px; cursor: none;
  opacity: .75; transition: opacity .2s, transform .2s;
  position: relative;
}
.strip-item:hover  { opacity: 1; transform: translateY(-2px); }
.strip-item.active { opacity: 1; }
.strip-item.active::after {
  content: ''; position: absolute; bottom: -5px; left: 0; right: 0;
  height: 2px; background: var(--blue);
}
.strip-thumb {
  width: 130px; height: 74px; object-fit: cover; display: block;
}
.strip-ph {
  width: 130px; height: 74px; background: #1e1e1e;
  display: flex; align-items: center; justify-content: center;
  font-size: 7px; letter-spacing: .15em; text-transform: uppercase; color: #444;
}
.strip-name {
  font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: rgba(238,238,238,.75); margin-top: 7px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── CINEMA TOOLTIP ── */
/* Fixed panel that floats above the filmstrip */
.cinema-tooltip {
  position: fixed;
  bottom: 0; /* recalculated via JS */
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  width: 340px;
  background: #0c0b09;
  border: 1px solid rgba(255,255,255,.18);
  pointer-events: none;
  z-index: 200;
  opacity: 0;
  transition: opacity .22s ease, transform .22s ease;
}
.cinema-tooltip.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* film sprocket strip — top & bottom */
.cinema-tooltip::before,
.cinema-tooltip::after {
  content: '';
  display: block;
  height: 10px;
  background:
    repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 5px,
      rgba(255,255,255,.12) 5px, rgba(255,255,255,.12) 6px,
      transparent 6px, transparent 14px,
      #1a1810 14px, #1a1810 20px
    );
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.cinema-tooltip::after {
  border-bottom: none;
  border-top: 1px solid rgba(255,255,255,.1);
}

.cinema-inner {
  padding: 12px 16px;
}
.cinema-label {
  font-size: 8px; font-weight: 700; letter-spacing: .28em;
  text-transform: uppercase; color: rgba(238,238,238,.3);
  margin-bottom: 7px;
  display: flex; justify-content: space-between; align-items: center;
}
.cinema-label span { color: var(--blue); }
.cinema-text {
  font-size: 11px; font-weight: 300; line-height: 1.7;
  color: rgba(238,238,238,.75); font-style: italic;
  letter-spacing: .03em;
}

/* ── BOTTOM BAR — matching other pages ── */
.bottom-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 44px 28px;
  border-top: 1px solid var(--line);
}
.footer-left a {
  font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  color: var(--white); text-decoration: none; opacity: .35; transition: opacity .2s;
}
.footer-left a:hover { opacity: 1; }
.footer-links {
  display: flex; gap: 16px; align-items: center;
  font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
}
.footer-links a { color: var(--white); text-decoration: none; opacity: .35; transition: opacity .2s; }
.footer-links a:hover { opacity: 1; }
.footer-links .sep { opacity: .18; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  html, body { overflow-y: auto; height: auto; }
  .page { position: relative; height: auto; min-height: 100svh; }
  .bg-a, .bg-b, .bg-veil, .grain { position: fixed; }
  .stage { padding: 0 10px; }
  .arrow { width: 36px; height: 36px; }
  .strip-item { width: 90px; }
  .strip-thumb, .strip-ph { width: 90px; height: 51px; }
  .filmstrip-wrap { padding: 14px 20px 0; }
  .bottom-bar { flex-direction: column; gap: 10px; align-items: flex-start; padding: 12px 20px 24px; }
  .top-bar { padding: 24px 20px 0; flex-wrap: wrap; gap: 12px; }
  .page-desc { text-align: left; max-width: 100%; }
  .footer-links { flex-wrap: wrap; gap: 8px; }
  .footer-links .sep { display: none; }
  .cinema-tooltip { width: 90vw; }
}
</style>
</head>
<body>

<div id="cur"></div>
<div class="bg-a" id="bgA"></div>
<div class="bg-b" id="bgB"></div>
<div class="bg-veil"></div>
<div class="grain"></div>

<!-- CINEMA TOOLTIP — lives outside .page to avoid clipping -->
<div class="cinema-tooltip" id="cinemaTooltip">
  <div class="cinema-inner">
    <div class="cinema-label">Note <span id="tooltipCounter"></span></div>
    <div class="cinema-text" id="tooltipText"></div>
  </div>
</div>

<div class="page">

  <!-- TOP BAR -->
  <div class="top-bar">
    <a href="index.html" class="back">&#8592; Back</a>
    <div class="page-desc">
      <p>I never trained to shoot — I just stopped being afraid of the camera.<br>
      Noticing details through a lens became part of how I think.<br>
      Editing became a form of experiment.<br>
      <strong>The outcome is rarely known in advance. That's the point.</strong></p>
    </div>
  </div>

  <!-- STAGE -->
  <div class="stage">
    <button class="arrow" id="btnPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="video-frame">
      <div class="video-ratio">
        <iframe id="vimeoFrame" src="" allow="fullscreen; picture-in-picture" allowfullscreen></iframe>
      </div>
      <div class="video-info">
        <div class="video-title" id="vTitle"></div>
        <div class="video-counter" id="vCounter"></div>
      </div>
    </div>
    <button class="arrow" id="btnNext" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>

  <!-- FILMSTRIP -->
  <div class="filmstrip-wrap" id="filmstripWrap">
    <div class="filmstrip" id="filmstrip"></div>
  </div>

  <!-- BOTTOM BAR — matching other pages -->
  <div class="bottom-bar">
    <div class="footer-left">
      <a href="about.html">About</a>
    </div>
    <div class="footer-links">
      <a href="mailto:navilen@bk.ru">navilen@bk.ru</a>
      <span class="sep">&mdash;</span>
      <a href="https://www.instagram.com/molodostibolshenebudet/" target="_blank">Instagram</a>
      <span class="sep">&mdash;</span>
      <a href="https://www.behance.net/avasileuskaya" target="_blank">Behance</a>
      <span class="sep">&mdash;</span>
      <a href="https://linkedin.com/in/worldwidemoment/" target="_blank">LinkedIn</a>
    </div>
  </div>

</div><!-- /page -->

<script>
// ═══════════════════════════════════════════════════════
//  ВИДЕО — редактируй только этот массив
//  id      — Vimeo ID из URL: vimeo.com/XXXXXXXXX
//  title   — название
//  caption — подпись (показывается в тултипе при наведении на стрип)
//  bg      — фото фона → папка images/video/ в репозитории
//  thumb   — превью стрипа (vumbnail.com/ID.jpg — автоматически)
// ═══════════════════════════════════════════════════════
var VIDEOS = [
  {
    id:      '1171844542',
    title:   'BIRDS',
    caption: 'From Paris with love.',
    bg:      'images/video/videobirds1.jpg',
    thumb:   'https://vumbnail.com/1171844542.jpg'
  },
  {
    id:      '1172106551',
    title:   'Rebirth Cycles',
    caption: 'A journey into the past. A meditation on caring for abandoned homes. The inevitability of cycles repeating.',
    bg:      'images/video/videoRebirthCycles.jpg',
    thumb:   'https://vumbnail.com/1172106551.jpg'
  },
  {
    id:      '1172281707',
    title:   'Special Diary',
    caption: 'This is how life used to feel.',
    bg:      'images/video/videocrystal1.jpg',
    thumb:   'https://vumbnail.com/1172281707.jpg'
  },
  {
    id:      '1172106388',
    title:   'LVL',
    caption: 'Short experimental stuff with friends.',
    bg:      'images/video/videolvl.jpg',
    thumb:   'https://vumbnail.com/1172106388.jpg'
  },
  {
    id:      '1172128536',
    title:   'Short Walks Down Long Roads',
    caption: 'Just a feeling.',
    bg:      'images/video/videoshort1.jpg',
    thumb:   'https://vumbnail.com/1172128536.jpg'
  },
  {
    id:      '1172128396',
    title:   'Youth Chapter',
    caption: 'Was filmed with an ice cream in one hand.',
    bg:      'images/video/videoruslan.png',
    thumb:   'https://vumbnail.com/1172128396.jpg'
  }
  // ,{ id:'XXXXXXXXX', title:'...', caption:'', bg:'images/video/bg.jpg', thumb:'https://vumbnail.com/XXXXXXXXX.jpg' }
];
// ═══════════════════════════════════════════════════════

var current     = 0;
var frame       = document.getElementById('vimeoFrame');
var bgA         = document.getElementById('bgA');
var bgB         = document.getElementById('bgB');
var activeLayer = 'a';
var titleEl     = document.getElementById('vTitle');
var counterEl   = document.getElementById('vCounter');
var strip       = document.getElementById('filmstrip');
var tooltip     = document.getElementById('cinemaTooltip');
var tooltipText = document.getElementById('tooltipText');
var tooltipCtr  = document.getElementById('tooltipCounter');
var filmwrap    = document.getElementById('filmstripWrap');
var hideTimer;

function makePh(t) {
  var d = document.createElement('div');
  d.className = 'strip-ph';
  d.textContent = t || 'video';
  return d;
}

// Build filmstrip
VIDEOS.forEach(function(v, i) {
  var item = document.createElement('div');
  item.className = 'strip-item' + (i === 0 ? ' active' : '');

  if (v.thumb) {
    var img = document.createElement('img');
    img.className = 'strip-thumb';
    img.src = v.thumb;
    img.alt = v.title;
    img.onerror = function() { this.replaceWith(makePh(v.title)); };
    item.appendChild(img);
  } else {
    item.appendChild(makePh(v.title));
  }

  var nameEl = document.createElement('div');
  nameEl.className = 'strip-name';
  nameEl.textContent = v.title;
  item.appendChild(nameEl);

  // click → go to video
  item.addEventListener('click', (function(idx){ return function(){ goTo(idx); }; })(i));

  // hover → show cinema tooltip
  item.addEventListener('mouseenter', (function(idx){ return function(){
    clearTimeout(hideTimer);
    var v = VIDEOS[idx];
    if (!v.caption) return;
    tooltipText.textContent = v.caption;
    tooltipCtr.textContent  = String(idx + 1).padStart(2,'0') + ' / ' + String(VIDEOS.length).padStart(2,'0');
    // position tooltip just above filmstrip wrap
    var rect = filmwrap.getBoundingClientRect();
    tooltip.style.bottom = (window.innerHeight - rect.top + 14) + 'px';
    tooltip.classList.add('visible');
  }; })(i));

  item.addEventListener('mouseleave', function(){
    hideTimer = setTimeout(function(){ tooltip.classList.remove('visible'); }, 120);
  });

  strip.appendChild(item);
});

// Keep tooltip visible when hovering it
tooltip.addEventListener('mouseenter', function(){ clearTimeout(hideTimer); });
tooltip.addEventListener('mouseleave', function(){ tooltip.classList.remove('visible'); });

function setBg(url) {
  if (activeLayer === 'a') {
    bgB.style.backgroundImage = url ? "url('" + url + "')" : 'none';
    bgB.style.opacity = '1'; bgA.style.opacity = '0'; activeLayer = 'b';
  } else {
    bgA.style.backgroundImage = url ? "url('" + url + "')" : 'none';
    bgA.style.opacity = '1'; bgB.style.opacity = '0'; activeLayer = 'a';
  }
}

function goTo(i) {
  current = ((i % VIDEOS.length) + VIDEOS.length) % VIDEOS.length;
  var v = VIDEOS[current];

  frame.src = 'https://player.vimeo.com/video/' + v.id +
    '?dnt=1&color=ffffff&title=0&byline=0&portrait=0';

  setBg(v.bg);

  titleEl.textContent   = v.title || '';
  counterEl.textContent =
    String(current + 1).padStart(2, '0') + ' / ' +
    String(VIDEOS.length).padStart(2, '0');

  document.querySelectorAll('.strip-item').forEach(function(el, idx) {
    el.classList.toggle('active', idx === current);
  });
  var active = strip.children[current];
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  // ── DEEP LINK: update URL hash so this video is shareable ──
  // Share video.html#2 → opens directly on video index 2
  if (window.history && window.history.replaceState) {
    window.history.replaceState(null, '', '#' + current);
  }
}

// ── Read URL hash on load for deep linking ──
(function() {
  var hash = window.location.hash.replace('#', '');
  var idx  = parseInt(hash, 10);
  if (!isNaN(idx) && idx >= 0 && idx < VIDEOS.length) {
    current = idx;
  }
  goTo(current);
})();

document.getElementById('btnPrev').addEventListener('click', function(){ goTo(current - 1); });
document.getElementById('btnNext').addEventListener('click', function(){ goTo(current + 1); });
window.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft')  goTo(current - 1);
  if (e.key === 'ArrowRight') goTo(current + 1);
});

// Cursor
var cur = document.getElementById('cur');
if (window.matchMedia('(hover: hover)').matches) {
  document.addEventListener('mousemove', function(e) {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });
  document.querySelectorAll('a, button, .strip-item').forEach(function(el) {
    el.addEventListener('mouseenter', function(){ cur.classList.add('big'); });
    el.addEventListener('mouseleave', function(){ cur.classList.remove('big'); });
  });
}
</script>
</body>
</html>
