<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
::selection{background:#2a2a2a;color:#eee}
:root{--white:#eeeeee;--dim:rgba(238,238,238,.5);--line:rgba(238,238,238,.12);--blue:#4d6aff}

html,body{height:100%;overflow:hidden;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:var(--white);cursor:none;background:#060606}

#cur{position:fixed;width:10px;height:10px;background:white;border-radius:50%;pointer-events:none;z-index:9999;will-change:transform;mix-blend-mode:difference}
#cur.big{width:50px;height:50px;transition:width .16s,height .16s}
@media(hover:none){#cur{display:none}}

.bg-a,.bg-b{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;filter:blur(3px);transform:scale(1.03);transition:opacity .9s ease}
.bg-a{opacity:1}.bg-b{opacity:0}
.bg-veil{position:fixed;inset:0;z-index:1;pointer-events:none;background:rgba(0,0,0,.55)}
.grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.05;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px}

/* top-nav 58px + marquee 28px = 86px */
.page{position:fixed;inset:0;padding-top:86px;z-index:3;display:grid;grid-template-rows:1fr auto auto;overflow:hidden}
.page *{pointer-events:auto}

.stage{display:flex;align-items:center;justify-content:center;padding:0 48px;min-height:0;overflow:hidden}
.arrow{flex-shrink:0;width:52px;height:52px;border:1px solid var(--line);background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;cursor:none;transition:border-color .2s,background .2s}
.arrow:hover{border-color:rgba(238,238,238,.5);background:rgba(0,0,0,.65)}
.arrow svg{width:20px;height:20px;fill:none;stroke:var(--white);stroke-width:1.5}

.video-frame{flex:1;max-width:880px;min-width:0;display:flex;flex-direction:column;min-height:0}
.video-ratio{position:relative;width:100%;aspect-ratio:16/9;background:#000;box-shadow:0 12px 80px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.06);overflow:hidden}
.video-ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.video-info{display:flex;justify-content:space-between;align-items:baseline;padding:14px 2px 0;flex-shrink:0;gap:12px}
.video-title{font-size:clamp(20px,2.4vw,32px);font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--white);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.video-counter{font-size:clamp(12px,1vw,15px);font-weight:700;letter-spacing:.22em;color:rgba(238,238,238,.55);flex-shrink:0}

.filmstrip-wrap{padding:0 44px;overflow:visible}
.filmstrip{display:flex;gap:10px;overflow-x:auto;overflow-y:visible;padding-bottom:6px;padding-top:80px;margin-top:-80px;scrollbar-width:none}
.filmstrip::-webkit-scrollbar{display:none}
.strip-item{flex-shrink:0;width:130px;cursor:none;opacity:.75;transition:opacity .2s,transform .2s;position:relative}
.strip-item:hover{opacity:1;transform:translateY(-2px)}
.strip-item.active{opacity:1}
.strip-item.active::after{content:'';position:absolute;bottom:-5px;left:0;right:0;height:2px;background:var(--blue)}
.strip-thumb{width:130px;height:74px;object-fit:cover;display:block}
.strip-ph{width:130px;height:74px;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:7px;letter-spacing:.15em;text-transform:uppercase;color:#444}
.strip-name{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(238,238,238,.8);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── CINEMA TOOLTIP ── */
.cinema-tooltip{
  position:absolute;bottom:calc(100% + 18px);left:0;width:210px;
  background:#0c0c0c;border:1px solid rgba(238,238,238,.15);
  padding:11px 13px 10px;pointer-events:none;
  opacity:0;transform:translateY(8px);
  transition:opacity .2s ease,transform .2s ease;
  z-index:100;box-shadow:inset 0 0 0 3px #0c0c0c,inset 0 0 0 4px rgba(238,238,238,.08);
}
.cinema-tooltip::before,.cinema-tooltip::after{content:'';position:absolute;left:0;right:0;height:7px;background-image:repeating-linear-gradient(90deg,transparent 0,transparent 5px,rgba(238,238,238,.1) 5px,rgba(238,238,238,.1) 12px)}
.cinema-tooltip::before{top:-8px}
.cinema-tooltip::after{bottom:-8px}
.tooltip-title{display:block;font-size:8px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(238,238,238,.28);margin-bottom:5px}
.tooltip-caption{font-size:11px;font-style:italic;font-weight:400;line-height:1.6;letter-spacing:.02em;color:rgba(238,238,238,.75)}
.strip-item:hover .cinema-tooltip{opacity:1;transform:translateY(0)}

/* ── PAGE FOOTER (replaces site-nav-bottom, hidden via CSS data-page rule) ── */
.bottom-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 44px 24px;border-top:1px solid var(--line);margin-top:8px}
.footer-left a{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;color:var(--white);opacity:.35;transition:opacity .2s}
.footer-left a:hover{opacity:1}
.footer-icons{display:flex;gap:18px;align-items:center}
.footer-icon-link{display:inline-flex;align-items:center;color:var(--white);text-decoration:none;opacity:.35;transition:opacity .2s}
.footer-icon-link:hover{opacity:1}

/* ── MOBILE ── */
@media(max-width:768px){
  html,body{overflow-y:auto;overflow-x:hidden;height:auto}
  .page{display:flex;flex-direction:column;position:relative;height:auto;min-height:100svh;overflow-x:hidden;padding-top:82px}
  .bg-a,.bg-b,.bg-veil,.grain{position:fixed}
  /* Push video down — was too high */
  .stage{display:block;flex:1;padding:40px 20px 16px}
  .arrow{display:none !important}
  .video-frame{width:100%;max-width:100%;margin:0 auto}
  .video-ratio{aspect-ratio:16/9}
  .video-info{height:auto;padding:10px 0 0;flex-wrap:wrap;gap:6px}
  .video-title{font-size:17px;white-space:normal;word-break:break-word}
  .filmstrip-wrap{padding:0 20px}
  .filmstrip{padding-top:20px;margin-top:0}
  .strip-item{width:90px}
  .strip-thumb,.strip-ph{width:90px;height:51px}
  .cinema-tooltip{width:140px}
  .bottom-bar{flex-direction:column;align-items:flex-start;padding:16px 20px 24px;gap:14px;margin-top:0}
  .footer-icons{gap:16px}
}
</style>

</head>
<body data-page="video">
<div class="site-nav-mount"></div>

<div id="cur"></div>
<div class="bg-a" id="bgA"></div>
<div class="bg-b" id="bgB"></div>
<div class="bg-veil"></div>
<div class="grain"></div>

<div class="page">
  <div class="stage">
    <button class="arrow" id="btnPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="video-frame">
      <div class="video-ratio">
        <iframe id="vimeoFrame" src="" allow="fullscreen; picture-in-picture" allowfullscreen loading="eager"></iframe>
      </div>
      <div class="video-info">
        <div class="video-title" id="vTitle"></div>
        <div class="video-counter" id="vCounter"></div>
      </div>
    </div>
    <button class="arrow" id="btnNext" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>

  <div class="filmstrip-wrap">
    <div class="filmstrip" id="filmstrip"></div>
  </div>
</div>

<script>
var VIDEOS = [
  { id:'1171844542', title:'BIRDS', caption:'From Paris with love.', bg:'images/video/videobirds1.jpg', thumb:'https://vumbnail.com/1171844542.jpg' },
  { id:'1172106551', title:'Rebirth Cycles', caption:'A journey into the past. A meditation on caring for abandoned homes. The inevitability of cycles repeating.', bg:'images/video/videoRebirthCycles.jpg', thumb:'https://vumbnail.com/1172106551.jpg' },
  { id:'1172281707', title:'Special Diary', caption:'This is how life used to feel.', bg:'images/video/videocrystal1.jpg', thumb:'https://vumbnail.com/1172281707.jpg' },
  { id:'1172106388', title:'LVL', caption:'Short experimental stuff with friends.', bg:'images/video/videolvl.jpg', thumb:'https://vumbnail.com/1172106388.jpg' },
  { id:'1172128536', title:'Short Walks Down Long Roads', caption:'Just a feeling.', bg:'images/video/videoshort1.jpg', thumb:'https://vumbnail.com/1172128536.jpg' },
  { id:'1172128396', title:'Youth Chapter', caption:'Was filmed with an ice cream in one hand.', bg:'images/video/videoruslan.png', thumb:'https://vumbnail.com/1172128396.jpg' }
];

var current = 0, frame = document.getElementById('vimeoFrame'),
    bgA = document.getElementById('bgA'), bgB = document.getElementById('bgB'),
    activeL = 'a', titleEl = document.getElementById('vTitle'),
    countEl = document.getElementById('vCounter'), strip = document.getElementById('filmstrip');

function makePh(label){ var d=document.createElement('div'); d.className='strip-ph'; d.textContent=label||'video'; return d; }

VIDEOS.forEach(function(v,i){
  var item=document.createElement('div');
  item.className='strip-item'+(i===0?' active':'');
  if(v.thumb){
    var img=document.createElement('img');
    img.className='strip-thumb'; img.src=v.thumb; img.alt=v.title;
    img.loading=i===0?'eager':'lazy';
    img.onerror=function(){ this.replaceWith(makePh(v.title)); };
    item.appendChild(img);
  } else { item.appendChild(makePh(v.title)); }
  var nameEl=document.createElement('div'); nameEl.className='strip-name'; nameEl.textContent=v.title;
  item.appendChild(nameEl);
  if(v.caption){
    var tip=document.createElement('div'); tip.className='cinema-tooltip';
    tip.innerHTML='<span class="tooltip-title">'+v.title+'</span><div class="tooltip-caption">'+v.caption+'</div>';
    item.appendChild(tip);
  }
  item.addEventListener('click',(function(idx){ return function(){ goTo(idx); }; })(i));
  strip.appendChild(item);
});

function setBg(url){
  if(activeL==='a'){ bgB.style.backgroundImage=url?"url('"+url+"')":'none'; bgB.style.opacity='1'; bgA.style.opacity='0'; activeL='b'; }
  else { bgA.style.backgroundImage=url?"url('"+url+"')":'none'; bgA.style.opacity='1'; bgB.style.opacity='0'; activeL='a'; }
}

function goTo(i,skipHash){
  current=((i%VIDEOS.length)+VIDEOS.length)%VIDEOS.length;
  var v=VIDEOS[current];
  frame.src='https://player.vimeo.com/video/'+v.id+'?dnt=1&color=ffffff&title=0&byline=0&portrait=0';
  setBg(v.bg);
  titleEl.textContent=v.title||'';
  countEl.textContent=String(current+1).padStart(2,'0')+' / '+String(VIDEOS.length).padStart(2,'0');
  document.querySelectorAll('.strip-item').forEach(function(el,idx){ el.classList.toggle('active',idx===current); });
  var ai=strip.children[current];
  if(ai) ai.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  if(!skipHash) history.replaceState(null,'','#'+current);
}

document.getElementById('btnPrev').addEventListener('click',function(){ goTo(current-1); });
document.getElementById('btnNext').addEventListener('click',function(){ goTo(current+1); });
window.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft') goTo(current-1);
  if(e.key==='ArrowRight') goTo(current+1);
});
(function(){ var h=parseInt(location.hash.replace('#',''),10); goTo((!isNaN(h)&&h>=0&&h<VIDEOS.length)?h:0,true); }());

var cur=document.getElementById('cur');
if(window.matchMedia('(hover:hover) and (pointer:fine)').matches){
  var mx=0,my=0;
  document.addEventListener('pointermove',function(e){ mx=e.clientX; my=e.clientY; },{passive:true});
  (function loop(){ cur.style.transform='translate3d('+mx+'px,'+my+'px,0) translate(-50%,-50%)'; requestAnimationFrame(loop); })();
  document.querySelectorAll('a,button,.strip-item').forEach(function(el){
    el.addEventListener('mouseenter',function(){ cur.classList.add('big'); });
    el.addEventListener('mouseleave',function(){ cur.classList.remove('big'); });
  });
}
</script>
<script src="components/site-nav.js" defer></script>
</body>
