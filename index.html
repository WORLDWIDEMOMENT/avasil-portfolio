<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AV — Dual System</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: black url("images/front.jpg") center/cover no-repeat fixed;
  color: white;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
  cursor: none;
}

/* ── CURSOR ── */
#cur {
  position: fixed;
  width: 10px; height: 10px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width .16s, height .16s;
  mix-blend-mode: difference;
}
#cur.big { width: 50px; height: 50px; }
@media (hover: none) { #cur { display: none; } }

/* ── INTRO ── */
#intro-veil {
  position: fixed; inset: 0;
  background: black;
  opacity: 0; z-index: 50;
  pointer-events: none;
  transition: opacity 1.0s ease;
}
#intro-veil.darken { opacity: .22; }

#intro-line {
  position: fixed;
  left: 50%; bottom: 0;
  width: 1px; height: 0;
  background: white;
  z-index: 51;
  pointer-events: none;
  transition: height .7s cubic-bezier(.77, 0, .18, 1);
}
#intro-line.rise { height: 100vh; }
#intro-line.settle {
  background: rgba(255,255,255,.15);
  transition: background .8s ease;
}
.build-active #intro-line { background: rgba(0,0,0,.1); }

/* ── LAYERS ── */
.layer {
  position: fixed; inset: 0;
  transition: clip-path 1.2s cubic-bezier(.77, 0, .18, 1);
}
.build-layer {
  background: white;
  z-index: 2;
  clip-path: circle(0px at 0% 100%);
}
.create-layer {
  background: url("images/main1.jpg") center/cover no-repeat;
  z-index: 1;
  clip-path: circle(0px at 100% 100%);
}

/* ── GRID ── */
.grid {
  position: fixed; inset: 0;
  pointer-events: none; opacity: 0; z-index: 3;
  transition: opacity .7s ease;
  background-image:
    linear-gradient(rgba(0,0,0,.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.07) 1px, transparent 1px);
  background-size: 140px 140px;
}
.grid.active { opacity: 1; }

/* ── SIGNATURE ── */
.author {
  position: fixed; top: 34px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px; font-weight: 700;
  letter-spacing: .28em; text-transform: uppercase;
  opacity: .3; z-index: 20;
  white-space: nowrap; pointer-events: none;
  transition: color .4s;
}
.build-active .author { color: black; }

/* ── UI REVEAL ── */
.ui-group { opacity: 0; transition: opacity .8s ease; }
.ui-group.visible { opacity: 1; }

/* ── ZONES ── */
.zone {
  position: absolute; bottom: 120px;
  z-index: 10;
  transition: opacity .4s ease, transform .4s ease, color .4s ease;
}
#build  { left: 80px; }
#create { right: 80px; text-align: right; }

/* Main title — BUILD is a link, CREATE is not */
.main-title {
  font-size: 72px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  cursor: none; line-height: 1;
  transition: color .4s ease;
  user-select: none;
}
.main-title a {
  color: inherit; text-decoration: none;
}

/* ── SUB ITEMS ── */
.sub {
  margin-top: 16px;
  font-size: 11px; font-weight: 400;
  letter-spacing: .24em; text-transform: uppercase;
  line-height: 1;
  opacity: .28;
  transition: opacity .35s ease;
  pointer-events: none;
}
.zone.active .sub {
  opacity: .85;
  pointer-events: auto;
}

/* TO BUILD subs — all go to same page, underline together */
.sub-build a {
  display: block; color: inherit; text-decoration: none;
  padding: 7px 0;
  border-bottom: 1px solid transparent;
  transition: border-color .18s;
}
/* all three underline when hovering ANY of them */
.sub-build:hover a {
  border-bottom-color: currentColor;
}

/* TO CREATE subs — each independent */
.sub-create a {
  display: block; color: inherit; text-decoration: none;
  padding: 7px 0;
  border-bottom: 1px solid transparent;
  transition: border-color .18s;
}
.sub-create a:hover {
  border-bottom-color: currentColor;
}

/* text inversion on white layer */
.build-active .zone { color: black; }

.fade-out {
  opacity: 0 !important;
  transform: translateY(6px);
  pointer-events: none;
}

/* ── BOTTOM BAR ── */
.bottom-bar {
  position: absolute; bottom: 36px; width: 100%;
  padding: 0 80px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  z-index: 20; transition: color .4s ease;
}
.bottom-bar a { color: inherit; text-decoration: none; opacity: .45; transition: opacity .25s; }
.bottom-bar a:hover { opacity: 1; }
.contact { display: flex; gap: 14px; align-items: center; }
.divider { opacity: .2; }
.build-active .bottom-bar { color: black; }

/* ── MOBILE ── */
@media (max-width: 900px) {
  /* Image: shrunk to upper portion, not full-cover */
  body {
    background-size: auto 58vh;
    background-position: center 6%;
    background-attachment: scroll;
  }

  /* Sub-items always visible on mobile — no tap needed to reveal */
  .sub { opacity: .78; pointer-events: auto; }
  .zone.active .sub { opacity: .85; }

  /* Zones: positioned below the image bottom edge */
  #build {
    left: 24px;
    bottom: auto;
    top: 62vh;
    transform: none;
  }
  #create {
    right: 24px;
    bottom: auto;
    top: 62vh;
    transform: none;
    text-align: right;
  }

  .main-title { font-size: 38px; letter-spacing: .1em; }

  /* Bottom bar: About left, links right — split by center line */
  .bottom-bar {
    padding: 0 24px;
    font-size: 9px;
    bottom: 28px;
  }
  .contact {
    gap: 10px;
    flex-wrap: nowrap;
    /* right side starts from center */
    padding-left: 50%;
    justify-content: flex-end;
  }
  /* hide email on mobile, keep social links */
  .contact a[href^="mailto"] { display: none; }
  /* hide the divider after email */
  .contact .divider:first-of-type { display: none; }
}

@media (max-width: 560px) {
  body {
    background-size: auto 56vh;
    background-position: center 5%;
  }
  .main-title { font-size: 30px; }
  #build  { left: 16px; top: 60vh; }
  #create { right: 16px; top: 60vh; }
  .bottom-bar { padding: 0 16px; font-size: 8px; }
  .contact {
    display: flex;
    padding-left: 52%;
    gap: 8px;
  }
}
</style>
</head>
