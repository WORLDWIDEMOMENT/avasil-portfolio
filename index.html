<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AV — Dual System</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: black url("images/front.jpg") center/cover no-repeat fixed;
  color: white;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
  cursor: none;
}

/* ── CURSOR ── */
#cur {
  position: fixed;
  width: 10px; height: 10px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width .16s, height .16s;
  mix-blend-mode: difference;
}
#cur.big { width: 50px; height: 50px; }
@media (hover: none) { #cur { display: none; } }

/* ── INTRO ── */
#intro-veil {
  position: fixed; inset: 0;
  background: black;
  opacity: 0; z-index: 50;
  pointer-events: none;
  transition: opacity 1.0s ease;
}
#intro-veil.darken { opacity: .22; }

#intro-line {
  position: fixed;
  left: 50%; bottom: 0;
  width: 1px; height: 0;
  background: white;
  z-index: 51;
  pointer-events: none;
  transition: height .7s cubic-bezier(.77, 0, .18, 1);
}
#intro-line.rise { height: 100vh; }
#intro-line.settle {
  background: rgba(255,255,255,.15);
  transition: background .8s ease;
}
.build-active #intro-line { background: rgba(0,0,0,.1); }

/* ── LAYERS ── */
.layer {
  position: fixed; inset: 0;
  transition: clip-path 1.2s cubic-bezier(.77, 0, .18, 1);
}
.build-layer {
  background: white;
  z-index: 2;
  clip-path: circle(0px at 0% 100%);
}
.create-layer {
  background: url("images/graffitymain.jpg") center/cover no-repeat;
  z-index: 1;
  clip-path: circle(0px at 100% 100%);
}

/* ── GRID ── */
.grid {
  position: fixed; inset: 0;
  pointer-events: none; opacity: 0; z-index: 3;
  transition: opacity .7s ease;
  background-image:
    linear-gradient(rgba(0,0,0,.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.07) 1px, transparent 1px);
  background-size: 140px 140px;
}
.grid.active { opacity: 1; }

/* ── SIGNATURE ── */
.author {
  position: fixed; top: 34px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px; font-weight: 700;
  letter-spacing: .28em; text-transform: uppercase;
  opacity: .3; z-index: 20;
  white-space: nowrap; pointer-events: none;
  transition: color .4s;
}
.build-active .author { color: black; }

/* ── UI INTRO REVEAL ── */
.ui-group { opacity: 0; transition: opacity .8s ease; }
.ui-group.visible { opacity: 1; }

/* ── ZONES ── */
.zone {
  position: absolute; bottom: 120px;
  z-index: 10;
  transition: opacity .4s ease, transform .4s ease, color .4s ease;
}
#build  { left: 80px; }
#create { right: 80px; text-align: right; }

.main-title {
  font-size: 72px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  cursor: none; line-height: 1;
  transition: color .4s ease;
  user-select: none;
}
/* title as a link */
.main-title a {
  color: inherit; text-decoration: none;
}

/* ── SUB LINKS ──
   Always visible as a dim hint.
   On zone hover → full brightness, clickable.
   On other-zone hover → fade out with the rest.
── */
.sub {
  margin-top: 16px;
  font-size: 11px; font-weight: 400;
  letter-spacing: .24em; text-transform: uppercase;
  line-height: 1;
  /* always dim-visible */
  opacity: .28;
  transform: none;
  transition: opacity .35s ease;
  pointer-events: none; /* links disabled until hover */
}

/* zone is hovered → sub brightens, becomes clickable */
.zone.active .sub {
  opacity: .85;
  pointer-events: auto;
}

.sub a {
  display: block; color: inherit; text-decoration: none;
  padding: 7px 0;
  border-bottom: 1px solid transparent;
  transition: border-color .18s, opacity .18s;
}
.sub a:nth-child(1) { transition-delay: .03s; }
.sub a:nth-child(2) { transition-delay: .07s; }
.sub a:nth-child(3) { transition-delay: .11s; }
.sub a:hover { border-bottom-color: currentColor; }

/* text inversion on white layer */
.build-active .zone { color: black; }

/* other zone fades when one is active */
.fade-out {
  opacity: 0 !important;
  transform: translateY(6px);
  pointer-events: none;
}

/* ── BOTTOM BAR ── */
.bottom-bar {
  position: absolute; bottom: 36px; width: 100%;
  padding: 0 80px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  z-index: 20; transition: color .4s ease;
}
.bottom-bar a { color: inherit; text-decoration: none; opacity: .45; transition: opacity .25s; }
.bottom-bar a:hover { opacity: 1; }
.contact { display: flex; gap: 14px; align-items: center; }
.divider { opacity: .2; }
.build-active .bottom-bar { color: black; }

/* ── MOBILE ── */
@media (max-width: 900px) {
  .main-title { font-size: 42px; letter-spacing: .1em; }
  #build  { left: 32px; bottom: auto; top: 50%; transform: translateY(-58%); }
  #create { right: 32px; bottom: auto; top: 50%; transform: translateY(-58%); }
  .bottom-bar { padding: 0 32px; font-size: 9px; }
  .contact { gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  /* on mobile sub always visible as hint */
  .sub { opacity: .35; }
  .zone.active .sub { opacity: .85; pointer-events: auto; }
}
@media (max-width: 560px) {
  .main-title { font-size: 30px; }
  #build  { left: 20px; }
  #create { right: 20px; }
  .contact { display: none; }
  .bottom-bar { justify-content: center; }
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="intro-veil"></div>
<div id="intro-line"></div>

<div class="layer build-layer"></div>
<div class="layer create-layer"></div>
<div class="grid"></div>

<div class="author ui-group">A. Vasileuskaya</div>

<!-- TO BUILD -->
<div class="zone ui-group" id="build">
  <div class="main-title">
    <a href="tobuild.html">To Build</a>
  </div>
  <div class="sub" id="buildSub">
    <a href="tobuild.html">Architecture</a>
    <a href="tobuild.html?filter=urban">Urban · Research</a>
    <a href="tobuild.html?filter=ai">AI Experiments</a>
  </div>
</div>

<!-- TO CREATE -->
<div class="zone ui-group" id="create">
  <div class="main-title">
    <a href="visual.html">To Create</a>
  </div>
  <div class="sub" id="createSub">
    <a href="visual.html">Visual</a>
    <a href="video.html">Video</a>
    <a href="radio.html">Local Radio</a>
  </div>
</div>

<div class="bottom-bar ui-group">
  <a href="about.html">About</a>
  <div class="contact">
    <a href="mailto:navilen@bk.ru">navilen@bk.ru</a>
    <span class="divider">—</span>
    <a href="https://www.instagram.com/molodostibolshenebudet/" target="_blank">Instagram</a>
    <span class="divider">—</span>
    <a href="https://www.behance.net/avasileuskaya" target="_blank">Behance</a>
    <span class="divider">—</span>
    <a href="https://linkedin.com/in/worldwidemoment/" target="_blank">LinkedIn</a>
  </div>
</div>

<script>
  // ── CURSOR ──
  const cur = document.getElementById('cur');
  if (window.matchMedia('(hover: hover)').matches) {
    document.addEventListener('mousemove', e => {
      cur.style.left = e.clientX + 'px';
      cur.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('a, .main-title').forEach(el => {
      el.addEventListener('mouseenter', () => cur.classList.add('big'));
      el.addEventListener('mouseleave', () => cur.classList.remove('big'));
    });
  }

  // ── INTRO ──
  // 1.8s — лёгкое затемнение
  // 2.2s — линия вылетает снизу
  // 2.9s — UI появляется, линия остаётся как divider
  const veil  = document.getElementById('intro-veil');
  const line  = document.getElementById('intro-line');
  const uiEls = document.querySelectorAll('.ui-group');

  setTimeout(() => veil.classList.add('darken'), 1800);

  setTimeout(() => line.classList.add('rise'), 2200);

  setTimeout(() => {
    veil.style.opacity   = '0';
    veil.style.transition= 'opacity .5s ease';
    line.classList.add('settle');
    uiEls.forEach(el => el.classList.add('visible'));
  }, 2900);

  // ── BUILD / CREATE ──
  const buildZone  = document.getElementById('build');
  const createZone = document.getElementById('create');
  const buildLayer = document.querySelector('.build-layer');
  const createLayer= document.querySelector('.create-layer');
  const grid       = document.querySelector('.grid');
  const isTouch    = () => !window.matchMedia('(hover: hover)').matches;

  function activateBuild() {
    buildLayer.style.clipPath = 'circle(150% at 0% 100%)';
    document.body.classList.add('build-active');
    createZone.classList.add('fade-out');
    createZone.classList.remove('active');
    grid.classList.add('active');
    buildZone.classList.add('active');
  }
  function deactivateBuild() {
    buildLayer.style.clipPath = 'circle(0px at 0% 100%)';
    document.body.classList.remove('build-active');
    createZone.classList.remove('fade-out');
    grid.classList.remove('active');
    buildZone.classList.remove('active');
  }
  function activateCreate() {
    createLayer.style.clipPath = 'circle(150% at 100% 100%)';
    buildZone.classList.add('fade-out');
    buildZone.classList.remove('active');
    createZone.classList.add('active');
  }
  function deactivateCreate() {
    createLayer.style.clipPath = 'circle(0px at 100% 100%)';
    buildZone.classList.remove('fade-out');
    createZone.classList.remove('active');
  }
  function deactivateAll() { deactivateBuild(); deactivateCreate(); }

  // desktop
  buildZone.addEventListener('mouseenter',  activateBuild);
  buildZone.addEventListener('mouseleave',  deactivateBuild);
  createZone.addEventListener('mouseenter', activateCreate);
  createZone.addEventListener('mouseleave', deactivateCreate);

  // mobile tap
  let buildOpen = false, createOpen = false;

  buildZone.addEventListener('click', e => {
    if (!isTouch()) return;
    // if tapping a link inside sub, let it navigate
    if (e.target.tagName === 'A' && buildZone.classList.contains('active')) return;
    // if tapping the title link on second tap, navigate
    if (e.target.closest('.main-title') && buildOpen) return;
    e.preventDefault();
    e.stopPropagation();
    if (buildOpen) { deactivateAll(); buildOpen = false; }
    else { deactivateAll(); activateBuild(); buildOpen = true; createOpen = false; }
  });

  createZone.addEventListener('click', e => {
    if (!isTouch()) return;
    if (e.target.tagName === 'A' && createZone.classList.contains('active')) return;
    if (e.target.closest('.main-title') && createOpen) return;
    e.preventDefault();
    e.stopPropagation();
    if (createOpen) { deactivateAll(); createOpen = false; }
    else { deactivateAll(); activateCreate(); createOpen = true; buildOpen = false; }
  });

  document.addEventListener('click', () => {
    if (!isTouch()) return;
    deactivateAll();
    buildOpen = false; createOpen = false;
  });
</script>
</body>
</html>
